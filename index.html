        // ─── Custom Dropdown ────────────────────────────────────────────────
        function ReactCustomDropdown({ label, value, options, onChange }) {
            const [isOpen, setIsOpen] = useState(false);
            const ref = useRef(null);
            const selected = useMemo(() => options.find(o => o.value === value) || options[0], [options, value]);
            useEffect(() => {
                const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setIsOpen(false); };
                document.addEventListener("mousedown", h);
                return () => document.removeEventListener("mousedown", h);
            }, []);
            if (!options.length) return null;
            return (
                <div ref={ref} className="relative flex items-center bg-slate-800 rounded-xl px-4 py-1.5 border border-slate-700 z-50">
                    {label && <span className="text-sm text-slate-400 mr-2 font-medium select-none">{label}:</span>}
                    <div className="relative">
                        <button type="button" onClick={() => setIsOpen(!isOpen)} className="bg-slate-900 text-indigo-300 font-extrabold rounded-lg px-3 py-2 border border-slate-700 flex items-center gap-2 hover:border-indigo-500 transition-all min-w-[100px]">
                            <span>{selected ? selected.label : ""}</span>
                            <svg className={`w-4 h-4 transition-transform ${isOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        {isOpen && (
                            <div className="absolute right-0 mt-2 w-48 rounded-xl bg-slate-900 border border-slate-700 shadow-2xl py-1 z-[999] max-h-60 overflow-y-auto">
                                {options.map(opt => (
                                    <button key={opt.value} type="button" onClick={() => { onChange(opt.value); setIsOpen(false); }}
                                        className={`w-full text-left px-4 py-2.5 text-sm font-semibold flex items-center justify-between border-b border-slate-800/40 last:border-0 ${opt.value === value ? "bg-indigo-600/30 text-indigo-300 border-l-4 border-indigo-500" : "text-slate-300 hover:bg-slate-800 hover:text-white"}`}>
                                        <span>{opt.label}</span>
                                        {opt.value === value && <span className="text-indigo-400">✓</span>}
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ─── Main App ───────────────────────────────────────────────────────
        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(() => sessionStorage.getItem("isLoggedIn") === "true");
            const [pwdInput, setPwdInput] = useState("");
            const [loginError, setLoginError] = useState(false);
            const [currentView, setCurrentView] = useState("argo");
            const [notification, setNotification] = useState(null);

            const [dbDates, setDbDates] = useState(INITIAL_DATES);
            const [dbStockData, setDbStockData] = useState(INITIAL_STOCK_DATA);
            const [dbIncomings, setDbIncomings] = useState(INITIAL_INCOMINGS);
            const [rocketDates, setRocketDates] = useState([]);
            const [rocketItems, setRocketItems] = useState([]);

            useEffect(() => {
                try {
                    const s = localStorage.getItem("argo_dashboard_data_v7");
                    if (s) {
                        const d = JSON.parse(s);
                        if (d.DATES?.length) setDbDates(d.DATES);
                        if (d.STOCK_DATA && Object.keys(d.STOCK_DATA).length) setDbStockData(d.STOCK_DATA);
                        if (d.HISTORICAL_INCOMINGS) setDbIncomings(d.HISTORICAL_INCOMINGS);
                        if (d.ROCKET_DATES) setRocketDates(d.ROCKET_DATES);
                        if (d.ROCKET_ITEMS) setRocketItems(d.ROCKET_ITEMS);
                    }
                } catch(e) { console.error("로컬 데이터 복원 실패", e); }
            }, []);

            const saveLocal = (data) => {
                try { localStorage.setItem("argo_dashboard_data_v7", JSON.stringify(data)); }
                catch(e) { console.error("로컬 백업 실패", e); }
            };

            const triggerNotification = (msg, type="success") => {
                setNotification({ message: msg, type });
                setTimeout(() => setNotification(null), 4500);
            };

            // ── N배송 필터 ──
            const availableYears = useMemo(() => {
                if (!dbDates.length) return ["2026"];
                return [...new Set(dbDates.map(d => d.substring(0,4)))].sort().reverse();
            }, [dbDates]);
            const [selectedYear, setSelectedYear] = useState(() => availableYears[0]);

            const availableMonths = useMemo(() => {
                if (!dbDates.length) return ["06"];
                return [...new Set(dbDates.filter(d => d.startsWith(selectedYear)).map(d => d.substring(5,7)))].sort().reverse();
            }, [dbDates, selectedYear]);
            const [selectedMonth, setSelectedMonth] = useState(() => availableMonths[0]);

            const dateOptionsForMonth = useMemo(() => {
                return [...dbDates.filter(d => d.startsWith(`${selectedYear}-${selectedMonth}`))].reverse();
            }, [dbDates, selectedYear, selectedMonth]);
            const [selectedDate, setSelectedDate] = useState(() => dateOptionsForMonth[0] || "");

            useEffect(() => { if (!availableYears.includes(selectedYear)) setSelectedYear(availableYears[0]); }, [availableYears]);
            useEffect(() => { if (!availableMonths.includes(selectedMonth)) setSelectedMonth(availableMonths[0]); }, [selectedYear, availableMonths]);
            useEffect(() => { if (dateOptionsForMonth.length && !dateOptionsForMonth.includes(selectedDate)) setSelectedDate(dateOptionsForMonth[0]); }, [dateOptionsForMonth]);

            // ── 로켓 필터 ──
            // rocketViewMode: "15" | "30" | "THISMONTH" | "LASTMONTH" | "MONTH"
            const [rocketViewMode, setRocketViewMode] = useState("15");
            const [showZeroStockRocket, setShowZeroStockRocket] = useState(false);

            const rAvailableYears = useMemo(() => {
                if (!rocketDates.length) return ["2026"];
                return [...new Set(rocketDates.map(d => d.substring(0,4)))].sort().reverse();
            }, [rocketDates]);
            const [rSelectedYear, setRSelectedYear] = useState(() => rAvailableYears[0]);

            const rAvailableMonths = useMemo(() => {
                if (!rocketDates.length) return ["06"];
                return [...new Set(rocketDates.filter(d => d.startsWith(rSelectedYear)).map(d => d.substring(5,7)))].sort().reverse();
            }, [rocketDates, rSelectedYear]);
            const [rSelectedMonth, setRSelectedMonth] = useState(() => rAvailableMonths[0]);

            useEffect(() => { if (!rAvailableYears.includes(rSelectedYear)) setRSelectedYear(rAvailableYears[0]); }, [rAvailableYears]);
            useEffect(() => { if (!rAvailableMonths.includes(rSelectedMonth)) setRSelectedMonth(rAvailableMonths[0]); }, [rSelectedYear, rAvailableMonths]);

            // 이번달/지난달 계산
            const thisMonthStr = useMemo(() => {
                const n = new Date();
                return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
            }, []);
            const lastMonthStr = useMemo(() => {
                const n = new Date();
                const lm = new Date(n.getFullYear(), n.getMonth()-1, 1);
                return `${lm.getFullYear()}-${String(lm.getMonth()+1).padStart(2,'0')}`;
            }, []);

            const visibleRocketDates = useMemo(() => {
                if (!rocketDates.length) return [];
                if (rocketViewMode === "15") return [...rocketDates].slice(-15);
                if (rocketViewMode === "30") return [...rocketDates].slice(-30);
                if (rocketViewMode === "THISMONTH") return rocketDates.filter(d => d.startsWith(thisMonthStr));
                if (rocketViewMode === "LASTMONTH") return rocketDates.filter(d => d.startsWith(lastMonthStr));
                if (rocketViewMode === "MONTH") return rocketDates.filter(d => d.startsWith(`${rSelectedYear}-${rSelectedMonth}`));
                return rocketDates;
            }, [rocketDates, rocketViewMode, rSelectedYear, rSelectedMonth, thisMonthStr, lastMonthStr]);

            const filteredRocketItems = useMemo(() => {
                return rocketItems.filter(item => {
                    const isYomimon = String(item.name).includes("요미몬") || String(item.option).includes("요미몬");
                    if (!isYomimon) return false;
                    if (!showZeroStockRocket) {
                        const recent30 = rocketDates.slice(-30);
                        const hasStock = recent30.some(d => {
                            const v = item.history[d];
                            return v !== "-" && v !== undefined && parseInt(v) > 0;
                        });
                        if (!hasStock) return false;
                    }
                    return true;
                });
            }, [rocketItems, rocketDates, showZeroStockRocket]);

            // ── N배송 분석 ──
            const [adsWindow, setAdsWindow] = useState(4);
            const [onlyCritical30, setOnlyCritical30] = useState(true);
            const [excludeZeroStock, setExcludeZeroStock] = useState(true);
            const [searchQuery, setSearchQuery] = useState("");
            const [categoryFilter, setCategoryFilter] = useState("ALL");
            const [selectedSku, setSelectedSku] = useState("");

            const selectedDateIndex = useMemo(() => {
                const i = dbDates.indexOf(selectedDate);
                return i !== -1 ? i : Math.max(0, dbDates.length-1);
            }, [selectedDate, dbDates]);

            const calculateSkuMetrics = (sku, targetDateIndex) => {
                const currentStock = dbStockData[sku]?.[targetDateIndex] || 0;
                const startIndex = Math.max(0, targetDateIndex - adsWindow);
                const startDateStr = dbDates[startIndex];
                const targetDateStr = dbDates[targetDateIndex];
                const startStock = dbStockData[sku]?.[startIndex] || 0;
                const startDt = cleanDateForParse(startDateStr);
                const targetDt = cleanDateForParse(targetDateStr);
                const diffDays = Math.max(1, Math.ceil(Math.abs(targetDt - startDt) / 86400000));
                const stockDelta = startStock - currentStock;
                let windowIncomings = 0, pendingArrivals = 0;
                dbIncomings.forEach(inc => {
                    if (inc.sku !== sku) return;
                    const incDate = cleanDateForParse(inc.date);
                    if (isNaN(incDate.getTime())) return;
                    let present = false;
                    if (inc.isRegistered) {
                        present = true;
                        if (incDate > startDt && incDate <= targetDt && currentStock < inc.amount * 0.8 && stockDelta >= 0) present = false;
                    }
                    if (present) { if (incDate > startDt && incDate <= targetDt) windowIncomings += inc.amount; }
                    else pendingArrivals += inc.amount;
                });
                const totalSales = stockDelta + windowIncomings;
                const ads = Math.max(0, parseFloat((totalSales / diffDays).toFixed(2)));
                let daysRemaining = Infinity, expectedStockoutDate = "안전 (우려없음)", displayRemainingText = "99일 이상";
                if (ads > 0) {
                    const projected = currentStock + pendingArrivals;
                    daysRemaining = projected / ads;
                    if (daysRemaining < 365) {
                        const dt = new Date(targetDt);
                        dt.setDate(dt.getDate() + Math.floor(daysRemaining));
                        expectedStockoutDate = dt.toISOString().split('T')[0];
                        displayRemainingText = `${Math.ceil(daysRemaining)}일 남음`;
                    }
                }
                return {
                    sku, category: CATEGORIES[sku] || "기타", currentStock, ads, daysRemaining,
                    displayRemainingText, expectedStockoutDate,
                    replenishment30: ads > 0 ? Math.ceil(ads * 30) : 0,
                    simulatedArrivals: pendingArrivals
                };
            };

            const processedSkuList = useMemo(() => Object.keys(dbStockData).map(s => calculateSkuMetrics(s, selectedDateIndex)),
                [selectedDateIndex, adsWindow, dbStockData, dbDates, dbIncomings]);

            const filteredSkuList = useMemo(() => processedSkuList.filter(item => {
                if (excludeZeroStock && item.currentStock === 0) return false;
                if (onlyCritical30 && item.daysRemaining > 30) return false;
                if (categoryFilter !== "ALL" && item.category !== categoryFilter) return false;
                if (searchQuery && !item.sku.includes(searchQuery)) return false;
                return true;
            }).sort((a, b) => a.daysRemaining - b.daysRemaining), [processedSkuList, onlyCritical30, excludeZeroStock, searchQuery, categoryFilter]);

            const pendingDispatches = useMemo(() => {
                if (!dbDates.length) return [];
                const latestTime = cleanDateForParse(dbDates[dbDates.length-1]).getTime();
                return dbIncomings.filter(inc => !inc.isRegistered).map(inc => {
                    const dispatchTime = cleanDateForParse(inc.date).getTime();
                    const daysDiff = (latestTime - dispatchTime) / 86400000;
                    if (daysDiff > 7) return null;
                    const arrDt = cleanDateForParse(inc.date);
                    if (inc.type === "택배") arrDt.setDate(arrDt.getDate() + 3);
                    return { ...inc, arrivalDateStr: arrDt.toISOString().split('T')[0] };
                }).filter(Boolean);
            }, [dbIncomings, dbDates]);

            const summaryMetrics = useMemo(() => ({
                criticalCount: processedSkuList.filter(i => i.daysRemaining <= 10).length,
                warningCount: processedSkuList.filter(i => i.daysRemaining > 10 && i.daysRemaining <= 30).length,
                totalStock: processedSkuList.reduce((s, i) => s + i.currentStock, 0),
                totalDailySales: processedSkuList.reduce((s, i) => s + i.ads, 0).toFixed(1)
            }), [processedSkuList]);

            const skuHistoryPoints = useMemo(() => {
                if (!selectedSku || !dbStockData[selectedSku]) return [];
                return dbDates.slice(0, selectedDateIndex+1).map((dt, idx) => ({ date: dt, stock: dbStockData[selectedSku][idx] || 0 }));
            }, [selectedSku, selectedDateIndex, dbStockData, dbDates]);

            // ── 엑셀 파서 ──────────────────────────────────────────────────
            // [FIX] 날짜 파싱: Excel 직렬번호, 한글 형식, 슬래시/대시 형식 모두 지원
            const formatExcelDate = (rawLabel) => {
                try {
                    let lbl = String(rawLabel).trim();
                    if (!lbl || lbl === "undefined" || lbl === "") return null;

                    // Excel 직렬 번호 (40000~55000 사이 숫자)
                    const num = parseFloat(lbl);
                    if (!isNaN(num) && num > 40000 && num < 55000 && !/[\/\-년월일]/.test(lbl)) {
                        const d = new Date(Math.round((num - 25569) * 86400 * 1000));
                        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    }

                    // 한글 형식: "2026년 5월 14일" 또는 "26년 5월 14일"
                    const km = lbl.match(/(\d{2,4})년\s*(\d{1,2})월\s*(\d{1,2})일?/);
                    if (km) {
                        const yr = km[1].length === 2 ? `20${km[1]}` : km[1];
                        return `${yr}-${km[2].padStart(2,'0')}-${km[3].padStart(2,'0')}`;
                    }

                    // 일반 형식
                    let match = lbl.match(/^(\d{2,4}[\/\-]\d{1,2}[\/\-]\d{1,2}|\d{1,2}[\/\-]\d{1,2})/);
                    if (!match) return null;
                    let datePart = match[1];
                    let suffix = lbl.substring(datePart.length).trim();
                    if (suffix) suffix = " " + suffix;
                    let parts = datePart.split(/[\/\-]/);
                    let year, month, day;
                    if (parts.length >= 3) {
                        year = parts[0].length === 2 ? `20${parts[0]}` : parts[0];
                        month = parts[1].padStart(2,'0');
                        day = parts[2].padStart(2,'0');
                    } else if (parts.length === 2) {
                        const m = parseInt(parts[0]);
                        year = m > 8 ? "2025" : "2026";
                        month = parts[0].padStart(2,'0');
                        day = parts[1].padStart(2,'0');
                    } else return null;
                    return `${year}-${month}-${day}${suffix}`;
                } catch(e) { return null; }
            };

            const handleUnifiedExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'binary' });
                        const sheetNames = wb.SheetNames;

                        // [FIX] 순서 기반 시트 파싱 (1번=로켓, 2번=N배송, 3번=출고)
                        const sRocket = sheetNames.length > 0 ? wb.Sheets[sheetNames[0]] : null;
                        const sArgo   = sheetNames.length > 1 ? wb.Sheets[sheetNames[1]] : null;
                        const sDisp   = sheetNames.length > 2 ? wb.Sheets[sheetNames[2]] : null;

                        let newRocketDates = [...rocketDates];
                        let newRocketItems = [...rocketItems];
                        let newArgoDates   = [...dbDates];
                        let newArgoData    = { ...dbStockData };
                        let newIncomings   = [...dbIncomings];

                        // ── 1. 로켓배송 시트 ──
                        if (sRocket) {
                            const rows = XLSX.utils.sheet_to_json(sRocket, { header:1, raw:false, defval:"" });
                            if (rows.length > 1) {
                                const hRow = rows[0];
                                const dCols = [];
                                hRow.forEach((c, i) => {
                                    if (i < 3) return;
                                    const fd = formatExcelDate(c);
                                    if (fd) dCols.push({ index: i, label: fd });
                                });
                                const parsedDates = dCols.map(c => c.label);
                                newRocketDates = [...new Set([...rocketDates, ...parsedDates])].sort();
                                const itemsMap = {};
                                newRocketItems.forEach(item => { itemsMap[`${item.name}_${item.option}`] = { ...item }; });
                                for (let i = 1; i < rows.length; i++) {
                                    const row = rows[i];
                                    if (!row?.length) continue;
                                    const name = String(row[0]||"").trim();
                                    const option = String(row[1]||"").trim();
                                    const skuId = String(row[2]||"").trim();
                                    if (!name || name === "undefined") continue;
                                    const key = `${name}_${option}`;
                                    if (!itemsMap[key]) itemsMap[key] = { name, option, skuId, history:{} };
                                    dCols.forEach((col, ci) => {
                                        const raw = row[col.index];
                                        let val = "-";
                                        if (raw !== "" && raw !== undefined) val = isNaN(parseInt(raw)) ? raw : parseInt(raw);
                                        itemsMap[key].history[parsedDates[ci]] = val;
                                    });
                                }
                                newRocketItems = Object.values(itemsMap);
                            }
                        }

                        // ── 2. N배송 재고 시트 ──
                        if (sArgo) {
                            const rows = XLSX.utils.sheet_to_json(sArgo, { header:1, raw:false });
                            if (rows.length > 1) {
                                const hRow = rows[0];
                                const dCols = [];
                                hRow.forEach((c, i) => {
                                    const fd = formatExcelDate(c);
                                    if (fd) dCols.push({ index: i, label: fd });
                                });
                                const parsedDates = dCols.map(c => c.label);
                                newArgoDates = [...new Set([...dbDates, ...parsedDates])].sort();
                                // 기존 데이터 보존하며 배열 재구성
                                Object.keys(newArgoData).forEach(k => {
                                    newArgoData[k] = newArgoDates.map(d => {
                                        const oi = dbDates.indexOf(d);
                                        return oi !== -1 ? (dbStockData[k]?.[oi] || 0) : 0;
                                    });
                                });
                                for (let i = 1; i < rows.length; i++) {
                                    const row = rows[i];
                                    if (!row?.length) continue;
                                    const sku = cleanSkuName(String(row[0]||"").trim());
                                    if (!sku || !Object.keys(CATEGORIES).includes(sku)) continue;
                                    if (!newArgoData[sku]) newArgoData[sku] = new Array(newArgoDates.length).fill(0);
                                    dCols.forEach((col, ci) => {
                                        const val = parseInt(row[col.index]) || 0;
                                        const ui = newArgoDates.indexOf(parsedDates[ci]);
                                        if (ui !== -1) newArgoData[sku][ui] = val;
                                    });
                                }
                            }
                        }

                        // ── 3. 출고/발송 시트 ──
                        // [FIX] 기존 입고 항목의 isRegistered 상태를 절대 덮어쓰지 않음
                        if (sDisp) {
                            const rows = XLSX.utils.sheet_to_json(sDisp, { header:1, raw:false });
                            if (rows.length > 1) {
                                const hRow = rows[0];
                                const dCols = [];
                                hRow.forEach((c, i) => {
                                    const fd = formatExcelDate(c);
                                    if (fd) dCols.push({ index: i, label: fd });
                                });
                                const latestArgoDate = newArgoDates[newArgoDates.length-1] || "2026-06-02";
                                // 14일 이상 지난 출고는 이미 도착한 것으로 판정
                                const cutoff = new Date(latestArgoDate.split(' ')[0]).getTime() - (14 * 86400000);

                                for (let i = 1; i < rows.length; i++) {
                                    const row = rows[i];
                                    if (!row?.length) continue;
                                    const sku = cleanSkuName(String(row[0]||"").trim());
                                    if (!sku) continue;
                                    dCols.forEach(col => {
                                        const amount = parseInt(row[col.index]) || 0;
                                        if (amount <= 0) return;
                                        const type = col.label.includes("용차") ? "용차" : "택배";
                                        const cleanDate = col.label.split(' ')[0];
                                        // [FIX] 중복 체크: 이미 존재하면 절대 건드리지 않음
                                        const exists = newIncomings.some(inc =>
                                            inc.sku === sku && inc.date === cleanDate && inc.amount === amount
                                        );
                                        if (!exists) {
                                            const dispatchTime = new Date(cleanDate).getTime();
                                            newIncomings.push({
                                                sku, date: cleanDate, amount, type,
                                                isRegistered: dispatchTime < cutoff
                                            });
                                        }
                                    });
                                }
                            }
                        }

                        // 상태 업데이트
                        setDbDates(newArgoDates);
                        setDbStockData(newArgoData);
                        setDbIncomings(newIncomings);
                        setRocketDates(newRocketDates);
                        setRocketItems(newRocketItems);

                        const savePayload = {
                            APP_VERSION, DATES: newArgoDates, STOCK_DATA: newArgoData,
                            HISTORICAL_INCOMINGS: newIncomings, ROCKET_DATES: newRocketDates, ROCKET_ITEMS: newRocketItems
                        };
                        saveLocal(savePayload);

                        if (newArgoDates.length) {
                            const last = newArgoDates[newArgoDates.length-1];
                            setSelectedYear(last.substring(0,4));
                            setSelectedMonth(last.substring(5,7));
                            setSelectedDate(last);
                        }
                        if (newRocketDates.length) {
                            const last = newRocketDates[newRocketDates.length-1];
                            setRSelectedYear(last.substring(0,4));
                            setRSelectedMonth(last.substring(5,7));
                        }
                        triggerNotification("🎉 엑셀 분석 완료! 모든 데이터가 브라우저에 영구 저장되었습니다.");
                    } catch(err) {
                        console.error(err);
                        triggerNotification("엑셀 파일 파싱 중 오류 발생 (엑셀 양식을 확인하세요).", "error");
                    }
                };
                reader.readAsBinaryString(file);
            };

            const toggleIncomingRegistration = (index) => {
                const targetInc = pendingDispatches[index];
                const updatedIncomings = [...dbIncomings];
                const gi = updatedIncomings.findIndex(x => x.sku === targetInc.sku && x.date === targetInc.date && x.amount === targetInc.amount);
                if (gi !== -1) {
                    updatedIncomings[gi].isRegistered = true;
                    const updatedStock = { ...dbStockData };
                    if (updatedStock[targetInc.sku] && dbDates.length) {
                        updatedStock[targetInc.sku][dbDates.length-1] += targetInc.amount;
                    }
                    setDbIncomings(updatedIncomings);
                    setDbStockData(updatedStock);
                    saveLocal({ APP_VERSION, DATES: dbDates, STOCK_DATA: updatedStock, HISTORICAL_INCOMINGS: updatedIncomings, ROCKET_DATES: rocketDates, ROCKET_ITEMS: rocketItems });
                    triggerNotification(`✅ ${targetInc.sku} 입고 완료! 현재고에 +${targetInc.amount}개 반영되었습니다.`);
                }
            };

            const handleLogin = (ev) => {
                ev.preventDefault();
                if (pwdInput === SECRET_PASSWORD) { setIsLoggedIn(true); sessionStorage.setItem("isLoggedIn","true"); }
                else { setLoginError(true); setPwdInput(""); }
            };

            const adsOptions = [
                { value:3, label:"최근 3일 실적" }, { value:4, label:"최근 4일 실적" }, { value:5, label:"최근 5일 실적" }
            ];

            // ── 로그인 화면 ───────────────────────────────────────────────
            if (!isLoggedIn) return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 relative overflow-hidden">
                    <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
                    <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl text-center relative z-10">
                        <h1 className="text-2xl font-extrabold text-slate-800 mb-1">N배송 & 로켓배송 재고 현황</h1>
                        <p className="text-sm text-slate-500 mb-8">내부 인원 전용 대시보드입니다.</p>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="password" value={pwdInput} onChange={(e)=>{setPwdInput(e.target.value);setLoginError(false);}}
                                placeholder="비밀번호 입력" autoFocus
                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-center font-bold outline-none focus:ring-2 focus:ring-indigo-500"/>
                            {loginError && <p className="text-xs text-red-500 font-bold animate-bounce">⚠️ 비밀번호가 일치하지 않습니다.</p>}
                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 rounded-xl shadow-lg transition-colors">접속하기</button>
                        </form>
                        <p className="text-xs text-slate-400 mt-6">© 2026 요미몬(주)</p>
                    </div>
                </div>
            );

            // ── 메인 대시보드 ─────────────────────────────────────────────
            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-slate-900 to-indigo-950 text-white shadow-lg pt-5 pb-0 px-6 md:px-10 relative z-50">
                        <div className="flex flex-col md:flex-row items-center justify-between gap-4 pb-5 border-b border-white/10">
                            <div className="flex flex-wrap items-center gap-2">
                                <h1 className="text-2xl font-bold tracking-tight">N배송 &amp; 로켓배송 재고 현황 <span className="text-indigo-400 font-extrabold">(v7)</span></h1>
                                <span className="text-xs bg-emerald-600/50 text-emerald-100 px-2.5 py-0.5 rounded-full font-bold">✅ 브라우저 로컬 저장소 가동중</span>
                            </div>
                        </div>
                        <div className="flex gap-2 mt-0 px-2">
                            <button onClick={() => setCurrentView('argo')} className={`px-6 py-3 font-extrabold text-sm rounded-t-xl tab-btn ${currentView==='argo' ? 'bg-slate-50 text-indigo-900 border-t-4 border-indigo-600' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white mt-1'}`}>
                                📦 N배송(아르고) 재고
                            </button>
                            <button onClick={() => setCurrentView('rocket')} className={`px-6 py-3 font-extrabold text-sm rounded-t-xl tab-btn ${currentView==='rocket' ? 'bg-slate-50 text-blue-900 border-t-4 border-blue-600' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white mt-1'}`}>
                                🚀 로켓배송 재고
                            </button>
                        </div>
                    </header>

                    {notification && (
                        <div className="fixed top-24 right-6 z-[200] animate-bounce">
                            <div className={`px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 border text-sm ${notification.type==="error" ? "bg-red-50 border-red-200 text-red-800" : "bg-emerald-50 border-emerald-200 text-emerald-800"}`}>
                                <span className="font-medium">{notification.message}</span>
                            </div>
                        </div>
                    )}

                    {/* ── 로켓배송 탭 (항상 렌더, 데이터 없으면 안내 표시) ── */}
                    {currentView === 'rocket' && (
                        <main className="flex-grow w-full px-6 md:px-10 py-6 bg-slate-50 flex flex-col gap-6">
                            {/* [FIX] 로켓 데이터 없을 때 안내 화면 */}
                            {rocketDates.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-28 text-center">
                                    <span className="text-6xl mb-5">🚀</span>
                                    <h3 className="text-xl font-extrabold text-slate-600">로켓배송 데이터가 없습니다</h3>
                                    <p className="text-sm text-slate-400 mt-2">아래 엑셀 업로드 영역에서 파일을 올려주세요.</p>
                                    <p className="text-xs text-slate-400 mt-1">첫번째 시트 = 로켓배송, 두번째 시트 = N배송, 세번째 시트 = 출고내역</p>
                                </div>
                            ) : (
                                <>
                                    {/* 컨트롤 바 */}
                                    <div className="flex flex-wrap items-center justify-between gap-4 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                                        <h2 className="font-extrabold text-slate-800 text-xl flex items-center gap-2 px-2">🚀 로켓배송 실시간 상황판</h2>
                                        <div className="flex flex-wrap items-center gap-3">
                                            <label className="flex items-center gap-2 text-sm font-bold text-slate-600 cursor-pointer select-none bg-slate-100 px-4 py-2 rounded-xl">
                                                <input type="checkbox" checked={showZeroStockRocket} onChange={e => setShowZeroStockRocket(e.target.checked)} className="rounded border-slate-300 text-blue-600 w-4 h-4 cursor-pointer"/>
                                                <span>👁️ 30일 연속 재고 0개 포함</span>
                                            </label>
                                            {/* [FIX] 뷰 모드 버튼 (이번달/지난달 추가) */}
                                            <div className="flex flex-wrap items-center gap-2">
                                                {[
                                                    { key:"15", label:"최근 15일" },
                                                    { key:"30", label:"최근 30일" },
                                                    { key:"THISMONTH", label:"이번달" },
                                                    { key:"LASTMONTH", label:"지난달" },
                                                ].map(({ key, label }) => (
                                                    <button key={key} onClick={() => setRocketViewMode(key)}
                                                        className={`px-4 py-2 text-sm font-bold rounded-xl transition-all ${rocketViewMode===key ? "bg-blue-600 text-white shadow-md" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}`}>
                                                        {label}
                                                    </button>
                                                ))}
                                                {/* 년/월 선택 (과거 조회) */}
                                                <div className="flex items-center gap-1 bg-slate-800 rounded-xl p-1 border border-slate-700">
                                                    <ReactCustomDropdown value={rSelectedYear}
                                                        options={rAvailableYears.map(y => ({ value:y, label:`${y}년` }))}
                                                        onChange={v => { setRSelectedYear(v); setRocketViewMode("MONTH"); }}/>
                                                    <div className="w-px h-6 bg-slate-700"></div>
                                                    <ReactCustomDropdown value={rSelectedMonth}
                                                        options={rAvailableMonths.map(m => ({ value:m, label:`${m}월` }))}
                                                        onChange={v => { setRSelectedMonth(v); setRocketViewMode("MONTH"); }}/>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 테이블 */}
                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden flex-grow">
                                        <div className="overflow-x-auto p-4 md:p-6">
                                            <table className="w-full text-left border-collapse border border-slate-200 rounded-xl">
                                                <thead>
                                                    <tr className="bg-slate-100 text-slate-600 text-sm font-bold uppercase whitespace-nowrap">
                                                        <th className="py-4 px-6 border-b border-slate-200 sticky left-0 bg-slate-100 z-10 shadow-[1px_0_0_#e2e8f0]">상품명</th>
                                                        <th className="py-4 px-6 border-b border-slate-200">구성</th>
                                                        <th className="py-4 px-6 border-b border-slate-200">SKU ID</th>
                                                        {visibleRocketDates.length === 0 && <th className="py-4 px-6 border-b border-slate-200">해당 기간 데이터 없음</th>}
                                                        {visibleRocketDates.map(d => <th key={d} className="py-4 px-4 border-b border-slate-200 text-center">{d.substring(5)}</th>)}
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 text-sm">
                                                    {filteredRocketItems.length === 0 ? (
                                                        <tr><td colSpan={visibleRocketDates.length+3} className="py-8 text-center text-slate-400">조건에 맞는 상품이 없습니다.</td></tr>
                                                    ) : filteredRocketItems.map((item, idx) => (
                                                        <tr key={idx} className="hover:bg-blue-50/40 transition-colors">
                                                            <td className="py-4 px-6 font-extrabold text-slate-800 bg-white sticky left-0 z-10 shadow-[1px_0_0_#f1f5f9] whitespace-nowrap">{item.name}</td>
                                                            <td className="py-4 px-6 font-bold text-slate-500 whitespace-nowrap">{item.option}</td>
                                                            <td className="py-4 px-6 font-mono text-slate-400 whitespace-nowrap">{item.skuId}</td>
                                                            {visibleRocketDates.length === 0 && <td className="py-4 px-6"></td>}
                                                            {visibleRocketDates.map((d, i) => {
                                                                const val = item.history[d];
                                                                return (
                                                                    <td key={i} className={`py-4 px-4 text-center font-bold ${val==="-"||val===undefined?"text-slate-300":val==0?"text-red-500":"text-slate-700"}`}>

                                                                    </td>

                                                            })}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </>
                            )}
                        </main>
                    )}

                    {/* ── N배송 탭 ── */}
                    {currentView === 'argo' && dbDates.length > 0 && (
                        <main className="flex-grow w-full px-6 md:px-10 py-6 space-y-6">
                            {/* 컨트롤 바 */}
                            <div className="flex flex-wrap items-center justify-between gap-4 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                                <h2 className="font-extrabold text-slate-800 text-xl flex items-center gap-2 px-2">📦 N배송(아르고) 분석 상황판</h2>
                                <div className="flex flex-wrap items-center gap-3">
                                    <div className="flex items-center gap-2 bg-slate-800 rounded-xl p-1 border border-slate-700">
                                        <ReactCustomDropdown value={selectedYear} options={availableYears.map(y=>({value:y,label:`${y}년`}))} onChange={setSelectedYear}/>
                                        <div className="w-px h-6 bg-slate-700"></div>
                                        <ReactCustomDropdown value={selectedMonth} options={availableMonths.map(m=>({value:m,label:`${m}월`}))} onChange={setSelectedMonth}/>
                                        <div className="w-px h-6 bg-slate-700"></div>
                                        <ReactCustomDropdown value={selectedDate}
                                            options={dateOptionsForMonth.map(dt=>({ value:dt, label:`${dt.substring(8)}일${dt===dbDates[dbDates.length-1]?" (최신)":""}` }))}
                                            onChange={setSelectedDate}/>
                                    </div>
                                    <ReactCustomDropdown label="ADS 산정" value={adsWindow} options={adsOptions} onChange={setAdsWindow}/>
                                </div>
                            </div>

                            {/* 미입고 대기 */}
                            <div className={`transition-all duration-300 ${pendingDispatches.length>0?'bg-gradient-to-r from-amber-50 to-orange-50 border-2 border-orange-200':'bg-white border-2 border-slate-200'} rounded-3xl shadow-sm overflow-hidden`}>
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 p-4 md:p-6">
                                    <h3 className={`text-lg font-extrabold flex items-center gap-2 ${pendingDispatches.length>0?'text-orange-900':'text-slate-600'}`}>
                                        {pendingDispatches.length>0 ? "⚠️ 7일 내 공장 출고완료 대기현황" : "🎉 모든 출고건이 아르고에 입고 완료되었습니다."}
                                    </h3>
                                </div>
                                {pendingDispatches.length > 0 && (
                                    <div className="p-4 md:p-6 pt-0 border-t border-orange-200/50">
                                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mt-4">
                                            {pendingDispatches.map((inc, idx) => (
                                                <div key={idx} className="bg-white p-4 rounded-2xl border border-orange-200/60 shadow-sm flex flex-col gap-3">
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-xs font-black uppercase tracking-wider bg-orange-100 text-orange-800 px-2 py-0.5 rounded-md">{inc.type} 수송</span>
                                                        <span className="text-xs font-bold text-slate-400">출고: {inc.date.slice(5)}</span>
                                                    </div>
                                                    <h4 className="font-extrabold text-slate-800 text-sm">{inc.sku}</h4>
                                                    <span className="text-2xl font-black text-orange-600">+{inc.amount.toLocaleString()} <span className="text-xs text-slate-500">개 대기</span></span>
                                                    <button onClick={() => toggleIncomingRegistration(idx)} className="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-extrabold px-3 py-2 rounded-lg transition-colors">입고 완료처리 ✓ (현재고 + 합산)</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* 요약 카드 */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {[
                                    { label:"🚨 7일내 긴급 대응", value:summaryMetrics.criticalCount, unit:"개 SKU", color:"text-red-600" },
                                    { label:"⚠️ 30일내 보충 경고", value:summaryMetrics.warningCount, unit:"개 SKU", color:"text-amber-500" },
                                    { label:"📦 보관 총 재고수량", value:summaryMetrics.totalStock.toLocaleString(), unit:"개", color:"text-indigo-600" },
                                    { label:"🚚 총 일평균 판매량(ADS)", value:summaryMetrics.totalDailySales, unit:"개 / 일", color:"text-teal-600" },
                                ].map(({ label, value, unit, color }) => (
                                    <div key={label} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                                        <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">{label}</span>
                                        <div className="flex items-baseline gap-2 mt-2">
                                            <span className={`text-4xl font-extrabold ${color}`}>{value}</span>
                                            <span className="text-sm font-medium text-slate-500">{unit}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* 테이블 + 차트 */}
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                                <div className="lg:col-span-9 bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-6 border-b border-slate-100 bg-slate-50/50 space-y-4">
                                        <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                                            <h2 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                                                <span>📋 실시간 입출고/품절 예측 상황판</span>
                                                <span className="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold">{filteredSkuList.length}개 표시</span>
                                            </h2>
                                            <div className="flex gap-2 overflow-x-auto pb-1 md:pb-0">
                                                {["ALL","클레이","플레이돌","와우펜","키즈탭","기타"].map(cat => (
                                                    <button key={cat} onClick={() => setCategoryFilter(cat)}
                                                        className={`px-4 py-1.5 text-xs font-bold rounded-xl transition-all ${categoryFilter===cat?"bg-indigo-600 text-white":"bg-slate-200/60 text-slate-600 hover:bg-slate-200"}`}>
                                                        {cat==="ALL"?"전체":cat}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-12 gap-3">
                                            <div className="md:col-span-6 relative">
                                                <input type="text" placeholder="품목명 검색..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                                                    className="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20"/>
                                                <span className="absolute left-3.5 top-3 text-slate-400">🔍</span>
                                            </div>
                                            <div className="md:col-span-6 flex flex-wrap items-center justify-end gap-x-6 gap-y-1">
                                                {[
                                                    { state:onlyCritical30, setter:setOnlyCritical30, label:"⏳ 30일 이내 품절" },
                                                    { state:excludeZeroStock, setter:setExcludeZeroStock, label:"🚫 재고 0개 제외" }
                                                ].map(({ state, setter, label }) => (
                                                    <label key={label} className="flex items-center gap-2 text-sm font-bold text-slate-600 cursor-pointer select-none">
                                                        <input type="checkbox" checked={state} onChange={e => setter(e.target.checked)} className="rounded border-slate-300 text-indigo-600 w-4 h-4 cursor-pointer"/>
                                                        <span>{label}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50/80 border-b border-slate-100 text-slate-500 text-xs font-extrabold uppercase tracking-wider">
                                                    <th className="py-4 px-6">분류</th>
                                                    <th className="py-4 px-6">SKU</th>
                                                    <th className="py-4 px-6 text-center">현재고 ({selectedDate.slice(5)})</th>
                                                    <th className="py-4 px-6 text-center">ADS</th>
                                                    <th className="py-4 px-6">예상 품절일</th>
                                                    <th className="py-4 px-6">잔여기간</th>
                                                    <th className="py-4 px-6 text-right">보충 필요(30일분)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 text-sm">
                                                {filteredSkuList.map(item => {
                                                    const isSel = selectedSku === item.sku;
                                                    const isCritical = item.daysRemaining <= 10;
                                                    const isWarning = item.daysRemaining > 10 && item.daysRemaining <= 30;
                                                    return (
                                                        <tr key={item.sku} onClick={() => setSelectedSku(item.sku)}
                                                            className={`hover:bg-indigo-50/40 cursor-pointer transition-all border-l-4 ${isSel?"bg-indigo-50/80 border-l-indigo-600":"border-l-transparent"}`}>
                                                            <td className="py-5 px-6 font-bold text-slate-400">{item.category}</td>
                                                            <td className="py-5 px-6 font-bold text-slate-900">{item.sku}</td>
                                                            <td className="py-5 px-6 text-center font-extrabold text-slate-900 text-base">
                                                                {item.currentStock.toLocaleString()}
                                                                {item.simulatedArrivals > 0 && <span className="block text-xs text-emerald-600 font-extrabold mt-1">(+{item.simulatedArrivals} 예약)</span>}
                                                            </td>
                                                            <td className="py-5 px-6 text-center text-slate-700 font-mono font-semibold">{item.ads.toFixed(2)}</td>
                                                            <td className="py-5 px-6">
                                                                <span className={`font-mono text-sm px-3 py-1.5 rounded-lg font-bold w-max ${isCritical?"bg-red-100 text-red-800":isWarning?"bg-amber-100 text-amber-800":"text-slate-600"}`}>
                                                                    📅 {item.expectedStockoutDate}
                                                                </span>
                                                            </td>
                                                            <td className="py-5 px-6">
                                                                <span className={`inline-flex px-3 py-1 rounded-full text-xs font-extrabold ${isCritical?"bg-red-200 text-red-900":isWarning?"bg-amber-200 text-amber-900":"bg-emerald-200 text-emerald-900"}`}>
                                                                    {item.displayRemainingText}
                                                                </span>
                                                            </td>
                                                            <td className="py-5 px-6 text-right font-extrabold text-indigo-700 text-base">{item.replenishment30.toLocaleString()}</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* 차트 패널 */}
                                <div className="lg:col-span-3 space-y-6">
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-5">
                                        <h3 className="text-xl font-bold text-slate-900 leading-tight">{selectedSku || "항목을 선택하세요"}</h3>
                                        <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                            <span className="text-xs font-semibold text-slate-500 block mb-3">과거 재고 수준 추이 ({selectedDate.slice(5)} 기준)</span>
                                            <div className="h-36 w-full flex items-end justify-between gap-1 pt-4">
                                                {skuHistoryPoints.length > 0 ? skuHistoryPoints.map((pt, idx) => {
                                                    const maxStock = Math.max(...skuHistoryPoints.map(p => p.stock), 50);
                                                    return (
                                                        <div key={idx} className="flex-1 flex flex-col items-center h-full justify-end">
                                                            <div style={{ height:`${(pt.stock/maxStock)*100}%` }} className={`w-full rounded-t-sm transition-all duration-300 ${idx===skuHistoryPoints.length-1?"bg-indigo-600":"bg-slate-300"}`}></div>
                                                            <span className="text-[9px] text-slate-400 mt-1 font-mono">{pt.date.slice(5)}</span>
                                                        </div>
                                                    );
                                                }) : <div className="text-xs text-slate-400 m-auto">데이터 없음</div>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {/* 엑셀 업로드 */}
                    <div className="px-6 md:px-10 pb-10 w-full mt-auto">
                        <div className="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 space-y-4">
                            <div>
                                <h4 className="font-extrabold text-slate-800 text-base flex items-center gap-2">
                                    <span>📊 통합 엑셀 파일 직접 연동 관리자</span>
                                    <span className="text-xs bg-indigo-100 text-indigo-700 font-extrabold px-2.5 py-0.5 rounded-full">Super Parser V6</span>
                                </h4>
                                <p className="text-xs text-slate-400 mt-1">
                                    시트 순서: <strong>1번 = 로켓배송</strong> / <strong>2번 = N배송 재고</strong> / <strong>3번 = 아르고 출고내역</strong> — 이 순서로 자동 인식합니다.
                                </p>
                            </div>
                            <div className="border-2 border-dashed border-indigo-200 hover:border-indigo-500 rounded-2xl p-10 text-center cursor-pointer transition-colors bg-indigo-50/20 relative">
                                <input type="file" accept=".xlsx,.xls,.csv" onChange={handleUnifiedExcelUpload} onClick={e => e.target.value=null} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10"/>
                                <span className="text-4xl block mb-4">📂</span>
                                <h5 className="text-sm font-extrabold text-indigo-950">여기에 엑셀 파일을 드래그 앤 드롭 하세요</h5>
                                <p className="text-xs text-indigo-500 mt-1">로켓배송 / N배송 / 아르고발송 시트를 자동 인식하여 한 번에 합산합니다.</p>
                            </div>
                        </div>
                    </div>

                    <footer className="bg-slate-900 text-slate-500 text-xs py-6 border-t border-slate-800">
                        <div className="max-w-full mx-auto px-10 text-center">
                            <p>© 2026 요미몬(주) 통합 재고 관리 시스템. All Rights Reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
