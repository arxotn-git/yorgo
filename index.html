        // 📅 네이티브 엑셀 날짜 해석기
        const parseExcelDateCell = (cell) => {
            if (!cell && cell !== 0) return null;
            if (cell instanceof Date) {
                if (isNaN(cell.getTime())) return null;
                return `${cell.getFullYear()}-${String(cell.getMonth()+1).padStart(2,'0')}-${String(cell.getDate()).padStart(2,'0')}`;
            }
            const s = String(cell).trim();
            if (!s) return null;
            const n = Number(s);
            if (!isNaN(n) && n > 40000 && n < 60000 && !/[\/\-년월일]/.test(s)) {
                const d = new Date(Math.round((n - 25569) * 86400 * 1000));
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }
            const km = s.match(/(\d{2,4})년\s*(\d{1,2})월\s*(\d{1,2})일?/);
            if (km) { const y=km[1].length===2?`20${km[1]}`:km[1]; return `${y}-${km[2].padStart(2,'0')}-${km[3].padStart(2,'0')}`; }
            const m3 = s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
            if (m3) return `${m3[1]}-${m3[2].padStart(2,'0')}-${m3[3].padStart(2,'0')}`;
            const m3y = s.match(/^(\d{2})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
            if (m3y) return `20${m3y[1]}-${m3y[2].padStart(2,'0')}-${m3y[3].padStart(2,'0')}`;
            const m2 = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})$/);
            if (m2) { const mo=parseInt(m2[1]); const y=mo>8?"2025":"2026"; return `${y}-${m2[1].padStart(2,'0')}-${m2[2].padStart(2,'0')}`; }
            return null;
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(() => sessionStorage.getItem("ili") === "1");
            const [pwd, setPwd] = useState("");
            const [pwdErr, setPwdErr] = useState(false);
            const [view, setView] = useState("argo");
            const [notif, setNotif] = useState(null);

            const [dbDates, setDbDates] = useState(INITIAL_DATES);
            const [dbStock, setDbStock] = useState(INITIAL_STOCK_DATA);
            const [dbInc, setDbInc] = useState(INITIAL_INCOMINGS);
            const [rDates, setRDates] = useState([]);
            const [rItems, setRItems] = useState([]);

            // 드래그 스크롤 핸들링 레퍼런스
            const argoTableRef = useRef(null);
            const rocketTableRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);
            const [startX, setStartX] = useState(0);
            const [scrollLeft, setScrollLeft] = useState(0);

            // 로켓탭 30일 재고 0개 제외 기본값 활성화 (True)

            // ── 로컬 스토리지 복원 ──
            useEffect(() => {
                try {
                    const raw = localStorage.getItem(LS_KEY);
                    if (raw) {
                        const d = JSON.parse(raw);
                        if (d.DATES?.length) setDbDates(d.DATES);
                        if (d.STOCK && Object.keys(d.STOCK).length) setDbStock(d.STOCK);
                        if (d.INC) setDbInc(d.INC);
                        if (d.RDATES) setRDates(d.RDATES);
                        if (d.RITEMS) setRItems(d.RITEMS);
                    }
                } catch(e) {}
            }, []);

            const saveLocal = (data) => {
                try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
            };

            const triggerNotification = (msg, type="success") => {
                setNotif({message: msg, type});
                setTimeout(()=>setNotif(null), 4500);
            };

            // ── 드래그 가로 스크롤 조작 함수 ──
            const handleMouseDown = (e, ref) => {
                if (e.target.closest('button') || e.target.closest('input') || e.target.closest('select')) return;
                setIsDragging(true);
                setStartX(e.pageX - ref.current.offsetLeft);
                setScrollLeft(ref.current.scrollLeft);
            };
            const handleMouseMove = (e, ref) => {
                if (!isDragging) return;
                e.preventDefault();
                const x = e.pageX - ref.current.offsetLeft;
                const walk = (x - startX) * 1.5;
                ref.current.scrollLeft = scrollLeft - walk;
            };
            const handleMouseUpOrLeave = () => {
                setIsDragging(false);
            };

            // ── 수동 퀵 가로 스크롤 버튼 ──
            const scrollTableHorizontally = (ref, direction) => {
                if (ref.current) {
                    const offset = direction === 'left' ? -350 : 350;
                    ref.current.scrollBy({ left: offset, behavior: 'smooth' });
                }
            };

            // ── N배송 필터 ──
            const [showAllArgoHistory, setShowAllHistory] = useState(false);

            const availableYears = useMemo(() => {
                if (!dbDates.length) return ["2026"];
                return [...new Set(dbDates.map(d => d.substring(0,4)))].sort().reverse();
            }, [dbDates]);
            const [selectedYear, setSelectedYear] = useState(() => availableYears[0]);

            const availableMonths = useMemo(() => {
                if (!dbDates.length) return ["06"];
                return [...new Set(dbDates.filter(d => d.startsWith(selectedYear)).map(d => d.substring(5,7)))].sort().reverse();
            }, [dbDates, selectedYear]);
            const [selectedMonth, setSelectedMonth] = useState(() => availableMonths[0]);

            const visibleArgoDates = useMemo(() => {
                return showAllArgoHistory ? dbDates : dbDates.slice(-14);
            }, [dbDates, showAllArgoHistory]);

            const dateOptionsForMonth = useMemo(() => {
                let options = showAllArgoHistory 
                    ? dbDates.filter(d => d.startsWith(`${selectedYear}-${selectedMonth}`)) 
                    : visibleArgoDates;
                return [...options].reverse();
            }, [dbDates, selectedYear, selectedMonth, showAllArgoHistory, visibleArgoDates]);

            const [selectedDate, setSelectedDate] = useState(() => dateOptionsForMonth[0] || "");

            useEffect(() => { if (!availableYears.includes(selectedYear)) setSelectedYear(availableYears[0]); }, [availableYears]);
            useEffect(() => { if (!availableMonths.includes(selectedMonth)) setSelectedMonth(availableMonths[0]); }, [selectedYear, availableMonths]);
            useEffect(() => { if (dateOptionsForMonth.length && !dateOptionsForMonth.includes(selectedDate)) setSelectedDate(dateOptionsForMonth[0]); }, [dateOptionsForMonth]);

            // ── 로켓배송 필터 ──
            const [rocketViewMode, setRocketViewMode] = useState("15");

            const rAvailableYears = useMemo(() => {
                if (!rDates.length) return ["2026"];
                return [...new Set(rDates.map(d => d.substring(0,4)))].sort().reverse();
            }, [rDates]);
            const [rSelectedYear, setRSelectedYear] = useState(() => rAvailableYears[0]);

            const rAvailableMonths = useMemo(() => {
                if (!rDates.length) return ["06"];
                return [...new Set(rDates.filter(d => d.startsWith(rSelectedYear)).map(d => d.substring(5,7)))].sort().reverse();
            }, [rDates, rSelectedYear]);
            const [rSelectedMonth, setRSelectedMonth] = useState(() => rAvailableMonths[0]);

            useEffect(() => { if (!rAvailableYears.includes(rSelectedYear)) setRSelectedYear(rAvailableYears[0]); }, [rAvailableYears]);
            useEffect(() => { if (!rAvailableMonths.includes(rSelectedMonth)) setRSelectedMonth(rAvailableMonths[0]); }, [rSelectedYear, rAvailableMonths]);

            // 🌟 [핵심 버그 해결] '이번달/지난달' 계산을 실제 기기시간이 아닌 "업로드 파일의 최신 날짜" 기준으로 동적 연동
            const thisMonthStr = useMemo(() => { 
                if (!rDates.length) return "2026-06";
                const latestDate = rDates[rDates.length - 1]; // 정렬되어 있으므로 가장 마지막 값이 최신
                return latestDate.substring(0, 7); // 예: "2024-12"
            }, [rDates]);

            const lastMonthStr = useMemo(() => { 
                if (!rDates.length) return "2026-05";
                const latestDate = rDates[rDates.length - 1];
                const d = new Date(latestDate.split(" ")[0]);
                d.setMonth(d.getMonth() - 1);
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; // 예: "2024-11"
            }, [rDates]);

            const visibleRocketDates = useMemo(() => {
                if (!rDates.length) return [];
                if (rocketViewMode === "15") return [...rDates].slice(-15);
                if (rocketViewMode === "30") return [...rDates].slice(-30);
                if (rocketViewMode === "THISMONTH") return rDates.filter(d => d.startsWith(thisMonthStr));
                if (rocketViewMode === "LASTMONTH") return rDates.filter(d => d.startsWith(lastMonthStr));
                if (rocketViewMode === "MONTH") return rDates.filter(d => d.startsWith(`${rSelectedYear}-${rSelectedMonth}`));
                return rDates;
            }, [rDates, rocketViewMode, rSelectedYear, rSelectedMonth, thisMonthStr, lastMonthStr]);

            const filteredRocketItems = useMemo(() => {
                return rItems.filter(item => {
                    if (!showZeroStockRocket) {
                        const recent30 = rDates.slice(-30);
                        const hasStock = recent30.some(d => {
                            const v = item.history[d];
                            return v !== "-" && v !== undefined && parseInt(v) > 0;
                        });
                        if (!hasStock) return false;
                    }
                    return true;
                });
            }, [rItems, rDates, showZeroStockRocket]);

            // ── N배송 분석 로직 ──
            const [adsWin, setAdsWin] = useState(4);
            const adsOptions = [
                { value: 3, label: "최근 3일 실적" },
                { value: 4, label: "최근 4일 실적 (안전)" },
                { value: 5, label: "최근 5일 실적" }
            ];

            const [only30, setOnly30] = useState(true);
            const [exZero, setExZero] = useState(true);
            const [search, setSearch] = useState("");
            const [catF, setCatF] = useState("ALL");
            const [selSku, setSelSku] = useState("");

            const aDateIdx = useMemo(() => {
                const i = dbDates.indexOf(selectedDate);
                return i !== -1 ? i : Math.max(0, dbDates.length - 1);
            }, [selectedDate, dbDates]);

            const calcSku = (sku, ti) => {
                const cur = dbStock[sku]?.[ti] || 0;
                const si = Math.max(0, ti - adsWin);
                const startStock = dbStock[sku]?.[si] || 0;
                const sDt = cleanDateForParse(dbDates[si]);
                const tDt = cleanDateForParse(dbDates[ti]);
                const days = Math.max(1, Math.ceil(Math.abs(tDt - sDt) / 86400000));
                const delta = startStock - cur;
                
                let winInc = 0, pendingArrivals = 0;
                dbInc.forEach(inc => {
                    if (inc.sku !== sku) return;
                    const dt = cleanDateForParse(inc.date);
                    if (isNaN(dt.getTime())) return;
                    let present = false;
                    if (inc.isRegistered) {
                        present = true;
                        if (dt > sDt && dt <= tDt && cur < inc.amount * 0.8 && delta >= 0) present = false;
                    }
                    if (present) { if (dt > sDt && dt <= tDt) winInc += inc.amount; }
                    else pendingArrivals += inc.amount;
                });
                
                const sales = delta + winInc;
                const ads = Math.max(0, parseFloat((sales / days).toFixed(2)));
                let dr = Infinity, esd = "안전 (우려없음)", drt = "99일 이상";
                
                if (ads > 0) {
                    const tot = cur + pendingArrivals;
                    dr = tot / ads;
                    if (dr < 365) {
                        const sd = new Date(tDt); sd.setDate(sd.getDate() + Math.floor(dr));
                        esd = sd.toISOString().split('T')[0];
                        drt = `${Math.ceil(dr)}일 남음`;
                    }
                }
                return {
                    sku, category: CATEGORIES[sku] || "기타", currentStock: cur, ads, daysRemaining: dr,
                    displayRemainingText: drt, expectedStockoutDate: esd, replenishment30: ads > 0 ? Math.ceil(ads * 30) : 0, simulatedArrivals: pendingArrivals
                };
            };

            const allSkus = useMemo(() => Object.keys(dbStock).map(s => calcSku(s, aDateIdx)), [aDateIdx, adsWin, dbStock, dbDates, dbInc]);
            const filtSkus = useMemo(() => allSkus.filter(i => {
                if (exZero && i.currentStock === 0) return false;
                if (only30 && i.daysRemaining > 30) return false;
                if (catF !== "ALL" && i.category !== catF) return false;
                if (search && !i.sku.includes(search)) return false;
                return true;
            }).sort((a, b) => a.daysRemaining - b.daysRemaining), [allSkus, only30, exZero, search, catF]);

            const pending = useMemo(() => {
                if (!dbDates.length) return [];
                const latestT = cleanDateForParse(dbDates[dbDates.length - 1]).getTime();
                return dbInc.filter(i => !i.isRegistered).map(i => {
                    const dt = cleanDateForParse(i.date).getTime();
                    if ((latestT - dt) / 86400000 > 7) return null; // 7일 이상 경과시 노출 제외
                    const arr = cleanDateForParse(i.date);
                    if (i.type === "택배") arr.setDate(arr.getDate() + 3);
                    return { ...i, arrivalDateStr: arr.toISOString().split('T')[0] };
                }).filter(Boolean);
            }, [dbInc, dbDates]);

            const summaryMetrics = useMemo(() => ({
                criticalCount: allSkus.filter(i => i.daysRemaining <= 10).length,
                warningCount: allSkus.filter(i => i.daysRemaining > 10 && i.daysRemaining <= 30).length,
                totalStock: allSkus.reduce((s, i) => s + i.currentStock, 0),
                totalDailySales: allSkus.reduce((s, i) => s + i.ads, 0).toFixed(1)
            }), [allSkus]);

            const skuHistoryPoints = useMemo(() => {
                if (!selSku || !dbStock[selSku]) return [];
                return dbDates.slice(0, aDateIdx + 1).map((d, i) => ({ date: d, stock: dbStock[selSku][i] || 0 }));
            }, [selSku, aDateIdx, dbStock, dbDates]);

            // ── 통합 엑셀 연동 업로드 기능 ──
            const handleUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const wb = XLSX.read(ev.target.result, { type:'binary', cellDates:true });
                        const sn = wb.SheetNames;

                        // 시트 고정 순서 (1번 로켓, 2번 N배송, 3번 출고)
                        const sRocket = sn[0] ? wb.Sheets[sn[0]] : null;
                        const sArgo   = sn[1] ? wb.Sheets[sn[1]] : null;
                        const sDisp   = sn[2] ? wb.Sheets[sn[2]] : null;

                        let nRD=[...rDates], nRI=[...rItems];
                        let nAD=[...dbDates], nAS={...dbStock};
                        let nInc=[...dbInc]; 

                        // ── 로켓 시트 파싱 ──
                        if (sRocket) {
                            const rows = XLSX.utils.sheet_to_json(sRocket, {header:1, raw:true, defval:""});
                            if (rows.length>1) {
                                const hRow = rows[0];
                                const dCols = [];
                                hRow.forEach((c,i)=>{
                                    if (i<3) return; 
                                    const fd = parseExcelDateCell(c);
                                    if (fd) dCols.push({index:i, label:fd});
                                });
                                const pDates = dCols.map(c=>c.label);
                                nRD = [...new Set([...rDates,...pDates])].sort();
                                
                                const iMap = {};
                                nRI.forEach(it=>{ iMap[`${it.name}_${it.option}`]={...it,history:{...it.history}}; });
                                
                                for (let i=1;i<rows.length;i++) {
                                    const row=rows[i];
                                    if(!row?.length) continue;
                                    const name=String(row[0]||"").trim();
                                    const option=String(row[1]||"").trim();
                                    const skuId=String(row[2]||"").trim();
                                    if(!name||name==="undefined") continue;
                                    const key=`${name}_${option}`;
                                    if(!iMap[key]) iMap[key]={name,option,skuId,history:{}};
                                    
                                    dCols.forEach((col,ci)=>{
                                        const raw=row[col.index];
                                        let val="-";
                                        if(raw!==""&&raw!==undefined&&raw!==null) {
                                            if(typeof raw==="number") val=Math.round(raw);
                                            else { const n=parseInt(String(raw).replace(/,/g,"")); val=isNaN(n)?String(raw):n; }
                                        }
                                        iMap[key].history[pDates[ci]]=val;
                                    });
                                }
                                nRI=Object.values(iMap);
                            }
                        }

                        // ── N배송 재고 시트 파싱 ──
                        if (sArgo) {
                            const rows = XLSX.utils.sheet_to_json(sArgo, {header:1, raw:true, defval:""});
                            if (rows.length>1) {
                                const hRow=rows[0];
                                const dCols=[];
                                hRow.forEach((c,i)=>{
                                    const fd=parseExcelDateCell(c);
                                    if(fd) dCols.push({index:i,label:fd});
                                });
                                const pDates=dCols.map(c=>c.label);
                                nAD=[...new Set([...dbDates,...pDates])].sort();
                                
                                const origStock={...dbStock};
                                Object.keys(origStock).forEach(k=>{
                                    nAS[k]=nAD.map(d=>{ const oi=dbDates.indexOf(d); return oi!==-1?(origStock[k]?.[oi]||0):0; });
                                });
                                
                                for (let i=1;i<rows.length;i++) {
                                    const row=rows[i];
                                    if(!row?.length) continue;
                                    const sku=cleanSkuName(String(row[0]||"").trim());
                                    if(!sku||!CATEGORIES[sku]) continue;
                                    if(!nAS[sku]) nAS[sku]=new Array(nAD.length).fill(0);
                                    
                                    dCols.forEach((col,ci)=>{
                                        const raw=row[col.index];
                                        const val=typeof raw==="number"?Math.round(raw):(parseInt(String(raw).replace(/,/g,""))||0);
                                        const ui=nAD.indexOf(pDates[ci]);
                                        if(ui!==-1) nAS[sku][ui]=val;
                                    });
                                }
                            }
                        }

                        // ── 출고 시트 파싱 ──
                        if (sDisp) {
                            try {
                                const rows=XLSX.utils.sheet_to_json(sDisp,{header:1,raw:true,defval:""});
                                if(rows.length>1) {
                                    const hRow=rows[0];
                                    const dCols=[];
                                    const latestArgoStr=(nAD[nAD.length-1]||"2026-06-02").split(" ")[0];
                                    const latestArgoTime=new Date(latestArgoStr).getTime();
                                    
                                    hRow.forEach((c,i)=>{
                                        if(i===0) return;
                                        const fd=parseExcelDateCell(c);
                                        if(!fd) return;
                                        const dispTime=new Date(fd.split(" ")[0]).getTime();
                                        if(dispTime>latestArgoTime) dCols.push({index:i,label:fd});
                                    });
                                    
                                    for(let i=1;i<rows.length;i++) {
                                        const row=rows[i];
                                        if(!row?.length) continue;
                                        const sku=cleanSkuName(String(row[0]||"").trim());
                                        if(!sku) continue;
                                        dCols.forEach(col=>{
                                            const raw=row[col.index];
                                            const amount=typeof raw==="number"?Math.round(raw):(parseInt(String(raw).replace(/,/g,""))||0);
                                            if(amount<=0) return;
                                            const type=col.label.includes("용차")?"용차":"택배";
                                            const cleanDate=col.label.split(" ")[0];
                                            const exists=nInc.some(inc=>inc.sku===sku&&inc.date===cleanDate);
                                            if(!exists) nInc.push({sku,date:cleanDate,amount,type,isRegistered:false});
                                        });
                                    }
                                }
                            } catch(e) { console.warn("출고 시트 파싱 스킵:", e); }
                        }

                        setDbDates(nAD); setDbStock(nAS); setDbInc(nInc);
                        setRDates(nRD); setRItems(nRI);
                        saveLocal({DATES:nAD,STOCK:nAS,INC:nInc,RDATES:nRD,RITEMS:nRI});

                        if(nAD.length) {
                            const last=nAD[nAD.length-1];
                            setSelectedYear(last.slice(0,4)); setSelectedMonth(last.slice(5,7)); setSelectedDate(last);
                        }
                        if(nRD.length) { setRSelectedYear(nRD[nRD.length-1].slice(0,4)); setRSelectedMonth(nRD[nRD.length-1].slice(5,7)); }
                        triggerNotification("🎉 엑셀 분석 완료! 모든 데이터가 저장되었습니다.");
                    } catch(err) {
                        console.error(err);
                        triggerNotification("엑셀 파일 파싱 오류. 시트 구성을 확인하세요.", "error");
                    }
                };
                reader.readAsBinaryString(file);
            };

            const toggleIncomingRegistration = (idx) => {
                const targetInc = pending[idx];
                const updatedIncomings = [...dbInc];
                const gi = updatedIncomings.findIndex(x=>x.sku===targetInc.sku&&x.date===targetInc.date&&x.amount===targetInc.amount);
                if(gi!==-1) {
                    updatedIncomings[gi].isRegistered = true;
                    const updatedStock = { ...dbStock };
                    if(updatedStock[targetInc.sku]&&dbDates.length) {
                        updatedStock[targetInc.sku][dbDates.length-1]+=targetInc.amount;
                    }
                    setDbInc(updatedIncomings); 
                    setDbStock(updatedStock);
                    saveLocal({DATES:dbDates,STOCK:updatedStock,INC:updatedIncomings,RDATES:rDates,RITEMS:rItems});
                    triggerNotification(`✅ ${targetInc.sku} 입고 완료! +${targetInc.amount.toLocaleString()}개 반영`);
                }
            };

            const handleLogin = (ev) => {
                ev.preventDefault();
                if(pwd===SECRET_PASSWORD){setIsLoggedIn(true);sessionStorage.setItem("ili","1");}
                else{setPwdErr(true);setPwd("");}
            };

            // ── 로그인 화면 ──
            if (!isLoggedIn) return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 relative overflow-hidden">
                    <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
                    <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl text-center relative z-10">
                        <h1 className="text-2xl font-extrabold text-slate-800 mb-1">N배송 & 로켓배송 통합 재고현황</h1>
                        <p className="text-sm text-slate-500 mb-8">내부 인원 전용 대시보드입니다.</p>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="password" value={pwd} onChange={e=>{setPwd(e.target.value);setPwdErr(false);}} placeholder="비밀번호 입력" autoFocus
                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-center font-bold outline-none focus:ring-2 focus:ring-indigo-500"/>
                            {pwdErr && <p className="text-xs text-red-500 font-bold animate-bounce">⚠️ 비밀번호가 일치하지 않습니다.</p>}
                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 rounded-xl shadow-lg transition-colors">접속하기</button>
                        </form>
                        <p className="text-xs text-slate-400 mt-6">© 2026 요미몬(주)</p>
                    </div>
                </div>
            );

            // ── 메인 대시보드 ──
            return (
                <div className="min-h-screen flex flex-col select-none">
                    <header className="bg-gradient-to-r from-slate-900 to-indigo-950 text-white shadow-lg pt-5 pb-0 px-6 md:px-10 relative z-50">
                        <div className="flex flex-wrap items-center gap-3 pb-5 border-b border-white/10">
                            <h1 className="text-2xl font-bold">N배송 &amp; 로켓배송 통합 재고현황 <span className="text-indigo-400">(v8)</span></h1>
                            <span className="text-xs bg-emerald-600/50 text-emerald-100 px-2.5 py-0.5 rounded-full font-bold">✅ 브라우저 로컬 저장소 가동중</span>
                        </div>
                        <div className="flex gap-2 px-2 mt-0">
                            <button onClick={()=>setView("argo")} className={`px-6 py-3 font-extrabold text-sm rounded-t-xl tab-btn ${view==="argo"?'bg-slate-50 text-indigo-900 border-t-4 border-indigo-600':'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white mt-1'}`}>
                                📦 N배송(아르고) 재고
                            </button>
                            <button onClick={()=>setView("rocket")} className={`px-6 py-3 font-extrabold text-sm rounded-t-xl tab-btn ${view==="rocket"?'bg-slate-50 text-blue-900 border-t-4 border-blue-600':'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white mt-1'}`}>
                                🚀 로켓배송 재고
                            </button>
                        </div>
                    </header>

                    {notif && (
                        <div className="fixed top-24 right-6 z-[200]">
                            <div className={`px-4 py-3 rounded-xl shadow-2xl border text-sm font-medium ${notif.type==="error"?"bg-red-50 border-red-200 text-red-800":"bg-emerald-50 border-emerald-200 text-emerald-800"}`}>
                                {notif.message}
                            </div>
                        </div>
                    )}

                    {/* ── 로켓배송 탭 ── */}
                    {view==="rocket" && (
                        <main className="flex-grow w-full px-6 md:px-10 py-6 bg-slate-50 flex flex-col gap-6 relative">
                            {rDates.length===0 ? (
                                <div className="flex flex-col items-center justify-center py-28 text-center">
                                    <span className="text-6xl mb-5">🚀</span>
                                    <h3 className="text-xl font-extrabold text-slate-600">로켓배송 데이터가 없습니다</h3>
                                    <p className="text-sm text-slate-400 mt-2">아래 엑셀 업로드 영역에서 파일을 한 번만 올려주세요.</p>
                                </div>
                            ) : (
                                <>
                                    <div className="flex flex-wrap items-center justify-between gap-4 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                                        <h2 className="font-extrabold text-slate-800 text-xl px-2">🚀 로켓배송 실시간 상황판
                                            <span className="ml-2 text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold">{filteredRocketItems.length}개 상품</span>
                                        </h2>
                                        <div className="flex flex-wrap items-center gap-2">
                                            <label className="flex items-center gap-2 text-sm font-bold text-slate-600 cursor-pointer select-none bg-slate-100 px-3 py-2 rounded-xl">
                                                <input type="checkbox" checked={!showZeroStockRocket} onChange={e=>setShowZeroStockRocket(!e.target.checked)} className="rounded border-slate-300 text-blue-600 w-4 h-4 cursor-pointer"/>
                                                <span>30일 재고 0개 제외</span>
                                            </label>
                                            {[["15","최근 15일"],["30","최근 30일"],["THISMONTH","이번달"],["LASTMONTH","지난달"]].map(([k,l])=>(
                                                <button key={k} onClick={()=>setRocketViewMode(k)}
                                                    className={`px-4 py-2 text-sm font-bold rounded-xl transition-all ${rocketViewMode===k?"bg-blue-600 text-white shadow-md":"bg-slate-100 text-slate-600 hover:bg-slate-200"}`}>
                                                    {l}
                                                </button>
                                            ))}
                                            <div className="flex items-center gap-1 bg-slate-800 rounded-xl p-1 border border-slate-700">
                                                <Dropdown value={rSelectedYear} options={rAvailableYears.map(y=>({value:y,label:`${y}년`}))} onChange={v=>{setRSelectedYear(v);setRocketViewMode("MONTH");}}/>
                                                <div className="w-px h-6 bg-slate-700"></div>
                                                <Dropdown value={rSelectedMonth} options={rAvailableMonths.map(m=>({value:m,label:`${m}월`}))} onChange={v=>{setRSelectedMonth(v);setRocketViewMode("MONTH");}}/>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 로켓 가로/세로 틀고정 스크롤 테이블 패널 */}
                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden relative">
                                        
                                        {/* 퀵 스크롤 전용 버튼 */}
                                        <div className="absolute right-4 top-3 flex gap-1 z-40 bg-white/90 p-1 rounded-xl shadow-md border border-slate-200">
                                            <button onClick={() => scrollTableHorizontally(rocketTableRef, 'left')} className="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors" title="왼쪽 가로 스크롤">
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"/></svg>
                                            </button>
                                            <button onClick={() => scrollTableHorizontally(rocketTableRef, 'right')} className="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors" title="오른쪽 가로 스크롤">
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5l7 7-7 7"/></svg>
                                            </button>
                                        </div>

                                        <div 
                                            ref={rocketTableRef}
                                            onMouseDown={(e) => handleMouseDown(e, rocketTableRef)}
                                            onMouseMove={(e) => handleMouseMove(e, rocketTableRef)}
                                            onMouseUp={handleMouseUpOrLeave}
                                            onMouseLeave={handleMouseUpOrLeave}
                                            className={`overflow-x-auto overflow-y-auto max-h-[600px] border border-slate-200 select-none ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                                        >
                                            {filteredRocketItems.length===0 ? (
                                                <div className="py-16 text-center">
                                                    <p className="text-slate-400 text-sm">조건에 맞는 상품이 없습니다.</p>
                                                    {!showZeroStockRocket && <button onClick={()=>setShowZeroStockRocket(true)} className="mt-3 text-xs text-blue-600 underline font-bold">재고 0개 상품도 표시하기</button>}
                                                </div>
                                            ) : (
                                                <table className="w-full text-left border-collapse table-layout-fixed">
                                                    <thead>
                                                        <tr className="bg-slate-100 text-slate-600 text-xs font-bold uppercase whitespace-nowrap border-b border-slate-200 freeze-header">
                                                            {/* 틀고정(Freeze) 헤더 영역 */}
                                                            <th className="py-4 px-5 sticky left-0 bg-slate-100 z-50 shadow-[1px_0_0_#cbd5e1] min-w-[220px] max-w-[220px] w-[220px] top-0">상품명</th>
                                                            <th className="py-4 px-5 sticky left-[220px] bg-slate-100 z-50 shadow-[1px_0_0_#cbd5e1] min-w-[140px] max-w-[140px] w-[140px] top-0">구성</th>
                                                            <th className="py-4 px-5 sticky left-[360px] bg-slate-100 z-50 shadow-[2px_0_4px_-2px_rgba(0,0,0,0.2)] border-r border-slate-300 min-w-[120px] max-w-[120px] w-[120px] top-0">SKU ID</th>
                                                            {visibleRocketDates.map(d=><th key={d} className="py-4 px-4 text-center sticky top-0 bg-slate-100 z-20 min-w-[80px]">{d.slice(5)}</th>)}
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100 text-sm bg-white">
                                                        {filteredRocketItems.map((item,idx)=>{
                                                            const prevItem = filteredRocketItems[idx - 1];
                                                            const prevFamily = prevItem ? getFamilyGroup(prevItem.name) : null;
                                                            const currentFamily = getFamilyGroup(item.name);
                                                            // 상품 패밀리 변경 시 시각적 구분선 적용
                                                            const isFamilyChanged = prevFamily && prevFamily !== currentFamily;
                                                            
                                                            return (
                                                                <tr key={idx} className={`hover:bg-blue-50/40 transition-colors ${isFamilyChanged ? 'border-t-[3.5px] border-indigo-200' : 'border-t border-slate-100'}`}>
                                                                    {/* 틀고정(Freeze) 셀 영역 */}
                                                                    <td className="py-4 px-5 font-extrabold text-slate-800 bg-white sticky left-0 z-30 shadow-[1px_0_0_#f1f5f9] whitespace-nowrap min-w-[220px] max-w-[220px] w-[220px]">{item.name}</td>
                                                                    <td className="py-4 px-5 text-slate-500 bg-white sticky left-[220px] z-30 shadow-[1px_0_0_#f1f5f9] whitespace-nowrap min-w-[140px] max-w-[140px] w-[140px]">{item.option}</td>
                                                                    <td className="py-4 px-5 font-mono text-slate-400 bg-white sticky left-[360px] z-30 shadow-[2px_0_4px_-2px_rgba(0,0,0,0.15)] border-r border-slate-200 whitespace-nowrap min-w-[120px] max-w-[120px] w-[120px]">{item.skuId}</td>
                                                                    
                                                                    {visibleRocketDates.map((d,i)=>{
                                                                        const v=item.history[d];
                                                                        const num=v!=null&&v!=="-"&&v!==""?Number(v):null;
                                                                        return (
                                                                            <td key={i} className={`py-4 px-4 text-center font-bold ${num===null?"text-slate-300":num===0?"text-red-500":"text-slate-700"} min-w-[80px]`}>
                                                                                {num!==null?(isNaN(num)?String(v):num.toLocaleString()):"-"}
                                                                            </td>
                                                                        );
                                                                    })}
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            )}
                                        </div>
                                    </div>
                                </>
                            )}
                        </main>
                    )}

                    {/* ── N배송 탭 ── */}
                    {view==="argo" && (
                        <main className="flex-grow w-full px-6 md:px-10 py-6 space-y-6">
                            <div className="flex flex-wrap items-center justify-between gap-4 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                                <h2 className="font-extrabold text-slate-800 text-xl px-2">📦 N배송(아르고) 분석 상황판</h2>
                                <div className="flex flex-wrap items-center gap-3">
                                    <button onClick={()=>{
                                        if (showAllArgoHistory && !dbDates.slice(-14).includes(selectedDate)) setSelectedDate(dbDates[dbDates.length - 1]);
                                        setShowAllHistory(!showAllArgoHistory);
                                    }} className={`px-4 py-2 text-sm font-bold rounded-xl transition-all ${showAllArgoHistory ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                        {showAllArgoHistory ? "최근 14일만 보기" : "과거 이력 전체 켜기"}
                                    </button>
                                    <div className="flex items-center gap-1 bg-slate-800 rounded-xl p-1 border border-slate-700">
                                        <Dropdown value={selectedYear} options={availableYears.map(y=>({value:y,label:`${y}년`}))} onChange={setSelectedYear}/>
                                        <div className="w-px h-6 bg-slate-700"></div>
                                        <Dropdown value={selectedMonth} options={availableMonths.map(m=>({value:m,label:`${m}월`}))} onChange={setSelectedMonth}/>
                                        <div className="w-px h-6 bg-slate-700"></div>
                                        <Dropdown value={selectedDate} options={dateOptionsForMonth.map(d=>({value:d,label:`${d.slice(8)}일${d===dbDates[dbDates.length-1]?" (최신)":""}` }))} onChange={setSelectedDate}/>
                                    </div>
                                    <Dropdown label="ADS 산정" value={adsWin} options={adsOptions} onChange={setAdsWin}/>
                                </div>
                            </div>

                            {pending.length>0 && (
                                <div className="bg-gradient-to-r from-amber-50 to-orange-50 border-2 border-orange-200 rounded-3xl shadow-sm overflow-hidden animate-fade-in">
                                    <div className="p-4 md:p-6 pb-2">
                                        <h3 className="text-lg font-extrabold text-orange-900">⚠️ 7일 내 공장 출고완료 대기현황</h3>
                                    </div>
                                    <div className="px-4 md:px-6 pb-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
                                        {pending.map((inc,idx)=>(
                                            <div key={idx} className="bg-white p-4 rounded-2xl border border-orange-200/60 shadow-sm flex flex-col gap-3">
                                                <div className="flex items-center justify-between">
                                                    <span className="text-xs font-black bg-orange-100 text-orange-800 px-2 py-0.5 rounded-md">{inc.type} 수송</span>
                                                    <span className="text-xs font-bold text-slate-400">출고: {inc.date.slice(5)}</span>
                                                </div>
                                                <h4 className="font-extrabold text-slate-800 text-sm">{inc.sku}</h4>
                                                <span className="text-2xl font-black text-orange-600">+{inc.amount.toLocaleString()} <span className="text-xs text-slate-500">대기</span></span>
                                                <button onClick={()=>toggleIncomingRegistration(idx)} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-extrabold px-3 py-2 rounded-lg transition-colors">입고 완료처리 ✓ (+ 합산)</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 animate-fade-in">
                                {[
                                    {label:"🚨 7일내 긴급 대응",val:summaryMetrics.criticalCount,unit:"개 SKU",c:"text-red-600"},
                                    {label:"⚠️ 30일내 보충 경고",val:summaryMetrics.warningCount,unit:"개 SKU",c:"text-amber-500"},
                                    {label:"📦 보관 총 재고수량",val:summaryMetrics.totalStock.toLocaleString(),unit:"개",c:"text-indigo-600"},
                                    {label:"🚚 총 일평균 판매량",val:summaryMetrics.totalDailySales,unit:"개/일",c:"text-teal-600"},
                                ].map(({label,val,unit,c})=>(
                                    <div key={label} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                                        <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">{label}</span>
                                        <div className="flex items-baseline gap-2 mt-2">
                                            <span className={`text-4xl font-extrabold ${c}`}>{val}</span>
                                            <span className="text-sm text-slate-500">{unit}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* N배송 테이블에도 가로/세로 틀고정 스크롤 적용 */}
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start animate-fade-in">
                                <div className="lg:col-span-9 bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden relative">
                                    
                                    {/* N배송 가로 스크롤 전용 버튼 */}
                                    <div className="absolute right-4 top-24 flex gap-1 z-40 bg-white/95 p-1 rounded-xl shadow-md border border-slate-200">
                                        <button onClick={() => scrollTableHorizontally(argoTableRef, 'left')} className="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600" title="왼쪽 가로 스크롤">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"/></svg>
                                        </button>
                                        <button onClick={() => scrollTableHorizontally(argoTableRef, 'right')} className="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600" title="오른쪽 가로 스크롤">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5l7 7-7 7"/></svg>
                                        </button>
                                    </div>

                                    <div className="p-6 border-b border-slate-100 bg-slate-50/50 space-y-4">
                                        <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                                            <h2 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                                                <span>📋 실시간 입출고/품절 예측 상황판</span>
                                                <span className="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold">{filtSkus.length}개 표시</span>
                                            </h2>
                                            <div className="flex gap-2 overflow-x-auto pb-1 md:pb-0">
                                                {["ALL","클레이","플레이돌","와우펜","키즈탭","기타"].map(cat=>(
                                                    <button key={cat} onClick={()=>setCatF(cat)}
                                                        className={`px-4 py-1.5 text-xs font-bold rounded-xl transition-all ${catF===cat?"bg-indigo-600 text-white":"bg-slate-200/60 text-slate-600 hover:bg-slate-200"}`}>
                                                        {cat==="ALL"?"전체":cat}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-12 gap-3">
                                            <div className="md:col-span-6 relative">
                                                <input type="text" placeholder="품목명 검색..." value={search} onChange={e=>setSearch(e.target.value)}
                                                    className="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20"/>
                                                <span className="absolute left-3.5 top-3 text-slate-400">🔍</span>
                                            </div>
                                            <div className="md:col-span-6 flex flex-wrap items-center justify-end gap-x-6 gap-y-1">
                                                <label className="flex items-center gap-2 text-sm font-bold text-slate-600 cursor-pointer">
                                                    <input type="checkbox" checked={only30} onChange={e=>setOnly30(e.target.checked)} className="rounded text-indigo-600 w-4 h-4"/>
                                                    <span>⏳ 30일 이내 품절</span>
                                                </label>
                                                <label className="flex items-center gap-2 text-sm font-bold text-slate-600 cursor-pointer">
                                                    <input type="checkbox" checked={exZero} onChange={e=>setExZero(e.target.checked)} className="rounded text-indigo-600 w-4 h-4"/>
                                                    <span>🚫 재고 0개 제외</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    {/* N배송 테이블도 동일하게 틀고정 스크롤 처리 */}
                                    <div 
                                        ref={argoTableRef}
                                        onMouseDown={(e) => handleMouseDown(e, argoTableRef)}
                                        onMouseMove={(e) => handleMouseMove(e, argoTableRef)}
                                        onMouseUp={handleMouseUpOrLeave}
                                        onMouseLeave={handleMouseUpOrLeave}
                                        className={`overflow-x-auto overflow-y-auto max-h-[600px] select-none ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                                    >
                                        <table className="w-full text-left border-collapse table-layout-fixed">
                                            <thead>
                                                <tr className="bg-slate-50/80 border-b border-slate-100 text-slate-500 text-xs font-extrabold uppercase tracking-wider freeze-header">
                                                    <th className="py-4 px-6 sticky left-0 bg-slate-100 z-50 shadow-[1px_0_0_#cbd5e1] min-w-[120px] max-w-[120px] w-[120px] top-0">분류</th>
                                                    <th className="py-4 px-6 sticky left-[120px] bg-slate-100 z-50 shadow-[2px_0_4px_-2px_rgba(0,0,0,0.2)] border-r border-slate-300 min-w-[280px] max-w-[280px] w-[280px] top-0">SKU</th>
                                                    <th className="py-4 px-6 text-center sticky top-0 bg-slate-100 z-20 min-w-[130px]">현재고 ({selectedDate.slice(5)})</th>
                                                    <th className="py-4 px-6 text-center sticky top-0 bg-slate-100 z-20 min-w-[100px]">ADS</th>
                                                    <th className="py-4 px-6 sticky top-0 bg-slate-100 z-20 min-w-[150px]">예상 품절일</th>
                                                    <th className="py-4 px-6 sticky top-0 bg-slate-100 z-20 min-w-[120px]">잔여기간</th>
                                                    <th className="py-4 px-6 text-right sticky top-0 bg-slate-100 z-20 min-w-[120px]">보충 필요(30일)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 text-sm bg-white">
                                                {filtSkus.length===0 ? <tr><td colSpan="7" className="py-12 text-center text-slate-400">조건에 맞는 품목이 없습니다.</td></tr> : filtSkus.map((item, idx)=>{
                                                    const isSel=selSku===item.sku;
                                                    const isCrit=item.daysRemaining<=10;
                                                    const isWarn=item.daysRemaining>10&&item.daysRemaining<=30;
                                                    
                                                    const prevItem = filtSkus[idx - 1];
                                                    const prevFamily = prevItem ? getFamilyGroup(prevItem.sku) : null;
                                                    const currentFamily = getFamilyGroup(item.sku);
                                                    const isFamilyChanged = prevFamily && prevFamily !== currentFamily;

                                                    return (
                                                        <tr key={item.sku} onClick={()=>setSelSku(item.sku)}
                                                            className={`hover:bg-indigo-50/40 cursor-pointer transition-all border-l-4 ${isSel?"bg-indigo-50/80 border-l-indigo-600":"border-l-transparent"} ${isFamilyChanged ? 'border-t-[3.5px] border-indigo-200' : 'border-t border-slate-100'}`}>
                                                            <td className="py-5 px-6 font-bold text-slate-400 bg-white sticky left-0 z-30 shadow-[1px_0_0_#f1f5f9] whitespace-nowrap min-w-[120px] max-w-[120px] w-[120px]">{item.category}</td>
                                                            <td className="py-5 px-6 font-bold text-slate-900 bg-white sticky left-[120px] z-30 shadow-[2px_0_4px_-2px_rgba(0,0,0,0.15)] border-r border-slate-200 whitespace-nowrap min-w-[280px] max-w-[280px] w-[280px]">{item.sku}</td>
                                                            <td className="py-5 px-6 text-center font-extrabold text-slate-900 text-base min-w-[130px]">
                                                                {item.currentStock.toLocaleString()}
                                                                {item.simulatedArrivals>0&&<span className="block text-xs text-emerald-600 font-extrabold mt-0.5">(+{item.simulatedArrivals} 예약)</span>}
                                                            </td>
                                                            <td className="py-5 px-6 text-center font-mono font-semibold text-slate-700 min-w-[100px]">{item.ads.toFixed(2)}</td>
                                                            <td className="py-5 px-6 min-w-[150px]">
                                                                <span className={`font-mono text-sm px-3 py-1.5 rounded-lg font-bold ${isCrit?"bg-red-100 text-red-800":isWarn?"bg-amber-100 text-amber-800":"text-slate-600"}`}>
                                                                    📅 {item.expectedStockoutDate}
                                                                </span>
                                                            </td>
                                                            <td className="py-5 px-6 min-w-[120px]">
                                                                <span className={`inline-flex px-3 py-1 rounded-full text-xs font-extrabold ${isCrit?"bg-red-200 text-red-900":isWarn?"bg-amber-200 text-amber-900":"bg-emerald-200 text-emerald-900"}`}>
                                                                    {item.displayRemainingText}
                                                                </span>
                                                            </td>
                                                            <td className="py-5 px-6 text-right font-extrabold text-indigo-700 text-base min-w-[120px]">{item.replenishment30.toLocaleString()}</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* 차트 */}
                                <div className="lg:col-span-3 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                                    <h3 className="text-lg font-bold text-slate-900">{selSku || "항목을 선택하세요"}</h3>
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                        <span className="text-xs font-semibold text-slate-500 block mb-3">재고 추이 ({selectedDate.slice(5)} 기준)</span>
                                        <div className="h-36 w-full flex items-end justify-between gap-1">
                                            {skuHistoryPoints.length>0 ? skuHistoryPoints.map((pt,idx)=>{
                                                const maxS=Math.max(...skuHistoryPoints.map(p=>p.stock),50);
                                                return (
                                                    <div key={idx} className="flex-1 flex flex-col items-center h-full justify-end">
                                                        <div style={{height:`${(pt.stock/maxS)*100}%`}} className={`w-full rounded-t-sm ${idx===skuHistoryPoints.length-1?"bg-indigo-600":"bg-slate-300"}`}></div>
                                                        <span className="text-[8px] text-slate-400 mt-1 font-mono">{pt.date.slice(5)}</span>
                                                    </div>
                                                );
                                            }) : <div className="text-xs text-slate-400 m-auto">데이터 없음</div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {/* 공통 엑셀 업로드 영역 */}
                    <div className="px-6 md:px-10 pb-10 w-full mt-auto">
                        <div className="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 space-y-4">
                            <div>
                                <h4 className="font-extrabold text-slate-800 text-base flex items-center gap-2">
                                    <span>📊 통합 엑셀 파일 직접 연동 및 업데이트 관리자</span>
                                    <span className="text-xs bg-indigo-100 text-indigo-700 font-extrabold px-2.5 py-0.5 rounded-full">Claude's Parser V8</span>
                                </h4>
                                <p className="text-xs text-slate-400 mt-1">
                                    <strong>시트 순서:</strong> 1번 = 로켓배송 &nbsp;/&nbsp; 2번 = N배송 재고 &nbsp;/&nbsp; 3번 = 아르고 출고내역 &nbsp;—&nbsp; 이 순서로 자동 인식합니다.
                                </p>
                            </div>
                            <div className="border-2 border-dashed border-indigo-200 hover:border-indigo-500 rounded-2xl p-10 text-center cursor-pointer transition-colors bg-indigo-50/20 relative">
                                <input type="file" accept=".xlsx,.xls" onChange={handleUpload} onClick={e=>e.target.value=null} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10"/>
                                <span className="text-4xl block mb-4">📂</span>
                                <h5 className="text-sm font-extrabold text-indigo-950">여기에 엑셀 파일을 드래그 앤 드롭 하세요</h5>
                                <p className="text-xs text-indigo-500 mt-1">로켓배송 / N배송 / 아르고발송 시트를 자동 인식하여 한 번에 합산합니다.</p>
                            </div>
                        </div>
                    </div>

                    <footer className="bg-slate-900 text-slate-500 text-xs py-6 border-t border-slate-800 text-center">
                        <p>© 2026 요미몬(주) 통합 재고 관리 시스템. All Rights Reserved.</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
