const cleanSku = s => {
    let str = String(s || "").trim();
    str = str.replace(/^요미몬\s+/, '');
    str = str.replace(/\s*(단포|단수|단수\(안전봉투\)|박스)$/, '').trim();

};

const mergeStockHistory = (stockObj) => {
    if(!stockObj) return {};
    const merged = {};
    Object.keys(stockObj).forEach(oldKey => {
        const cleanK = cleanSku(oldKey);
        if(!merged[cleanK]) {
            merged[cleanK] = [...stockObj[oldKey]];
        } else {
            stockObj[oldKey].forEach((val, i) => {
                merged[cleanK][i] = (merged[cleanK][i] || 0) + (val || 0);
            });
        }
    });
    return merged;
};

const cleanGhostDates = (existingDates, newDates) => {
    if(!newDates.length) return existingDates;
    const minD = newDates[0];
    const maxD = newDates[newDates.length - 1];
    
    const filtered = existingDates.filter(d => {
        if (d >= minD && d <= maxD) {
            return newDates.includes(d);
        }
        return true; 
    });
    return [...new Set([...filtered, ...newDates])].sort();
};

const parseCellToParts = cell => {
    if (cell == null || cell === "") return null;
    if (cell instanceof Date) {
        if (isNaN(cell.getTime())) return null;
        return { y: cell.getFullYear(), m: cell.getMonth()+1, d: cell.getDate(), suffix: "" };
    }
    const s = String(cell).trim();
    if (!s) return null;
    if (/^\d+$/.test(s)) {
        const n = Number(s);
        if (n > 40000 && n < 60000) {
            const dt = new Date(Math.round((n-25569)*86400000));
            return { y: dt.getFullYear(), m: dt.getMonth()+1, d: dt.getDate(), suffix: "" };
        }
        return null;
    }
    const km = s.match(/(\d{2,4})년\s*(\d{1,2})월\s*(\d{1,2})일?/);
    if (km) { const y=km[1].length===2?2000+parseInt(km[1]):parseInt(km[1]); return {y,m:parseInt(km[2]),d:parseInt(km[3]),suffix:""}; }
    const m4 = s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})(\s*[\(\[].+)?$/);
    if (m4) return {y:parseInt(m4[1]),m:parseInt(m4[2]),d:parseInt(m4[3]),suffix:m4[4]?.trim()?" "+m4[4].trim():""};
    const m3 = s.match(/^(\d{2})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})(\s*[\(\[].+)?$/);
    if (m3) return {y:2000+parseInt(m3[1]),m:parseInt(m3[2]),d:parseInt(m3[3]),suffix:m3[4]?.trim()?" "+m3[4].trim():""};
    const m2 = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})(\s*[\(\[].+)?$/);
    if (m2) return {y:null,m:parseInt(m2[1]),d:parseInt(m2[2]),suffix:m2[3]?.trim()?" "+m2[3].trim():""};
    return null;
};

const findHeaderRow = (rows, skipCols=0) => {
    let best=0, bestCount=0;
    for (let r=0; r<Math.min(6,rows.length); r++) {
        let cnt=0;
        (rows[r]||[]).forEach((c,i)=>{ if(i>=skipCols && parseCellToParts(c)) cnt++; });
        if (cnt>bestCount) { bestCount=cnt; best=r; }
    }
    return bestCount>0 ? best : 0;
};

const parseSheetWithTimeline = (sheet, skipCols=0) => {
    if (!sheet) return null;
    let rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:true, defval:""});
    let hri = findHeaderRow(rows, skipCols);
    if (hri===0 && rows.length>0 && !rows[0].some((c,i)=>i>=skipCols&&parseCellToParts(c))) {
        rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:false, defval:""});
        hri = findHeaderRow(rows, skipCols);
    }
    const hRow = rows[hri]||[];
    const dCols = [];
    let anchorYear = new Date().getFullYear();
    for (let i = hRow.length-1; i >= skipCols; i--) {
        const p = parseCellToParts(hRow[i]);
        if (p && p.y) { anchorYear = p.y; break; }
    }
    let currentYear = anchorYear, lastMonth = null;
    for (let i = hRow.length-1; i >= skipCols; i--) {
        const p = parseCellToParts(hRow[i]);
        if (!p) continue;
        if (p.y) { currentYear = p.y; lastMonth = p.m; }
        else {
            if (lastMonth !== null) {
                if (p.m > lastMonth && (p.m - lastMonth) > 5) currentYear--;
                else if (lastMonth > p.m && (lastMonth - p.m) > 5) currentYear++;
            }
            lastMonth = p.m;
        }
        const dateStr = `${currentYear}-${String(p.m).padStart(2,'0')}-${String(p.d).padStart(2,'0')}${p.suffix}`;
        dCols.unshift({ index: i, label: dateStr });
    }
    return { rows, hri, dCols, parsedDates: dCols.map(c=>c.label) };
};

function Dropdown({label,value,options,onChange}) {
    const [open,setOpen]=useState(false);
    const ref=useRef(null);
    const sel=useMemo(()=>options.find(o=>String(o.value)===String(value))||options[0],[options,value]);
    useEffect(()=>{
        const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
        document.addEventListener("mousedown",h);
        return()=>document.removeEventListener("mousedown",h);
    },[]);
    if(!options.length)return null;
    return(
        <div ref={ref} className="relative flex items-center bg-slate-800 rounded-xl px-3 py-1.5 border border-slate-700 z-50 shadow-inner">
            {label&&<span className="text-sm text-slate-400 mr-2 font-medium select-none">{label}:</span>}
            <div className="relative">
                <button type="button" onClick={()=>setOpen(!open)} className="bg-slate-900 text-indigo-300 font-extrabold rounded-lg px-3 py-2 border border-slate-700 flex items-center gap-2 hover:border-indigo-500 transition-all min-w-[90px]">
                    <span>{sel?.label||""}</span>
                    <svg className={`w-4 h-4 flex-shrink-0 transition-transform ${open?"rotate-180":""}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                {open&&(
                    <div className="absolute right-0 mt-2 w-52 rounded-xl bg-slate-900 border border-slate-700 shadow-2xl py-1 z-[999] max-h-64 overflow-y-auto">
                        {options.map(opt=>(
                            <button key={String(opt.value)} type="button" onClick={()=>{onChange(opt.value);setOpen(false);}}
                                className={`w-full text-left px-4 py-2.5 text-sm font-semibold flex items-center justify-between border-b border-slate-800/40 last:border-0 ${String(opt.value)===String(value)?"bg-indigo-600/30 text-indigo-300 border-l-4 border-indigo-500":"text-slate-300 hover:bg-slate-800 hover:text-white"}`}>
                                <span>{opt.label}</span>{String(opt.value)===String(value)&&<span>✓</span>}
                            </button>
                        ))}
                    </div>
                )}
            </div>
        </div>
    );
}

    const filtRI=useMemo(()=>{
        return rItems.filter(item=>{
            if(srch){
                const term = srch.toLowerCase();
                const mName = String(item.name || "").toLowerCase().includes(term);
                const mOpt = String(item.option || "").toLowerCase().includes(term);
                const mSku = String(item.skuId || "").toLowerCase().includes(term);
                if(!mName && !mOpt && !mSku) return false;
            }
            if(!rShowZero){
                const last30=rDates.slice(-30);
                const hasStock=last30.some(d=>{
                    const v=item.history[d];
                    return v!=null&&v!==""&&v!=="-"&&Number(v)>0;
                });
                if(!hasStock)return false;
            }
            return true;
        });
    },[rItems,rDates,rShowZero,srch]);

    // ── N배송 원본 필터 ──
    const [aRawMode,setARawMode]=useState("10"); 
    const [aRawShowZero,setARawShowZero]=useState(false);
    const [aRawY,setARawY]=useState(()=>aYears[0]||"2026");
    const aRawMons=useMemo(()=>dbDates.length?[...new Set(dbDates.filter(d=>d.startsWith(aRawY)).map(d=>d.slice(5,7)))].sort().reverse():["06"],[dbDates,aRawY]);
    const [aRawM,setARawM]=useState(()=>aRawMons[0]||"06");
    useEffect(()=>{if(!aYears.includes(aRawY))setARawY(aYears[0]||"2026");},[aYears]);
    useEffect(()=>{if(!aRawMons.includes(aRawM))setARawM(aRawMons[0]||"06");},[aRawY,aRawMons]);

    const visAD=useMemo(()=>{
        if(!dbDates.length)return[];
        if(aRawMode==="TODAY")return dbDates.slice(-1);if(aRawMode==="5")return dbDates.slice(-5);
        if(aRawMode==="10")return dbDates.slice(-10);if(aRawMode==="15")return dbDates.slice(-15);
        if(aRawMode==="30")return dbDates.slice(-30);if(aRawMode==="THIS")return dbDates.filter(d=>d.startsWith(nowYM));
        if(aRawMode==="LAST")return dbDates.filter(d=>d.startsWith(lastYM));
        return dbDates.filter(d=>d.startsWith(`${aRawY}-${aRawM}`));
    },[dbDates,aRawMode,aRawY,aRawM,nowYM,lastYM]);

    const filtARaw=useMemo(()=>{
        return Object.keys(dbStock).filter(sku=>{
            if(!sku)return false;
            if(srch && !sku.toLowerCase().includes(srch.toLowerCase())) return false;
            if(!aRawShowZero){const has=visAD.some(d=>{const idx=dbDates.indexOf(d);const v=dbStock[sku]?.[idx];return v!=null&&v>0;});if(!has)return false;}
            return true;
        }).map(sku=>({sku,history:dbStock[sku]}))
        .sort((a,b)=>{
            let ia = aOrder.indexOf(a.sku);
            let ib = aOrder.indexOf(b.sku);
            if (ia === -1) ia = SKU_ORDER.indexOf(a.sku) > -1 ? SKU_ORDER.indexOf(a.sku) + 1000 : 9999;
            if (ib === -1) ib = SKU_ORDER.indexOf(b.sku) > -1 ? SKU_ORDER.indexOf(b.sku) + 1000 : 9999;
            return ia - ib;
        });
    },[dbStock,dbDates,visAD,aRawShowZero,aOrder,srch]);

    // ── N배송 ADS 계산 ──
    const [adsW,setAdsW]=useState(4);const [only30,setOnly30]=useState(true);
    const [exZero,setExZero]=useState(true);const [selSku,setSelSku]=useState("");

    const toDateKey=v=>{if(!v)return"";const dt=cleanDateForParse(v);if(!isNaN(dt.getTime()))return dt.toISOString().split('T')[0];const m=String(v).match(/\d{4}-\d{2}-\d{2}/);return m?m[0]:String(v).split(" ")[0];};
    const calDays=(s,e)=>{if(isNaN(s.getTime())||isNaN(e.getTime())||e<=s)return 0;return Math.max(1,Math.ceil((e-s)/86400000));};
    
    const findWinByDays = (dates, ti, daysBack) => {
        const endKey = toDateKey(dates[ti]);
        const endDt = cleanDateForParse(endKey);

        const targetStartDt = new Date(endDt);
        targetStartDt.setDate(targetStartDt.getDate() - daysBack);
        const targetStartKey = targetStartDt.toISOString().split('T')[0];

        let startIdx = 0; 
        let actualStartKey = toDateKey(dates[0]);

        for (let i = ti; i >= 0; i--) {
            const k = toDateKey(dates[i]);
            if (k <= targetStartKey) {
                startIdx = i;
                actualStartKey = k;
                break;
            }
        }

        const actualStartDt = cleanDateForParse(actualStartKey);
        let daysElapsed = calDays(actualStartDt, endDt);
        
        if (daysElapsed < 1) daysElapsed = 1;

        return {
            startIndex: startIdx,
            endIndex: ti,
            startDate: actualStartKey,
            endDate: endKey,
            days: daysElapsed
        };
    };

    const aDI=useMemo(()=>{const i=dbDates.indexOf(aD);return i!==-1?i:Math.max(0,dbDates.length-1);},[aD,dbDates]);
    
    const calcSku=(sku,ti)=>{
        const win=findWinByDays(dbDates,ti,Number(adsW));
        
        let totalSales = 0;
        let validDays = 0;
        
        for (let i = win.startIndex; i < win.endIndex; i++) {
            const stockA = dbStock[sku]?.[i] || 0;
            const stockB = dbStock[sku]?.[i+1] || 0;
            
            const dtA = cleanDateForParse(toDateKey(dbDates[i]));
            const dtB = cleanDateForParse(toDateKey(dbDates[i+1]));
            let dayGap = calDays(dtA, dtB);
            if (dayGap < 1) dayGap = 1;
            
            let incAmt = 0;
            dbInc.forEach(inc => {
                if(inc.sku === sku) {
                    const iDt = cleanDateForParse(inc.date).getTime();
                    if(iDt > dtA.getTime() && iDt <= dtB.getTime()) {
                        incAmt += inc.amount;
                    }
                }
            });
            
            const realSales = stockA + incAmt - stockB;
            
            if (realSales >= 0) {
                totalSales += realSales;
                validDays += dayGap;
            }
        }
        
        let ads = 0;
        if (validDays > 0) {
            ads = totalSales / validDays;
        } else if (win.startIndex > 0) {
            for (let i = win.startIndex - 1; i >= 0; i--) {
                const sA = dbStock[sku]?.[i] || 0;
                const sB = dbStock[sku]?.[i+1] || 0;
                const dtA = cleanDateForParse(toDateKey(dbDates[i]));
                const dtB = cleanDateForParse(toDateKey(dbDates[i+1]));
                const dGap = Math.max(1, calDays(dtA, dtB));
                
                const diff = sA - sB;
                if (diff >= 0) {
                    ads = diff / dGap;
                    break;
                }
            }
        }

        ads = Math.max(0, parseFloat(ads.toFixed(2)));
        
        let pa = 0;
        dbInc.forEach(inc=>{
            if(inc.sku!==sku)return;
            const dt=cleanDateForParse(inc.date);
            if(isNaN(dt.getTime()))return;
            if(!inc.isRegistered) pa += inc.amount;
        });
        
        const cur=dbStock[sku]?.[win.endIndex]||0;
        let dr=Infinity,esd="안전 (우려없음)",drt="99일 이상";
        if(ads>0){
            const tot=cur+pa;
            dr=tot/ads;
            if(dr<365){
                const tDt=cleanDateForParse(win.endDate);
                const sd=new Date(tDt);
                sd.setDate(sd.getDate()+Math.floor(dr));
                esd=isNaN(sd.getTime())?"계산불가":sd.toISOString().split('T')[0];
                drt=`${Math.ceil(dr)}일 남음`;
            }
        }
        
        return{sku,category:CATS[sku]||"기타",currentStock:cur,ads,adsDays:win.days,adsStartDate:win.startDate,adsEndDate:win.endDate,daysRemaining:dr,displayRemainingText:drt,expectedStockoutDate:esd,replenishment30:ads>0?Math.ceil(ads*30):0,simulatedArrivals:pa};
    };
    
    const allSkus=useMemo(()=>Object.keys(dbStock).map(s=>calcSku(s,aDI)),[aDI,adsW,dbStock,dbDates,dbInc]);
    
    const filtSkus=useMemo(()=>allSkus.filter(i=>{
        if(exZero&&i.currentStock===0)return false;if(only30&&i.daysRemaining>30)return false;
        if(srch && !i.sku.toLowerCase().includes(srch.toLowerCase())) return false;
        return true;
    }).sort((a,b)=>a.daysRemaining-b.daysRemaining),[allSkus,only30,exZero,srch]);

    const pend=useMemo(()=>{
        if(!dbDates.length)return[];const lt=cleanDateForParse(dbDates[dbDates.length-1]).getTime();
        return dbInc.filter(i=>!i.isRegistered).map(i=>{
            const dt=cleanDateForParse(i.date).getTime();if((lt-dt)/86400000>7)return null;
            const arr=cleanDateForParse(i.date);if(i.type==="택배")arr.setDate(arr.getDate()+3);
            return{...i,arrDate:isNaN(arr.getTime())?"알수없음":arr.toISOString().split('T')[0]};
        }).filter(Boolean);
    },[dbInc,dbDates]);

    const summ=useMemo(()=>({
        crit:allSkus.filter(i=>i.daysRemaining<=10).length,
        warn:allSkus.filter(i=>i.daysRemaining>10&&i.daysRemaining<=30).length,
        tot:allSkus.reduce((s,i)=>s+i.currentStock,0),
        ads:allSkus.reduce((s,i)=>s+i.ads,0).toFixed(1)
    }),[allSkus]);

    const handleUpload=e=>{
        const file=e.target.files[0]; if(!file)return;
        const reader=new FileReader();
        reader.onload=ev=>{
            try{
                const wb=XLSX.read(ev.target.result,{type:'binary',cellDates:true});
                const sn=wb.SheetNames;
                const sRocket=sn[0]?wb.Sheets[sn[0]]:null;
                const sArgo  =sn[1]?wb.Sheets[sn[1]]:null;
                const sDisp  =sn[2]?wb.Sheets[sn[2]]:null;

                let nRD=[...rDates],nRI=[...rItems];
                let nAD=[...dbDates],nAS={...dbStock};
                let nInc=[...dbInc];
                let nAOrder=[...aOrder];

                if(sRocket){
                    const p=parseSheetWithTimeline(sRocket,3); 
                    if(p&&p.dCols.length){
                        const{rows,hri,dCols,parsedDates}=p;
                        nRD = cleanGhostDates(rDates, parsedDates);
                        const iMap={};
                        nRI.forEach(it=>{iMap[`${it.name}_${it.option}`]={...it,history:{...it.history}};});
                        
                        const rExcelSkus = new Set();
                        const rOrderList = [];
                        for(let i=hri+1;i<rows.length;i++){
                            const row=rows[i];if(!row?.length)continue;
                            const name=String(row[0]||"").trim();const option=String(row[1]||"").trim();const skuId=String(row[2]||"").trim();
                            if(!name||name==="undefined")continue;
                            const key=`${name}_${option}`;
                            rExcelSkus.add(key);
                            if(!rOrderList.includes(key)) rOrderList.push(key);
                            if(!iMap[key])iMap[key]={name,option,skuId,history:{}};
                            
                            dCols.forEach((col,ci)=>{
                                const raw=row[col.index];let val="-";
                                if(raw!==""&&raw!=null){
                                    if(raw instanceof Date){const p2=parseCellToParts(raw);val=p2?`${p2.y}-${String(p2.m).padStart(2,'0')}-${String(p2.d).padStart(2,'0')}`:"-";}
                                    else if(typeof raw==="number")val=Math.round(raw);
                                    else{const n=parseInt(String(raw).replace(/,/g,""));val=isNaN(n)?String(raw):n;}
                                }
                                iMap[key].history[parsedDates[ci]]=val;
                            });
                        }
                        
                        const missingKeys = [];
                        Object.keys(iMap).forEach(key => {
                            if(!rExcelSkus.has(key)) {
                                parsedDates.forEach(pd => iMap[key].history[pd] = "-");
                                missingKeys.push(key);
                            }
                        });
                        nRI = [...rOrderList, ...missingKeys].map(k => iMap[k]);
                    }
                }

                if(sArgo){
                    let p=parseSheetWithTimeline(sArgo,3); 
                    if (!p || p.dCols.length === 0) {
                        p = parseSheetWithTimeline(sArgo, 1); 
                    }

                    if(p&&p.dCols.length){
                        const{rows,hri,dCols,parsedDates}=p;
                        nAD = cleanGhostDates(dbDates, parsedDates); 
                        
                        const orig = mergeStockHistory(dbStock); 
                        Object.keys(orig).forEach(k=>{
                            nAS[k]=nAD.map(d=>{const oi=dbDates.indexOf(d);return oi!==-1?(orig[k]?.[oi]||0):0;});
                        });
                        
                        const aExcelSkus = new Set();
                        nAOrder = [];
                        
                        const excelAgg = {};

                        for(let i=hri+1;i<rows.length;i++){
                            const row=rows[i];if(!row?.length)continue;
                            const name = String(row[0]||"").trim();
                            if(!name || name==="undefined") continue;

                            let sku=cleanSku(name);
                            
                            aExcelSkus.add(sku);
                            if(!nAOrder.includes(sku)) nAOrder.push(sku);

                            if(!excelAgg[sku]) excelAgg[sku] = {};
                            
                            dCols.forEach((col,ci)=>{
                                const raw=row[col.index];
                                const val=typeof raw==="number"?Math.round(raw):(parseInt(String(raw).replace(/,/g,""))||0);
                                const pd=parsedDates[ci];
                                
                                if(!excelAgg[sku][pd]) excelAgg[sku][pd] = 0;
                                excelAgg[sku][pd] += val; 
                            });
                        }
                        
                        Object.keys(excelAgg).forEach(sku => {
                            if(!nAS[sku]) nAS[sku] = new Array(nAD.length).fill(0);
                            parsedDates.forEach(pd => {
                                const ui = nAD.indexOf(pd);
                                if(ui !== -1) {
                                    nAS[sku][ui] = excelAgg[sku][pd];
                                }
                            });
                        });
                        
                        Object.keys(nAS).forEach(sku => {
                            if(!aExcelSkus.has(sku)) {
                                parsedDates.forEach(pd => {
                                    const ui = nAD.indexOf(pd);
                                    if(ui !== -1) nAS[sku][ui] = 0;
                                });
                                if(!nAOrder.includes(sku)) nAOrder.push(sku);
                            }
                        });
                    }
                }

                if(sDisp){
                    try{
                        const p=parseSheetWithTimeline(sDisp,1);
                        if(p&&p.dCols.length){
                            const{rows,hri,dCols}=p;const latestArgo=new Date((nAD[nAD.length-1]||"2026-06-02").split(" ")[0]).getTime();
                            for(let i=hri+1;i<rows.length;i++){
                                const row=rows[i];if(!row?.length)continue;
                                const sku=cleanSku(String(row[0]||"").trim());if(!sku)continue;
                                dCols.forEach(col=>{
                                    const dispTime=new Date(col.label.split(" ")[0]).getTime();if(dispTime<=latestArgo)return;
                                    const raw=row[col.index];const amount=typeof raw==="number"?Math.round(raw):(parseInt(String(raw).replace(/,/g,""))||0);if(amount<=0)return;
                                    const type=col.label.includes("용차")?"용차":"택배";const cleanD=col.label.split(" ")[0];
                                    if(!nInc.some(inc=>inc.sku===sku&&inc.date===cleanD&&inc.amount===amount))nInc.push({sku,date:cleanD,amount,type,isRegistered:false});
                                });
                            }
                        }
                    }catch(e){console.warn("출고 시트 스킵:",e);}
                }

                if(useFirebase) {
                    setDbSync("⏳ 저장 중...");
                    db.doc(`yomimon_dashboard/inventory_master`).set({
                        DATES: nAD, STOCK: nAS, INC: nInc, RD: nRD, RI: nRI, AORDER: nAOrder,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        setDbDates(nAD);setDbStock(nAS);setDbInc(nInc);setRDates(nRD);setRItems(nRI);setAOrder(nAOrder);
                        if(nAD.length){const last=nAD[nAD.length-1];setAY(last.slice(0,4));setAM(last.slice(5,7));setAD(last);}
                        if(nRD.length){setRY(nRD[nRD.length-1].slice(0,4));setRM(nRD[nRD.length-1].slice(5,7));}
                        notify("엑셀 데이터 클라우드 전송 및 동기화 완료!");
                    }).catch(e => {
                        notify("클라우드 저장 실패", "err");
                    });
                } else {
                    setDbDates(nAD);setDbStock(nAS);setDbInc(nInc);setRDates(nRD);setRItems(nRI);setAOrder(nAOrder);
                    try{localStorage.setItem(LS_KEY,JSON.stringify({DATES:nAD,STOCK:nAS,INC:nInc,RD:nRD,RI:nRI,AORDER:nAOrder}));}catch(e){}
                    if(nAD.length){const last=nAD[nAD.length-1];setAY(last.slice(0,4));setAM(last.slice(5,7));setAD(last);}
                    if(nRD.length){setRY(nRD[nRD.length-1].slice(0,4));setRM(nRD[nRD.length-1].slice(5,7));}
                    notify("엑셀 분석 완료 (오프라인 임시저장)");
                }

            }catch(err){console.error(err);notify("엑셀 파싱 오류.","err");}
        };
        reader.readAsBinaryString(file);
    };

    const toggleReg=idx=>{
        const t=pend[idx];const upd=[...dbInc];const gi=upd.findIndex(x=>x.sku===t.sku&&x.date===t.date&&x.amount===t.amount);
        if(gi!==-1){
            upd[gi]={...upd[gi],isRegistered:true};const us={...dbStock};const ci=dbDates.indexOf(aD);if(us[t.sku]&&ci!==-1)us[t.sku][ci]+=t.amount;
            
            if(useFirebase) {
                db.doc(`yomimon_dashboard/inventory_master`).set({
                    DATES: dbDates, STOCK: us, INC: upd, RD: rDates, RI: rItems, AORDER: aOrder,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } else {
                setDbInc(upd);setDbStock(us);
                try{localStorage.setItem(LS_KEY,JSON.stringify({DATES:dbDates,STOCK:us,INC:upd,RD:rDates,RI:rItems,AORDER:aOrder}));}catch(e){}
            }
            notify(`${t.sku} 입고 완료! +${t.amount.toLocaleString()}개 즉시 합산됨`);
        }
    };

    const handleLogin=ev=>{
        ev.preventDefault();
        if(pwd===SECRET_PASSWORD){setLoggedIn(true);try{sessionStorage.setItem("ili","1");}catch(e){}}
        else{setPwdErr(true);setPwd("");}
    };

    const ModeBtns=({mode,setMode,color="blue"})=>(
        <>
            {[["TODAY","오늘"],["5","5일"],["10","10일"],["15","15일"],["30","30일"],["THIS","이번달"],["LAST","지난달"]].map(([k,l])=>(
                <button key={k} onClick={()=>setMode(k)} className={`px-3 py-2 text-xs font-bold rounded-xl transition-all ${mode===k?`bg-${color}-600 text-white shadow-md`:"bg-slate-100 text-slate-600 hover:bg-slate-200"}`}>{l}</button>
            ))}
        </>
    );

    if(!loggedIn)return(
        <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 relative overflow-hidden">
            <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl text-center relative z-10">
                <h1 className="text-2xl font-extrabold text-slate-800 mb-1">로켓배송 & N배송 재고 현황</h1>
                <p className="text-sm text-slate-500 mb-8">내부 인원 전용 대시보드입니다.</p>
                <form onSubmit={handleLogin} className="space-y-4">
                    <input type="password" value={pwd} onChange={e=>{setPwd(e.target.value);setPwdErr(false);}} placeholder="비밀번호 입력" autoFocus
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-center font-bold outline-none focus:ring-2 focus:ring-indigo-500"/>
                    {pwdErr&&<p className="text-xs text-red-500 font-bold animate-bounce">⚠️ 비밀번호가 일치하지 않습니다.</p>}
                    <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 rounded-xl shadow-lg transition-colors">접속하기</button>
                </form>
                <p className="text-xs text-slate-400 mt-6">© 2026 요미몬(주)</p>
            </div>
        </div>
    );

    return(
        <div className="min-h-screen flex flex-col">
            <header className="bg-gradient-to-r from-slate-900 to-indigo-950 text-white shadow-lg pt-5 pb-0 px-6 md:px-10 relative z-50">
                <div className="flex flex-wrap items-center gap-3 pb-5 border-b border-white/10">
                    <h1 className="text-2xl font-bold">로켓배송 & N배송 재고 현황 <span className="text-indigo-400 font-extrabold">(v42)</span></h1>
                    <span className={`text-xs px-2.5 py-0.5 rounded-full font-bold ${dbSync.includes("완료") ? "bg-emerald-600/50 text-emerald-100" : "bg-amber-600/50 text-amber-100 animate-pulse"}`}>
                        {dbSync}
                    </span>
                    
                    <div className="ml-auto">
                        <a href="https://arxotn-git.github.io/CLSTOCK/clindex.html" 
                           className="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-extrabold rounded-xl transition-all shadow-md active:scale-95">
                            <span>CL시스템 재고 관리</span>
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </a>
                    </div>
                </div>
                <div className="flex gap-2 px-2 mt-0">
                    {[
                        ["rocket","🚀 로켓배송 재고","blue"],
                        ["argo","📦 N배송(품절 예상일)","indigo"],
                        ["argo_raw","📋 N배송 재고","emerald"]
                    ].map(([k,l,c])=>(
                        <button key={k} onClick={()=>changeView(k)}
                            className={`px-6 py-3 font-extrabold text-sm rounded-t-xl tab-btn ${view===k?`bg-slate-50 text-${c}-900 border-t-4 border-${c}-600`:"bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white border-t-4 border-transparent"}`}>
                            {l}
                        </button>
                    ))}
                </div>

                                                        {visAD.map((d,i)=>{
                                                            const dateIdx=dbDates.indexOf(d);const val=item.history?.[dateIdx];const num=(val!=null&&val!==undefined&&val!=="-")?Number(val):null;
                                                            return(<td key={i} className={`py-4 px-4 text-center font-bold ${bg} ${num===null?"text-slate-300":num===0?"text-red-500":"text-slate-700"}`}>{num!==null?num.toLocaleString():"-"}</td>);
                                                        })}
                                                        <td className={bg}></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </>
                    )}
                </main>
            )}

            {}
            {/* 공통 엑셀 업로드 */}
            <div className="px-6 md:px-10 pb-10 w-full mt-auto">
                <div className="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 space-y-4">
                    <div>
                        <h4 className="font-extrabold text-slate-800 text-base flex items-center gap-2">
                            📊 통합 엑셀 파일 직접 연동 관리자
                        </h4>
                        <p className="text-xs text-slate-400 mt-1">로켓배송 / N배송 / 출고 엑셀이 합쳐진 파일 하나만 끌어다 놓으시면 브라우저가 수만 개의 과거 이력까지 스스로 복원하여 저장합니다.</p>
                    </div>
                    <div className="border-2 border-dashed border-indigo-200 hover:border-indigo-500 rounded-2xl p-10 text-center transition-colors bg-indigo-50/20 relative cursor-pointer">
                        <input type="file" accept=".xlsx,.xls,.csv" onChange={handleUpload} onClick={e=>e.target.value=null} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10"/>
                        <span className="text-4xl block mb-4">📂</span>
                        <h5 className="text-sm font-extrabold text-indigo-950">여기에 엑셀 파일을 드래그 앤 드롭 하세요</h5>
                    </div>
                </div>
            </div>

            <footer className="bg-slate-900 text-slate-500 text-xs py-6 border-t border-slate-800 text-center">
                <p>© 2026 요미몬(주) All Rights Reserved.</p>
            </footer>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
