        // --- CUSTOM DROPDOWN COMPONENT ---
        function ReactCustomDropdown({ label, value, options, onChange }) {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);

            const selectedOption = useMemo(() => {
                return options.find(o => o.value === value) || options[0];
            }, [options, value]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            return (
                <div ref={dropdownRef} className="relative flex items-center bg-slate-800 rounded-xl px-4 py-1.5 border border-slate-700 pointer-events-auto z-50">
                    <span className="text-sm text-slate-400 mr-2 font-medium select-none">{label}:</span>
                    <div className="relative">

                            onClick={() => setIsOpen(!isOpen)}
                            className="bg-slate-900 text-indigo-300 font-extrabold rounded-lg px-3 py-2 border border-slate-700 flex items-center justify-between gap-2 hover:border-indigo-500 hover:text-indigo-200 transition-all cursor-pointer min-w-[140px]"

            // Simulations
            const [simulations, setSimulations] = useState([]);

            const [simSku, setSimSku] = useState("플레이돌 맥스");
            const [simDispatchDate, setSimDispatchDate] = useState("2026-05-29");
            const [simType, setSimType] = useState("택배");
            const [simAmount, setSimAmount] = useState(100);
            const [simMemo, setSimMemo] = useState("");

            // UI States
            const [editorActive, setEditorActive] = useState(false);
            const [newColDate, setNewColDate] = useState("2026-06-03");
            const [editorStocks, setEditorStocks] = useState({});
            const [isPendingExpanded, setIsPendingExpanded] = useState(true);

            const [notification, setNotification] = useState(null);

            const triggerNotification = (message, type = "success") => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const addSimulation = (e) => {
                e.preventDefault();
                if (simAmount <= 0) {
                    triggerNotification("입고 수량은 1개 이상이어야 합니다.", "error");
                    return;
                }
                const newSim = {
                    id: Date.now(),

                    dispatchDate: simDispatchDate,
                    type: simType,
                    amount: parseInt(simAmount),
                    memo: simMemo || `${simType === "택배" ? "택배(2~3일후 입고)" : "용차(당일입고)"}`
                };
                setSimulations([...simulations, newSim]);
                setSimMemo("");
                triggerNotification(`${simSku} 입고 시뮬레이션이 등록되었습니다.`);
            };

            const removeSimulation = (id) => {
                setSimulations(simulations.filter(sim => sim.id !== id));
                triggerNotification("시뮬레이션 일정이 취소되었습니다.", "info");
            };

            // --- FIREBASE SECURITY FLOW (Compat mode) ---
            useEffect(() => {
                if (!useFirebase) {
                    setUser({ uid: "local-user" });
                    return;
                }
                const initAuth = async () => {
                    try {
                        if (authToken) {
                            try {
                                await signInWithCustomToken(auth, authToken);
                            } catch(tokenErr) {
                                console.warn("토큰 만료. 익명 인증으로 안전 전환.", tokenErr);
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Firebase auth error:", error);
                        setCloudSync("error");
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Firebase Snapshot sync & Auto-Upgrade Logic
            useEffect(() => {
                if (!useFirebase || !user) return;

                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory_v1', 'dashboard_state');
                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        const cloudVersion = data.APP_VERSION || 0;
                        const newestHardcodedDate = INITIAL_DATES[INITIAL_DATES.length - 1];
                        
                        // 🚀 UPGRADE TRIGGER
                        if (APP_VERSION > cloudVersion || (data.DATES && !data.DATES.includes(newestHardcodedDate))) {
                            setDoc(docRef, {
                                APP_VERSION: APP_VERSION,
                                DATES: INITIAL_DATES,
                                STOCK_DATA: INITIAL_STOCK_DATA,
                                HISTORICAL_INCOMINGS: INITIAL_INCOMINGS

                            });
                            return;
                        }

                        if (data.DATES && data.STOCK_DATA) {
                            setDbDates(data.DATES);
                            setDbStockData(data.STOCK_DATA);
                            setDbIncomings(data.HISTORICAL_INCOMINGS || []);
                            
                            const latestCloudDate = data.DATES[data.DATES.length - 1];
                            if (!dbDates.includes(latestCloudDate) || selectedDate === dbDates[dbDates.length - 1] || !data.DATES.includes(selectedDate)) {
                                setSelectedDate(latestCloudDate);
                            }
                        }
                        setCloudSync("synced");
                    } else {
                        setDoc(docRef, {

                            DATES: INITIAL_DATES,
                            STOCK_DATA: INITIAL_STOCK_DATA,
                            HISTORICAL_INCOMINGS: INITIAL_INCOMINGS
                        }).then(() => {
                            setCloudSync("synced");
                        }).catch(err => {
                            console.error("DB Init failed:", err);
                            setCloudSync("error");
                        });
                    }
                }, (error) => {
                    console.error("Firestore onSnapshot error:", error);
                    setCloudSync("error");
                });

                return () => unsubscribe();
            }, [user, dbDates, selectedDate]);

            const saveChangesToCloud = async (updatedDates, updatedStockData, updatedIncomings = dbIncomings) => {
                if (!useFirebase) {
                    triggerNotification("로컬 브라우저 상태로 임시 저장되었습니다.", "info");
                    return;
                }
                if (!user) {
                    triggerNotification("인증 진행 중입니다.", "error");
                    return;
                }
                setCloudSync("connecting");
                try {

                } catch (err) {
                    console.error("Firestore save error:", err);
                    triggerNotification("클라우드 동기화 실패.", "error");
                    setCloudSync("error");
                }
            };

            const selectedDateIndex = useMemo(() => {
                const idx = dbDates.indexOf(selectedDate);
                return idx !== -1 ? idx : dbDates.length - 1;
            }, [selectedDate, dbDates]);

            useEffect(() => {

                Object.keys(dbStockData).forEach(sku => {
                    tempStocks[sku] = dbStockData[sku][selectedDateIndex] || 0;
                });
                setEditorStocks(tempStocks);
            }, [selectedDateIndex, dbStockData]);

            // --- ADS AND FORECASTING ---
            const calculateSkuMetrics = (sku, targetDateIndex) => {
                const currentStock = dbStockData[sku]?.[targetDateIndex] !== undefined ? dbStockData[sku][targetDateIndex] : 0;
                
                const startIndex = Math.max(0, targetDateIndex - adsWindow);
                const startDateStr = dbDates[startIndex];
                const targetDateStr = dbDates[targetDateIndex];

                const startStock = dbStockData[sku]?.[startIndex] !== undefined ? dbStockData[sku][startIndex] : 0;
                
                const startDt = parseDateString(startDateStr);
                const targetDt = parseDateString(targetDateStr);
                const diffTime = Math.abs(targetDt - startDt);
                const diffDays = Math.max(1, Math.ceil(diffTime / (1000 * 60 * 60 * 24)));

                const stockDelta = startStock - currentStock;

                let windowIncomings = 0;
                let pendingDbArrivals = 0;

                dbIncomings.forEach(inc => {
                    if (inc.sku !== sku) return;
                    const incDate = parseDateString(inc.date);
                    
                    let isPhysicallyPresent = false;
                    
                    if (inc.isRegistered) {
                        isPhysicallyPresent = true;
                        if (incDate > startDt && incDate <= targetDt) {
                            if (currentStock < inc.amount * 0.8 && stockDelta >= 0) {
                                isPhysicallyPresent = false;
                            }
                        }
                    }
                    
                    if (isPhysicallyPresent) {
                        if (incDate > startDt && incDate <= targetDt) {
                            windowIncomings += inc.amount;
                        }
                    } else {
                        pendingDbArrivals += inc.amount;
                    }
                });

                const totalSales = stockDelta + windowIncomings;
                const calculatedAds = Math.max(0, parseFloat((totalSales / diffDays).toFixed(2)));

                let simulatedArrivals = pendingDbArrivals;
                simulations.forEach(sim => {
                    if (sim.sku === sku) {
                        const dispDt = parseDateString(sim.dispatchDate);
                        const arrDt = new Date(dispDt);
                        if (sim.type === "택배") arrDt.setDate(arrDt.getDate() + 3);
                        if (arrDt > targetDt) {
                            simulatedArrivals += sim.amount;
                        }
                    }
                });

                let daysRemaining = Infinity;
                let expectedStockoutDate = "안전 (우려없음)";
                let displayRemainingText = "99일 이상";

                if (calculatedAds > 0) {
                    const totalProjectedStock = currentStock + simulatedArrivals;
                    daysRemaining = totalProjectedStock / calculatedAds;
                    
                    if (daysRemaining < 365) {
                        const stockoutDt = new Date(targetDt);
                        stockoutDt.setDate(stockoutDt.getDate() + Math.floor(daysRemaining));
                        
                        expectedStockoutDate = stockoutDt.toISOString().split('T')[0];
                        displayRemainingText = `${Math.ceil(daysRemaining)}일 남음`;
                    }
                }

                const replenishment30 = calculatedAds > 0 ? Math.ceil(calculatedAds * 30) : 0;

                return {
                    sku,
                    category: CATEGORIES[sku] || "기타",
                    currentStock,
                    ads: calculatedAds,
                    daysRemaining,
                    displayRemainingText,
                    expectedStockoutDate,
                    replenishment30,
                    simulatedArrivals
                };
            };

            const processedSkuList = useMemo(() => {
                return Object.keys(dbStockData).map(sku => {
                    return calculateSkuMetrics(sku, selectedDateIndex);
                });
            }, [selectedDateIndex, adsWindow, simulations, dbStockData, dbDates, dbIncomings]);

            const filteredSkuList = useMemo(() => {
                return processedSkuList.filter(item => {
                    if (excludeZeroStock && item.currentStock === 0) return false;
                    if (onlyCritical30 && item.daysRemaining > 30) return false;
                    if (categoryFilter !== "ALL" && item.category !== categoryFilter) return false;
                    if (searchQuery && !item.sku.includes(searchQuery)) return false;

                    return true;
                }).sort((a, b) => a.daysRemaining - b.daysRemaining);
            }, [processedSkuList, onlyCritical30, excludeZeroStock, searchQuery, categoryFilter]);

            // --- PENDING DISPATCH TRACKING ---
            const pendingDispatches = useMemo(() => {
                return dbIncomings.filter(inc => inc.isRegistered === false).map(inc => {
                    const dispDt = parseDateString(inc.date);
                    const arrDt = new Date(dispDt);
                    if (inc.type === "택배") arrDt.setDate(arrDt.getDate() + 3);
                    return {
                        ...inc,
                        arrivalDateStr: arrDt.toISOString().split('T')[0],
                        isOverdue: arrDt < parseDateString(selectedDate)
                    };
                });
            }, [dbIncomings, selectedDate]);

            useEffect(() => {
                if (pendingDispatches.length === 0) {
                    setIsPendingExpanded(false);
                } else {
                    setIsPendingExpanded(true);
                }
            }, [pendingDispatches.length]);

            const summaryMetrics = useMemo(() => {
                const totalSkus = processedSkuList.length;
                const criticalCount = processedSkuList.filter(item => item.daysRemaining <= 10).length;
                const warningCount = processedSkuList.filter(item => item.daysRemaining > 10 && item.daysRemaining <= 30).length;
                const totalStock = processedSkuList.reduce((sum, item) => sum + item.currentStock, 0);
                const totalDailySales = processedSkuList.reduce((sum, item) => sum + item.ads, 0);

                return {
                    totalSkus,
                    criticalCount,
                    warningCount,
                    totalStock,
                    totalDailySales: totalDailySales.toFixed(1)
                };
            }, [processedSkuList]);

            // --- EXCEL SHEETJS UPLOADERS ---
            const handleStockExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                        if (rows.length < 2) {
                            triggerNotification("엑셀 행의 수가 너무 적습니다.", "error");
                            return;
                        }

                        const headerRow = rows[0];
                        const dateCols = [];
                        let skuColIdx = -1;

                        headerRow.forEach((cell, idx) => {
                            if (!cell) return;
                            const cellStr = String(cell).trim();
                            if (cellStr.includes("Sku명") || cellStr.includes("품목명") || cellStr.includes("SKU") || idx === 0) {
                                skuColIdx = idx;
                            } else if (cellStr.match(/^\d+[\/\-]\d+/) || cellStr.includes("5/") || cellStr.includes("5-")) {
                                dateCols.push({ index: idx, label: cellStr });
                            }
                        });

                        if (skuColIdx === -1) skuColIdx = 0;

                        if (dateCols.length === 0) {
                            triggerNotification("일치하는 날짜 열(예: 5/11, 5/29)을 찾을 수 없습니다.", "error");
                            return;
                        }

                        const newDates = dateCols.map(c => {
                            let label = c.label;
                            if (!label.startsWith("2026-")) {
                                if (label.includes(" (2)")) {
                                    label = "2026-0" + label.replace(' (2)', '') + " (2)";
                                } else {
                                    label = "2026-0" + label;
                                }
                                label = label.replace('/', '-');
                            }
                            return label;
                        });

                        const unionDates = Array.from(new Set([...dbDates, ...newDates])).sort();
                        const updatedStockData = { ...dbStockData };
                        
                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row || row.length === 0) continue;
                            
                            const rawSku = String(row[skuColIdx] || "").trim();
                            if (!rawSku) continue;
                            const sku = cleanSkuName(rawSku);

                            if (!Object.keys(INITIAL_STOCK_DATA).includes(sku)) continue;

                            if (!updatedStockData[sku]) {
                                updatedStockData[sku] = new Array(unionDates.length).fill(0);
                            } else {
                                const oldArr = updatedStockData[sku];
                                const expandedArr = unionDates.map(d => {
                                    const oldIdx = dbDates.indexOf(d);
                                    return oldIdx !== -1 ? oldArr[oldIdx] : 0;
                                });
                                updatedStockData[sku] = expandedArr;
                            }

                            dateCols.forEach((col, cIdx) => {
                                const val = parseInt(row[col.index]) || 0;
                                const dateLabel = newDates[cIdx];
                                const uIdx = unionDates.indexOf(dateLabel);
                                if (uIdx !== -1) {
                                    updatedStockData[sku][uIdx] = val;
                                }
                            });
                        }

                        setDbDates(unionDates);
                        setDbStockData(updatedStockData);
                        setSelectedDate(unionDates[unionDates.length - 1]);
                        saveChangesToCloud(unionDates, updatedStockData);
                        triggerNotification("재고현황 엑셀 연동 및 데이터베이스 갱신 성공!");
                    } catch (err) {
                        console.error(err);
                        triggerNotification("엑셀 파일 파싱 중 오류가 발생했습니다.", "error");
                    }
                };
                reader.readAsBinaryString(file);
            };

            const handleDispatchExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                        const headerRow = rows[0];
                        let skuColIdx = -1;
                        const dispatchCols = [];

                        headerRow.forEach((cell, idx) => {
                            if (!cell) return;
                            const cellStr = String(cell).trim();
                            if (cellStr.includes("Sku명") || cellStr.includes("출고") || idx === 0) {
                                skuColIdx = idx;
                            } else if (cellStr.match(/^\d+[\/\-]\d+/) || cellStr.includes("5/") || cellStr.includes("5-")) {
                                dispatchCols.push({ index: idx, label: cellStr });
                            }
                        });

                        if (skuColIdx === -1) skuColIdx = 0;

                        const newIncomings = [...dbIncomings];

                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row || row.length === 0) continue;
                            
                            const rawSku = String(row[skuColIdx] || "").trim();
                            if (!rawSku) continue;
                            const sku = cleanSkuName(rawSku);

                            if (!Object.keys(INITIAL_STOCK_DATA).includes(sku)) continue;

                            dispatchCols.forEach(col => {
                                const amount = parseInt(row[col.index]) || 0;
                                if (amount > 0) {
                                    let type = "택배";
                                    if (col.label.includes("용차")) type = "용차";

                                    let cleanDate = col.label.split(' ')[0].split('(')[0];
                                    if (!cleanDate.startsWith("2026-")) {
                                        cleanDate = "2026-0" + cleanDate.replace('/', '-');
                                    }

                                    const exists = newIncomings.some(inc => inc.sku === sku && inc.date === cleanDate && inc.amount === amount);
                                    if (!exists) {
                                        newIncomings.push({
                                            sku,
                                            date: cleanDate,
                                            amount,
                                            type,
                                            isRegistered: false
                                        });
                                    }
                                }
                            });
                        }

                        setDbIncomings(newIncomings);
                        saveChangesToCloud(dbDates, dbStockData, newIncomings);
                        triggerNotification("공장 출고리스트 연동 완료! 미입고 현황판이 업데이트되었습니다.");
                    } catch (err) {
                        console.error(err);
                        triggerNotification("출고 엑셀 처리 중 오류가 발생했습니다.", "error");
                    }
                };
                reader.readAsBinaryString(file);
            };

            const toggleIncomingRegistration = (index) => {
                const updatedIncomings = [...dbIncomings];
                const inc = updatedIncomings[index];
                
                if (inc.isRegistered) return;
                
                inc.isRegistered = true;
                
                const updatedStockData = { ...dbStockData };
                if (updatedStockData[inc.sku]) {
                    const arr = [...updatedStockData[inc.sku]];
                    arr[arr.length - 1] += inc.amount; 
                    updatedStockData[inc.sku] = arr;
                    setDbStockData(updatedStockData);
                }
                
                setDbIncomings(updatedIncomings);
                saveChangesToCloud(dbDates, updatedStockData, updatedIncomings);
                triggerNotification(`${inc.sku} 입고 완료! 최신 재고량에 +${inc.amount} 자동 합산되었습니다.`, "success");
            };

            // Selected SKU historical trends data points
            const skuHistoryPoints = useMemo(() => {
                if (!selectedSku || !dbStockData[selectedSku]) return [];
                return dbDates.slice(0, selectedDateIndex + 1).map((dt, idx) => ({
                    date: dt,
                    stock: dbStockData[selectedSku][idx] || 0
                }));
            }, [selectedSku, selectedDateIndex, dbStockData, dbDates]);

            // Handle Column Addition in Editor
            const handleAddColumn = () => {
                if (dbDates.includes(newColDate)) {
                    triggerNotification("이미 존재하는 날짜입니다.", "error");
                    return;
                }
                const updatedDates = [...dbDates, newColDate].sort();
                const insertIdx = updatedDates.indexOf(newColDate);

                const updatedStockData = {};
                Object.keys(dbStockData).forEach(sku => {
                    const arr = [...dbStockData[sku]];
                    const defaultVal = arr[arr.length - 1] || 0;
                    arr.splice(insertIdx, 0, defaultVal);
                    updatedStockData[sku] = arr;
                });

                setDbDates(updatedDates);
                setDbStockData(updatedStockData);
                setSelectedDate(newColDate);
                saveChangesToCloud(updatedDates, updatedStockData);
                triggerNotification(`새 날짜 열 [${newColDate}]이 추가되었습니다.`);
            };

            // Handle Single Cell Stock Update in Editor
            const handleCellChange = (sku, val) => {
                const updatedStocks = { ...editorStocks, [sku]: parseInt(val) || 0 };
                setEditorStocks(updatedStocks);
            };

            // Commit Edited values to Local and Cloud DB
            const handleCommitEdit = () => {
                const updatedStockData = { ...dbStockData };
                Object.keys(editorStocks).forEach(sku => {
                    if (updatedStockData[sku]) {
                        const arr = [...updatedStockData[sku]];
                        arr[selectedDateIndex] = editorStocks[sku];
                        updatedStockData[sku] = arr;
                    }
                });
                setDbStockData(updatedStockData);
                saveChangesToCloud(dbDates, updatedStockData);
                triggerNotification("수동 변경사항이 저장되었습니다.", "success");
            };

            // --- DATE OPTIONS WITH HISTORY TOGGLE ---
            const visibleDates = showAllHistory ? dbDates : dbDates.slice(-14);
            const dateOptions = useMemo(() => {
                return [...visibleDates].reverse().map(dt => ({
                    value: dt,
                    label: `${dt.replace('2026-', '')} (${dt === dbDates[dbDates.length - 1] ? "최신" : "히스토리"})`
                }));
            }, [visibleDates, dbDates]);

            const adsOptions = [
                { value: 3, label: "최근 3일 실적" },
                { value: 4, label: "최근 4일 실적 (안전)" },
                { value: 5, label: "최근 5일 실적" },
                { value: 7, label: "최근 7일 실적" },
                { value: 10, label: "최근 10일 실적" }
            ];

            // 🔒 LOGIN HANDLER
            const handleLogin = (e) => {
                e.preventDefault();
                if (pwdInput === SECRET_PASSWORD) {
                    setIsLoggedIn(true);
                } else {
                    setLoginError(true);
                    setPwdInput("");
                }
            };

            // 🔒 CONDITIONAL RENDER: LOGIN SCREEN
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 relative overflow-hidden">
                        {/* Decorative Background */}
                        <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
                        
                        <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl text-center relative z-10 border border-slate-100">
                            <div className="w-16 h-16 bg-indigo-50 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-sm border border-indigo-100">
                                <svg className="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </div>
                            <h1 className="text-2xl font-extrabold text-slate-800 mb-2">N배송(아르고) 재고현황</h1>
                            <p className="text-sm font-medium text-slate-500 mb-8">내부 인원 전용 대시보드입니다.<br/>접속 비밀번호를 입력해주세요.</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <input
                                        type="password"
                                        value={pwdInput}
                                        onChange={(e) => { setPwdInput(e.target.value); setLoginError(false); }}
                                        placeholder="비밀번호 입력"
                                        autoFocus
                                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-center font-bold tracking-widest text-slate-800 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all placeholder:font-normal placeholder:tracking-normal"
                                    />
                                </div>
                                {loginError && (
                                    <p className="text-xs text-red-500 font-bold animate-bounce">⚠️ 비밀번호가 일치하지 않습니다.</p>
                                )}
                                <button 
                                    type="submit" 
                                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3.5 rounded-xl shadow-lg shadow-indigo-600/20 transition-all active:scale-95"
                                >
                                    접속하기
                                </button>
                            </form>
                            <div className="mt-8 pt-6 border-t border-slate-100">
                                <p className="text-xs text-slate-400">© 2026 요미몬(주) 물류팀</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // 🔓 MAIN DASHBOARD RENDER
            return (
                <div className="min-h-screen flex flex-col relative">
                    
                    {/* Header */}
                    <header className="bg-gradient-to-r from-slate-900 to-indigo-950 text-white shadow-lg py-5 px-6 md:px-10 relative z-50">
                        <div className="max-w-full mx-auto flex flex-col xl:flex-row items-center justify-between gap-4">
                            <div className="flex flex-col md:flex-row items-center gap-4 w-full xl:w-auto">
                                <div className="p-2.5 bg-indigo-500/20 rounded-xl border border-indigo-500/30 shrink-0">
                                    <svg className="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                                    </svg>
                                </div>
                                <div className="text-center md:text-left">
                                    <div className="flex flex-wrap items-center justify-center md:justify-start gap-2">
                                        <h1 className="text-2xl font-bold tracking-tight">N배송(아르고) 재고현황 <span className="text-indigo-400 font-extrabold">(v34)</span></h1>
                                        {cloudSync === "connecting" && <span className="text-xs bg-indigo-600/50 text-indigo-200 px-2.5 py-0.5 rounded-full font-bold animate-pulse">☁️ 실시간 연결중...</span>}
                                        {cloudSync === "synced" && <span className="text-xs bg-emerald-600/50 text-emerald-100 px-2.5 py-0.5 rounded-full font-bold">☁️ 실시간 연동 완료</span>}
                                        {cloudSync === "local" && <span className="text-xs bg-amber-600/50 text-amber-100 px-2.5 py-0.5 rounded-full font-bold">📂 로컬 오프라인 모드</span>}
                                        {cloudSync === "error" && <span className="text-xs bg-red-600/50 text-red-100 px-2.5 py-0.5 rounded-full font-bold animate-bounce">⚠️ 클라우드 연결 실패</span>}
                                    </div>
                                    <p className="text-xs text-slate-400 mt-1">
                                        {cloudSync === "local" ? (
                                            <span className="text-amber-300 font-bold bg-amber-900/40 px-2 py-0.5 rounded">⚠️ 보안키 누락 - 깃허브 업로드용 코드를 복사하여 사용하세요</span>
                                        ) : (
                                            "네이버 N배송 입고 및 품절 예측 시뮬레이터 v2.6 (Serverless Direct Cloud Push)"
                                        )}
                                    </p>
                                </div>
                            </div>

                            {/* Actions bar */}
                            <div className="flex flex-wrap items-center justify-center gap-3 w-full xl:w-auto">
                                <div className="flex items-center gap-2 bg-slate-800 rounded-xl p-1 border border-slate-700">
                                    <button 
                                        onClick={() => {
                                            if (showAllHistory && !dbDates.slice(-14).includes(selectedDate)) {
                                                setSelectedDate(dbDates[dbDates.length - 1]);
                                            }
                                            setShowAllHistory(!showAllHistory);
                                        }} 
                                        className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all cursor-pointer ${showAllHistory ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}
                                    >
                                        {showAllHistory ? "최근 14일만 보기" : "과거 이력 전체보기"}
                                    </button>
                                    <ReactCustomDropdown 
                                        label="조회 기준일" 
                                        value={selectedDate} 
                                        options={dateOptions} 
                                        onChange={(val) => {
                                            setSelectedDate(val);
                                            triggerNotification(`${val} 재고 데이터가 적용되었습니다.`, "info");
                                        }}
                                    />
                                </div>

                                <ReactCustomDropdown 
                                    label="ADS 산정" 
                                    value={adsWindow} 
                                    options={adsOptions} 
                                    onChange={(val) => {
                                        setAdsWindow(val);
                                        triggerNotification(`최근 ${val}단계 실적 판매량 기준으로 일평균 판매량(ADS)을 계산합니다.`, "info");
                                    }}
                                />
                                
                                {/* Lock Button to clear session */}
                                <button
                                    onClick={() => {
                                        setIsLoggedIn(false);
                                        setPwdInput("");
                                    }}
                                    className="ml-2 bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 p-2 rounded-xl border border-slate-700 hover:border-red-500/30 transition-all cursor-pointer"
                                    title="화면 잠그기"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Notification Alert Box */}
                    {notification && (
                        <div className="fixed top-24 right-6 z-[200] animate-bounce">
                            <div className={`px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 border text-sm ${
                                notification.type === "error" ? "bg-red-50 border-red-200 text-red-800" :
                                notification.type === "info" ? "bg-blue-50 border-blue-200 text-blue-800" :
                                "bg-emerald-50 border-emerald-200 text-emerald-800"
                            }`}>
                                <span className="text-lg">
                                    {notification.type === "error" ? "⚠️" : notification.type === "info" ? "ℹ️" : "✅"}
                                </span>
                                <span className="font-medium">{notification.message}</span>
                            </div>
                        </div>
                    )}

                    {/* Main Content Area */}
                    <main className="flex-grow w-full max-w-full px-6 md:px-10 py-6 space-y-6">
                        
                        {/* Auto-Collapsing Pending Dispatch Section */}
                        {pendingDispatches.length === 0 ? (
                            <div className="bg-slate-100 border border-slate-200 rounded-2xl px-6 py-3 flex items-center justify-between opacity-80 cursor-default shadow-sm transition-all duration-500">
                                <h3 className="text-sm font-extrabold text-slate-500 flex items-center gap-2">
                                    <span>🎉 모든 공장 출고건이 아르고 센터에 입고 완료되었습니다.</span>
                                </h3>
                                <span className="text-xs font-bold text-slate-400 bg-white border border-slate-200 px-3 py-1 rounded-lg">
                                    미입고 대기 0건
                                </span>

                                        />
                                        <span className="text-2xl block mb-2">📊</span>
                                        <h5 className="text-xs font-extrabold text-indigo-950">재고 현황 엑셀 업로드</h5>
                                        <p className="text-[10px] text-indigo-500 mt-1">날짜별 재고현황 시트를 드래그하거나 선택하세요.</p>
                                    </div>

                                    {/* Dropzone B: Dispatch Excel */}
                                    <div className="border-2 border-dashed border-emerald-200 hover:border-emerald-500 rounded-2xl p-6 text-center cursor-pointer transition-colors bg-emerald-50/20 relative group">
                                        <input 
                                            type="file" 
                                            accept=".xlsx, .xls, .csv" 
                                            onChange={handleDispatchExcelUpload} 
                                            className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10" 
                                        />
                                        <span className="text-2xl block mb-2">🚚</span>
                                        <h5 className="text-xs font-extrabold text-emerald-950">공장 출고리스트 업로드</h5>
                                        <p className="text-[10px] text-emerald-500 mt-1">공장 출고 일정 엑셀 시트를 드래그하거나 선택하세요.</p>
                                    </div>
                                </div>
                            </div>

                            {/* Interactive Manual Database Editor Toggle Box */}
                            <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                                <div 
                                    onClick={() => setEditorActive(!editorActive)}
                                    className="p-6 bg-slate-900 text-white flex items-center justify-between cursor-pointer hover:bg-slate-950 transition-all h-full"
                                >
                                    <div className="flex items-center gap-2">
                                        <span className="text-xl">⚙️</span>
                                        <div>
                                            <h4 className="font-bold text-base">실시간 클라우드 데이터 관리 및 편집기</h4>
                                            <p className="text-xs text-slate-400 mt-0.5">클라우드 데이터베이스의 기록을 직접 추가하고 수정할 수 있는 수동 관리 모듈입니다.</p>
                                        </div>
                                    </div>
                                    <span className="text-xl font-bold">{editorActive ? "▲ 접기" : "▼ 펼치기"}</span>
                                </div>
                            </div>

                        </div>

                        {/* Collapsible database editor panel body */}
                        {editorActive && (
                            <div className="p-6 space-y-6 bg-white rounded-3xl border border-slate-100 shadow-sm animate-fade-in">
                                {/* Action A: Add a new column/date */}
                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100 space-y-3">
                                    <h5 className="text-sm font-extrabold text-slate-800">📅 새 날짜 열(Column) 추가 및 입고 생성</h5>
                                    <div className="flex flex-col sm:flex-row items-end gap-4">
                                        <div className="flex-1">
                                            <label className="block text-xs font-bold text-slate-500 mb-1">추가할 날짜 기입</label>
                                            <input 
                                                type="date" 
                                                value={newColDate}
                                                onChange={(e) => setNewColDate(e.target.value)}
                                                className="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-mono font-bold"
                                            />
                                        </div>
                                        <button 
                                            onClick={handleAddColumn}
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-extrabold px-6 py-3.5 rounded-xl shadow-md transition-all cursor-pointer"
                                        >
                                            새로운 날짜 추가 및 클라우드 업로드
                                        </button>
                                    </div>
                                </div>

                                {/* Action B: Edit stocks of selected date */}
                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100 space-y-4">
                                    <div className="flex items-center justify-between">
                                        <h5 className="text-sm font-extrabold text-slate-800">
                                            ✏️ <span className="text-indigo-600">[{selectedDate}]</span> 일자별 SKU 재고값 강제 수정
                                        </h5>
                                        <span className="text-xs text-amber-600 font-bold">⚠️ 수정 후 아래 [동기화]를 눌러야 클라우드에 영구 적용됩니다.</span>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 max-h-72 overflow-y-auto p-2 border border-slate-100 rounded-xl bg-white">
                                        {Object.keys(dbStockData).map(sku => (
                                            <div key={sku} className="bg-slate-50 p-3 rounded-xl border border-slate-200 flex flex-col justify-between gap-1.5">
                                                <span className="text-xs font-bold text-slate-700 truncate block">{sku}</span>
                                                <div className="flex items-center gap-1">
                                                    <input 
                                                        type="number"
                                                        value={editorStocks[sku] !== undefined ? editorStocks[sku] : ""}
                                                        onChange={(e) => handleCellChange(sku, e.target.value)}
                                                        className="w-full border border-slate-200 rounded-lg px-2.5 py-1 text-sm font-extrabold text-slate-800 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                                                    />
                                                    <span className="text-xs text-slate-400 font-bold">개</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="flex items-center justify-end gap-3 pt-2">
                                        <button 
                                            onClick={handleCommitEdit}
                                            className="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-extrabold px-8 py-3 rounded-xl shadow-lg shadow-emerald-600/10 transition-all cursor-pointer"
                                        >
                                            💾 수정된 재고값 클라우드 동기화 (Sync)
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Simulated Logistics Scheduler Log */}
                        <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                            <div className="p-6 border-b border-slate-100 bg-slate-50/50 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                                <div>
                                    <h4 className="font-bold text-slate-800 text-base flex items-center gap-1.5">
                                        <span>📦 활성화된 미래 입고 스케줄 일람 (시뮬레이터)</span>
                                        <span className="text-xs bg-slate-200 text-slate-700 px-3 py-1 rounded-full font-bold">
                                            {simulations.length}건 대기 중
                                        </span>
                                    </h4>
                                    <p className="text-xs text-slate-400 mt-1">배송 형태 규칙에 따라 기준일 이후 자동으로 재고에 도킹하여 가상 품절일을 보완합니다.</p>
                                </div>
                                <div className="text-xs text-slate-500 bg-amber-50 text-amber-800 border border-amber-200/50 px-4 py-2 rounded-xl font-bold">
                                    💡 <strong>택배:</strong> 기입일 3일 후 자동반영 / <strong>용차:</strong> 기입 당일 즉각반영
                                </div>
                            </div>

                            <div className="divide-y divide-slate-100">
                                {simulations.length > 0 ? (
                                    simulations.map(sim => {
                                        const dispDt = parseDateString(sim.dispatchDate);
                                        const arrivalDt = new Date(dispDt);
                                        if (sim.type === "택배") {
                                            arrivalDt.setDate(arrivalDt.getDate() + 3);
                                        }
                                        const arrivalStr = arrivalDt.toISOString().split('T')[0];

                                        return (
                                            <div key={sim.id} className="p-5 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 hover:bg-slate-50/50 transition-all">
                                                <div className="flex items-center gap-3">
                                                    <div className={`p-2 rounded-xl px-4 font-bold ${sim.type === "용차" ? "bg-red-50 text-red-600 border border-red-100" : "bg-blue-50 text-blue-600 border border-blue-100"}`}>
                                                        <span className="text-sm">{sim.type}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-xs text-slate-400 block font-semibold">대상 SKU</span>
                                                        <h5 className="text-sm md:text-base font-bold text-slate-800">{sim.sku}</h5>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-x-10 gap-y-1">
                                                    <div>
                                                        <span className="text-xxs text-slate-400 block font-semibold">출고 기입일</span>
                                                        <span className="text-xs font-mono font-bold text-slate-600">{sim.dispatchDate}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-xxs text-slate-400 block font-semibold">예상 입고 완료일</span>
                                                        <span className="text-xs font-mono font-extrabold text-slate-800">🚚 {arrivalStr}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-xxs text-slate-400 block font-semibold">입고 수량</span>
                                                        <span className="text-sm font-extrabold text-emerald-600">+{sim.amount}개</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-xxs text-slate-400 block font-semibold">유형</span>
                                                        <span className="text-xs font-bold text-slate-500">{sim.type === "택배" ? "2~3일 소요" : "즉시입고"}</span>
                                                    </div>
                                                </div>

                                                <button
                                                    onClick={() => removeSimulation(sim.id)}
                                                    className="text-xs font-extrabold text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-xl transition-all cursor-pointer"
                                                >
                                                    일정 취소
                                                </button>
                                            </div>
                                        );
                                    })
                                ) : (
                                    <div className="py-12 text-center text-slate-400 font-medium">
                                        등록된 입고 시뮬레이션 일정이 없습니다. 우측 폼에서 시뮬레이션을 등록해보세요!
                                    </div>
                                )}
                            </div>
                        </div>

                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-900 text-slate-500 text-xs py-6 border-t border-slate-800">
                        <div className="max-w-full mx-auto px-10 text-center space-y-2">
                            <p>© 2026 요미몬(주) 물류팀. All Rights Reserved.</p>
                        </div>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
