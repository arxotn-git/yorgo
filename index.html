        // --- CUSTOM DROPDOWN COMPONENT ---
        function ReactCustomDropdown({ label, value, options, onChange }) {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);

            const selectedOption = useMemo(() => options.find(o => o.value === value) || options[0], [options, value]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            if (options.length === 0) return null;

            return (
                <div ref={dropdownRef} className="relative flex items-center bg-slate-800 rounded-xl px-4 py-1.5 border border-slate-700 pointer-events-auto z-50">
                    {label && <span className="text-sm text-slate-400 mr-2 font-medium select-none">{label}:</span>}
                    <div className="relative">
                        <button type="button" onClick={() => setIsOpen(!isOpen)} className="bg-slate-900 text-indigo-300 font-extrabold rounded-lg px-3 py-2 border border-slate-700 flex items-center justify-between gap-2 hover:border-indigo-500 hover:text-indigo-200 transition-all cursor-pointer min-w-[120px]">
                            <span>{selectedOption ? selectedOption.label : ""}</span>

                        </button>

                                {options.map((opt) => (
                                    <button key={opt.value} type="button" onClick={() => { onChange(opt.value); setIsOpen(false); }} className={`w-full text-left px-4 py-2.5 text-sm font-semibold transition-all flex items-center justify-between border-b border-slate-800/40 last:border-0 ${opt.value === value ? "bg-indigo-600/30 text-indigo-300 border-l-4 border-indigo-500" : "text-slate-300 hover:bg-slate-800 hover:text-white"}`}>
                                        <span>{opt.label}</span>
                                        {opt.value === value && <span className="text-indigo-400 font-bold">✓</span>}

                        )}

        function App() {
            // 🔒 SECURITY STATE
            const [isLoggedIn, setIsLoggedIn] = useState(false);

            const [loginError, setLoginError] = useState(false);

            // App States
            const [currentView, setCurrentView] = useState("argo"); // 'argo' | 'rocket'
            const [cloudSync, setCloudSync] = useState(useFirebase ? "connecting" : "github");

            // ARGO Data
            const [dbDates, setDbDates] = useState(INITIAL_DATES);
            const [dbStockData, setDbStockData] = useState(INITIAL_STOCK_DATA);
            const [dbIncomings, setDbIncomings] = useState(INITIAL_INCOMINGS);

            // ROCKET Data
            const [rocketDates, setRocketDates] = useState(INITIAL_ROCKET_DATES);
            const [rocketData, setRocketData] = useState(INITIAL_ROCKET_DATA);

            // Filtering configuration
            const availableMonths = useMemo(() => {
                const mSet = new Set(dbDates.map(d => d.substring(0, 7)));
                return Array.from(mSet).sort().reverse();
            }, [dbDates]);

            const [selectedMonth, setSelectedMonth] = useState(availableMonths[0]);
            
            // Adjust dates based on selected month
            const monthFilteredDates = useMemo(() => {
                return dbDates.filter(d => d.startsWith(selectedMonth));
            }, [dbDates, selectedMonth]);

            const [selectedDate, setSelectedDate] = useState(dbDates[dbDates.length - 1]);

            useEffect(() => {
                const latestInMonth = monthFilteredDates[monthFilteredDates.length - 1];
                if (latestInMonth) setSelectedDate(latestInMonth);
            }, [selectedMonth]);

            const [adsWindow, setAdsWindow] = useState(4);
            const [onlyCritical30, setOnlyCritical30] = useState(true);
            const [excludeZeroStock, setExcludeZeroStock] = useState(true);
            const [searchQuery, setSearchQuery] = useState("");
            const [categoryFilter, setCategoryFilter] = useState("ALL");
            const [selectedSku, setSelectedSku] = useState("안심클레이 10종팩");

            const [simulations, setSimulations] = useState([]);
            const [simSku, setSimSku] = useState("플레이돌 맥스");
            const [simDispatchDate, setSimDispatchDate] = useState("2026-06-02");
            const [simType, setSimType] = useState("택배");
            const [simAmount, setSimAmount] = useState(100);

            const [notification, setNotification] = useState(null);
            const triggerNotification = (message, type = "success") => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (pwdInput === SECRET_PASSWORD) setIsLoggedIn(true);
                else { setLoginError(true); setPwdInput(""); }
            };

            // Firebase Snapshot sync & Auto-Upgrade Logic
            useEffect(() => {
                if (!useFirebase) return;

                const docRef = db.doc(`artifacts/${appId}/public/data/inventory_v1/dashboard_state`);
                const unsubscribe = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        const cloudVersion = data.APP_VERSION || 0;
                        
                        if (APP_VERSION > cloudVersion) {
                            docRef.set({
                                APP_VERSION, DATES: INITIAL_DATES, STOCK_DATA: INITIAL_STOCK_DATA, HISTORICAL_INCOMINGS: INITIAL_INCOMINGS,
                                ROCKET_DATES: INITIAL_ROCKET_DATES, ROCKET_DATA: INITIAL_ROCKET_DATA
                            }).then(() => triggerNotification(`클라우드 자동 업그레이드 완료 (v${APP_VERSION})`, "success"));
                            return;
                        }

                        if (data.DATES) setDbDates(data.DATES);
                        if (data.STOCK_DATA) setDbStockData(data.STOCK_DATA);
                        if (data.HISTORICAL_INCOMINGS) setDbIncomings(data.HISTORICAL_INCOMINGS);
                        if (data.ROCKET_DATES) setRocketDates(data.ROCKET_DATES);
                        if (data.ROCKET_DATA) setRocketData(data.ROCKET_DATA);
                        
                        setCloudSync("synced");
                    } else {
                        docRef.set({
                            APP_VERSION, DATES: INITIAL_DATES, STOCK_DATA: INITIAL_STOCK_DATA, HISTORICAL_INCOMINGS: INITIAL_INCOMINGS,
                            ROCKET_DATES: INITIAL_ROCKET_DATES, ROCKET_DATA: INITIAL_ROCKET_DATA
                        }).then(() => setCloudSync("synced")).catch(() => setCloudSync("error"));
                    }
                }, () => setCloudSync("error"));
                return () => unsubscribe();
            }, []);

            const saveChangesToCloud = async (updatedDbDates, updatedDbStock, updatedIncomings, updatedRocketDates, updatedRocketData) => {
                if (!useFirebase) {
                    setDbDates(updatedDbDates || dbDates);
                    setDbStockData(updatedDbStock || dbStockData);
                    setDbIncomings(updatedIncomings || dbIncomings);
                    setRocketDates(updatedRocketDates || rocketDates);
                    setRocketData(updatedRocketData || rocketData);
                    triggerNotification("로컬 상태로 즉시 반영되었습니다.", "info");
                    return;
                }
                setCloudSync("connecting");
                try {
                    await db.doc(`artifacts/${appId}/public/data/inventory_v1/dashboard_state`).set({
                        APP_VERSION, 
                        DATES: updatedDbDates || dbDates, 
                        STOCK_DATA: updatedDbStock || dbStockData, 
                        HISTORICAL_INCOMINGS: updatedIncomings || dbIncomings,
                        ROCKET_DATES: updatedRocketDates || rocketDates,
                        ROCKET_DATA: updatedRocketData || rocketData
                    });
                    triggerNotification("클라우드 무선 동기화 완료!", "success");
                    setCloudSync("synced");
                } catch (err) { setCloudSync("error"); triggerNotification("동기화 실패", "error"); }
            };

            const selectedDateIndex = useMemo(() => {
                const idx = dbDates.indexOf(selectedDate);
                return idx !== -1 ? idx : dbDates.length - 1;
            }, [selectedDate, dbDates]);

            // --- ADS AND FORECASTING ---
            const calculateSkuMetrics = (sku, targetDateIndex) => {
                const currentStock = dbStockData[sku]?.[targetDateIndex] || 0;
                const startIndex = Math.max(0, targetDateIndex - adsWindow);
                const startDateStr = dbDates[startIndex];
                const targetDateStr = dbDates[targetDateIndex];
                const startStock = dbStockData[sku]?.[startIndex] || 0;
                
                const startDt = parseDateString(startDateStr);
                const targetDt = parseDateString(targetDateStr);
                const diffTime = Math.abs(targetDt - startDt);
                const diffDays = Math.max(1, Math.ceil(diffTime / (1000 * 60 * 60 * 24)));
                const stockDelta = startStock - currentStock;

                let windowIncomings = 0;
                let pendingDbArrivals = 0;

                dbIncomings.forEach(inc => {
                    if (inc.sku !== sku) return;
                    const incDate = parseDateString(inc.date);
                    let isPhysicallyPresent = false;
                    
                    if (inc.isRegistered) {
                        isPhysicallyPresent = true;
                        if (incDate > startDt && incDate <= targetDt) {
                            if (currentStock < inc.amount * 0.8 && stockDelta >= 0) isPhysicallyPresent = false;
                        }
                    }
                    if (isPhysicallyPresent) {
                        if (incDate > startDt && incDate <= targetDt) windowIncomings += inc.amount;
                    } else {
                        pendingDbArrivals += inc.amount;
                    }
                });

                const totalSales = stockDelta + windowIncomings;
                const calculatedAds = Math.max(0, parseFloat((totalSales / diffDays).toFixed(2)));

                let simulatedArrivals = pendingDbArrivals;
                simulations.forEach(sim => {
                    if (sim.sku === sku) {
                        const dispDt = parseDateString(sim.dispatchDate);
                        const arrDt = new Date(dispDt);
                        if (sim.type === "택배") arrDt.setDate(arrDt.getDate() + 3);
                        if (arrDt > targetDt) simulatedArrivals += sim.amount;
                    }
                });

                let daysRemaining = Infinity;
                let expectedStockoutDate = "안전 (우려없음)";
                let displayRemainingText = "99일 이상";

                if (calculatedAds > 0) {
                    const totalProjectedStock = currentStock + simulatedArrivals;
                    daysRemaining = totalProjectedStock / calculatedAds;
                    if (daysRemaining < 365) {
                        const stockoutDt = new Date(targetDt);
                        stockoutDt.setDate(stockoutDt.getDate() + Math.floor(daysRemaining));
                        expectedStockoutDate = stockoutDt.toISOString().split('T')[0];
                        displayRemainingText = `${Math.ceil(daysRemaining)}일 남음`;
                    }
                }

                return {
                    sku, category: CATEGORIES[sku] || "기타", currentStock, ads: calculatedAds,
                    daysRemaining, displayRemainingText, expectedStockoutDate,
                    replenishment30: calculatedAds > 0 ? Math.ceil(calculatedAds * 30) : 0, simulatedArrivals
                };
            };

            const processedSkuList = useMemo(() => Object.keys(dbStockData).map(sku => calculateSkuMetrics(sku, selectedDateIndex)), [selectedDateIndex, adsWindow, simulations, dbStockData, dbDates, dbIncomings]);
            const filteredSkuList = useMemo(() => processedSkuList.filter(item => {
                if (excludeZeroStock && item.currentStock === 0) return false;
                if (onlyCritical30 && item.daysRemaining > 30) return false;
                if (categoryFilter !== "ALL" && item.category !== categoryFilter) return false;
                if (searchQuery && !item.sku.includes(searchQuery)) return false;
                return true;
            }).sort((a, b) => a.daysRemaining - b.daysRemaining), [processedSkuList, onlyCritical30, excludeZeroStock, searchQuery, categoryFilter]);

            const pendingDispatches = useMemo(() => dbIncomings.filter(inc => !inc.isRegistered).map(inc => {
                const arrDt = new Date(parseDateString(inc.date));
                if (inc.type === "택배") arrDt.setDate(arrDt.getDate() + 3);
                return { ...inc, arrivalDateStr: arrDt.toISOString().split('T')[0] };
            }), [dbIncomings]);

            const summaryMetrics = useMemo(() => {
                return {
                    criticalCount: processedSkuList.filter(i => i.daysRemaining <= 10).length,
                    warningCount: processedSkuList.filter(i => i.daysRemaining > 10 && i.daysRemaining <= 30).length,
                    totalStock: processedSkuList.reduce((s, i) => s + i.currentStock, 0),
                    totalDailySales: processedSkuList.reduce((s, i) => s + i.ads, 0).toFixed(1)
                };
            }, [processedSkuList]);

            // --- 🚀 3in1 UNIFIED EXCEL PARSER ---
            const handleUnifiedExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });

                        let newRocketDates = [...rocketDates];
                        let newRocketData = { ...rocketData };
                        let newArgoDates = [...dbDates];
                        let newArgoData = { ...dbStockData };
                        let newIncomings = [...dbIncomings];

                        // 1. ROCKET SHEET PARSING (Index 0)
                        try {
                            const sRocket = workbook.Sheets["로켓"] || workbook.Sheets[workbook.SheetNames[0]];
                            if(sRocket) {
                                const rRows = XLSX.utils.sheet_to_json(sRocket, { header: 1 });
                                if(rRows.length > 1) {
                                    const hRow = rRows[0];
                                    const dCols = []; let sIdx = 0;
                                    hRow.forEach((c, i) => {
                                        if(c && (String(c).match(/^\d+[\/\-]\d+/) || String(c).startsWith('202'))) {
                                            let lbl = String(c).trim();
                                            if (!lbl.startsWith("202")) {
                                                let [m, d] = lbl.split(/[\/\-]/);
                                                if (m && d) lbl = `2026-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
                                            }
                                            dCols.push({ index: i, label: lbl });
                                        }
                                    });
                                    
                                    const parsedDates = dCols.map(c => c.label);
                                    newRocketDates = Array.from(new Set([...rocketDates, ...parsedDates])).sort();

                                    // Resize all existing rocket data BEFORE updating new ones
                                    Object.keys(newRocketData).forEach(k => {
                                        newRocketData[k] = newRocketDates.map(d => {
                                            const oldI = rocketDates.indexOf(d);
                                            return oldI !== -1 ? newRocketData[k][oldI] : "-";
                                        });
                                    });

                                    for(let i=1; i<rRows.length; i++) {
                                        const row = rRows[i];
                                        const sku = cleanSkuName(row[sIdx]);
                                        if(!sku) continue;
                                        
                                        if(!newRocketData[sku]) newRocketData[sku] = new Array(newRocketDates.length).fill("-");

                                        dCols.forEach((col, cIdx) => {
                                            const val = row[col.index] !== undefined ? parseInt(row[col.index]) || 0 : "-";
                                            const uIdx = newRocketDates.indexOf(parsedDates[cIdx]);
                                            if(uIdx !== -1) newRocketData[sku][uIdx] = val;
                                        });
                                    }
                                }
                            }
                        } catch(e) { console.warn("Rocket sheet parse warning", e); }

                        // 2. ARGO STOCK PARSING (Index 1)
                        try {
                            const sArgo = workbook.Sheets["N배송"] || workbook.Sheets[workbook.SheetNames[1]];
                            if(sArgo) {
                                const aRows = XLSX.utils.sheet_to_json(sArgo, { header: 1 });
                                if(aRows.length > 1) {
                                    const hRow = aRows[0];
                                    const dCols = []; let sIdx = 0;
                                    hRow.forEach((c, i) => {
                                        if(c && (String(c).match(/^\d+[\/\-]\d+/) || String(c).startsWith('202'))) {
                                            let lbl = String(c).trim();
                                            if (!lbl.startsWith("202")) {
                                                let [m, d] = lbl.split(/[\/\-]/);
                                                if (m && d) {
                                                    let suffix = "";
                                                    if (d.includes(" (2)")) { suffix = " (2)"; d = d.replace(" (2)", "").trim(); }
                                                    lbl = `2026-${m.padStart(2, '0')}-${d.padStart(2, '0')}${suffix}`;
                                                }
                                            }
                                            dCols.push({ index: i, label: lbl });
                                        }
                                    });
                                    
                                    const parsedDates = dCols.map(c => c.label);
                                    newArgoDates = Array.from(new Set([...dbDates, ...parsedDates])).sort();

                                    // Resize existing argo arrays
                                    Object.keys(newArgoData).forEach(k => {
                                        newArgoData[k] = newArgoDates.map(d => {
                                            const oldI = dbDates.indexOf(d);
                                            return oldI !== -1 ? newArgoData[k][oldI] : 0;
                                        });
                                    });

                                    for(let i=1; i<aRows.length; i++) {
                                        const row = aRows[i];
                                        const sku = cleanSkuName(row[sIdx]);
                                        if(!sku || !Object.keys(INITIAL_STOCK_DATA).includes(sku)) continue;
                                        
                                        if(!newArgoData[sku]) newArgoData[sku] = new Array(newArgoDates.length).fill(0);

                                        dCols.forEach((col, cIdx) => {
                                            const val = parseInt(row[col.index]) || 0;
                                            const uIdx = newArgoDates.indexOf(parsedDates[cIdx]);
                                            if(uIdx !== -1) newArgoData[sku][uIdx] = val;
                                        });
                                    }
                                }
                            }
                        } catch(e) { console.warn("Argo sheet parse warning", e); }

                        // 3. DISPATCH PARSING (Index 2)
                        try {
                            const sDisp = workbook.Sheets["아르고발송"] || workbook.Sheets[workbook.SheetNames[2]];
                            if(sDisp) {
                                const dRows = XLSX.utils.sheet_to_json(sDisp, { header: 1 });
                                if(dRows.length > 1) {
                                    const hRow = dRows[0];
                                    const dCols = []; let sIdx = 0;
                                    hRow.forEach((c, i) => {
                                        if(c && (String(c).match(/^\d+[\/\-]\d+/) || String(c).startsWith('202'))) {
                                            dCols.push({ index: i, label: String(c).trim() });
                                        }
                                    });

                                    for(let i=1; i<dRows.length; i++) {
                                        const row = dRows[i];
                                        const sku = cleanSkuName(row[sIdx]);
                                        if(!sku || !Object.keys(INITIAL_STOCK_DATA).includes(sku)) continue;

                                        dCols.forEach(col => {
                                            const amount = parseInt(row[col.index]) || 0;
                                            if(amount > 0) {
                                                let type = col.label.includes("용차") ? "용차" : "택배";
                                                let cleanDate = col.label.split(' ')[0].split('(')[0];
                                                if (!cleanDate.startsWith("2026-")) {
                                                    let [m, d] = cleanDate.split(/[\/\-]/);
                                                    if (m && d) cleanDate = `2026-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
                                                }

                                                if(!newIncomings.some(inc => inc.sku === sku && inc.date === cleanDate && inc.amount === amount)) {
                                                    newIncomings.push({ sku, date: cleanDate, amount, type, isRegistered: false });
                                                }
                                            }
                                        });
                                    }
                                }
                            }

                        saveChangesToCloud(newArgoDates, newArgoData, newIncomings, newRocketDates, newRocketData);
                        setSelectedMonth(newArgoDates[newArgoDates.length - 1].substring(0, 7)); // Update month to latest
                        triggerNotification("🎉 엑셀 1장으로 로켓/N배송/출고리스트 전체 자동 병합 완료!");
                    } catch (err) {
                        console.error(err);
                        triggerNotification("엑셀 파일 파싱 중 치명적 오류가 발생했습니다.", "error");
                    }
                };
                reader.readAsBinaryString(file);
            };

            const toggleIncomingRegistration = (index) => {
                const updatedIncomings = [...dbIncomings];
                updatedIncomings[index].isRegistered = true;
                setDbIncomings(updatedIncomings);

            };

                e.preventDefault();
                if (simAmount <= 0) return;
                const newSim = { id: Date.now(), sku: simSku, dispatchDate: simDispatchDate, type: simType, amount: parseInt(simAmount) };

            return (

                                        {cloudSync === "github" ? <span className="text-xs bg-emerald-600/50 text-emerald-100 px-2.5 py-0.5 rounded-full font-bold">✅ 깃허브 실시간 연동 정상</span> 
                                        : cloudSync === "synced" ? <span className="text-xs bg-emerald-600/50 text-emerald-100 px-2.5 py-0.5 rounded-full font-bold">☁️ 실시간 연동 완료</span> 
                                        : <span className="text-xs bg-indigo-600/50 text-indigo-100 px-2.5 py-0.5 rounded-full font-bold animate-pulse">☁️ 연결 중...</span>}
                                    </div>
                                </div>
                            </div>
                            
                            {/* Actions bar */}
                            <div className="flex flex-wrap items-center justify-center gap-3 w-full xl:w-auto">
                                <div className="flex items-center gap-2 bg-slate-800 rounded-xl p-1 border border-slate-700 shadow-inner">
                                    <ReactCustomDropdown value={selectedMonth} options={monthOptions} onChange={setSelectedMonth} />
                                    <div className="w-px h-6 bg-slate-700"></div>
                                    <ReactCustomDropdown value={selectedDate} options={dateOptions} onChange={(val) => { setSelectedDate(val); triggerNotification(`${val} 데이터가 적용되었습니다.`); }} />
                                </div>
                                <ReactCustomDropdown label="ADS 산정" value={adsWindow} options={adsOptions} onChange={setAdsWindow} />

                                            <div className="md:col-span-6 relative">
                                                <input type="text" placeholder="품목명 검색..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20" />
                                                <span className="absolute left-3.5 top-3 text-slate-400">🔍</span>
                                            </div>
                                            <div className="md:col-span-6 flex flex-wrap items-center justify-end gap-x-6 gap-y-1">
                                                <label className="flex items-center gap-2 text-sm font-bold text-slate-600 cursor-pointer select-none">
                                                    <input type="checkbox" checked={onlyCritical30} onChange={(e) => setOnlyCritical30(e.target.checked)} className="rounded border-slate-300 text-indigo-600 w-4 h-4 cursor-pointer" />
                                                    <span>⏳ 30일 이내 품절</span>
                                                </label>
                                                <label className="flex items-center gap-2 text-sm font-bold text-slate-600 cursor-pointer select-none">
                                                    <input type="checkbox" checked={excludeZeroStock} onChange={(e) => setExcludeZeroStock(e.target.checked)} className="rounded border-slate-300 text-indigo-600 w-4 h-4 cursor-pointer" />
                                                    <span>🚫 재고 0개 제외</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50/80 border-b border-slate-100 text-slate-500 text-xs font-extrabold uppercase tracking-wider">
                                                    <th className="py-4 px-6">분류</th>
                                                    <th className="py-4 px-6">SKU</th>
                                                    <th className="py-4 px-6 text-center">현재고 ({selectedDate.slice(5)})</th>
                                                    <th className="py-4 px-6 text-center">ADS</th>
                                                    <th className="py-4 px-6">예상 품절일</th>
                                                    <th className="py-4 px-6">잔여기간</th>
                                                    <th className="py-4 px-6 text-right">보충 필요(30일분)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 text-sm">
                                                {filteredSkuList.map(item => {
                                                    const isSelected = selectedSku === item.sku;
                                                    const isCritical = item.daysRemaining <= 10;
                                                    const isWarning = item.daysRemaining > 10 && item.daysRemaining <= 30;
                                                    return (
                                                        <tr key={item.sku} onClick={() => setSelectedSku(item.sku)} className={`hover:bg-indigo-50/40 cursor-pointer transition-all border-l-4 ${isSelected ? "bg-indigo-50/80 border-l-indigo-600" : "border-l-transparent"}`}>
                                                            <td className="py-5 px-6 font-bold text-slate-400">{item.category}</td>
                                                            <td className="py-5 px-6 font-bold text-slate-900">{item.sku}</td>
                                                            <td className="py-5 px-6 text-center font-extrabold text-slate-900 text-base">
                                                                {item.currentStock}
                                                                {item.simulatedArrivals > 0 && <span className="block text-xs text-emerald-600 font-extrabold mt-1">(+{item.simulatedArrivals} 예정)</span>}
                                                            </td>
                                                            <td className="py-5 px-6 text-center text-slate-700 font-mono font-semibold">{item.ads.toFixed(2)}</td>
                                                            <td className="py-5 px-6">
                                                                <span className={`font-mono text-sm px-3 py-1.5 rounded-lg font-bold w-max ${isCritical ? "bg-red-100 text-red-800" : isWarning ? "bg-amber-100 text-amber-800" : "text-slate-600"}`}>
                                                                    📅 {item.expectedStockoutDate}
                                                                </span>
                                                            </td>
                                                            <td className="py-5 px-6">
                                                                <span className={`inline-flex px-3 py-1 rounded-full text-xs font-extrabold ${isCritical ? "bg-red-200 text-red-900" : isWarning ? "bg-amber-200 text-amber-900" : "bg-emerald-200 text-emerald-900"}`}>
                                                                    {item.displayRemainingText}
                                                                </span>
                                                            </td>
                                                            <td className="py-5 px-6 text-right font-extrabold text-indigo-700 text-base">
                                                                {item.replenishment30.toLocaleString()}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* Right Detail Panel */}
                                <div className="lg:col-span-3 space-y-6">
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-5">
                                        <div className="flex justify-between items-center"><span className="text-xs font-bold text-indigo-600 tracking-widest">📈 디테일 분석</span></div>
                                        <h3 className="text-xl font-bold text-slate-900 leading-tight">{selectedSku}</h3>
                                        <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                            <span className="text-xs font-semibold text-slate-500 block mb-3">과거 재고 수준 추이 ({selectedDate.slice(5)} 기준)</span>
                                            <div className="h-36 w-full flex items-end justify-between gap-1 pt-4">
                                                {skuHistoryPoints.map((pt, idx) => {
                                                    const maxStock = Math.max(...skuHistoryPoints.map(p => p.stock), 50);
                                                    const barHeight = `${(pt.stock / maxStock) * 100}%`;
                                                    return (
                                                        <div key={idx} className="flex-1 flex flex-col items-center h-full justify-end group relative">
                                                            <div style={{ height: barHeight }} className={`w-full rounded-t-sm transition-all duration-300 ${idx === skuHistoryPoints.length - 1 ? "bg-indigo-600" : "bg-slate-300"}`}></div>
                                                            <span className="text-[9px] text-slate-400 mt-1 font-mono">{pt.date.slice(5)}</span>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>

                                    {/* SIMULATION */}
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                                        <h4 className="font-bold text-slate-800 text-sm">🚚 입고 시뮬레이션</h4>
                                        <form onSubmit={addSimulation} className="space-y-4">
                                            <select value={simSku} onChange={(e) => setSimSku(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500/20 cursor-pointer">
                                                {Object.keys(dbStockData).filter(k => k !== "사운드차트 3종 패키지").map(sku => <option key={sku} value={sku}>{sku}</option>)}
                                            </select>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input type="date" value={simDispatchDate} onChange={(e) => setSimDispatchDate(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-mono font-bold" />
                                                <select value={simType} onChange={(e) => setSimType(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold">
                                                    <option value="택배">택배</option>
                                                    <option value="용차">용차</option>
                                                </select>
                                            </div>
                                            <input type="number" value={simAmount} onChange={(e) => setSimAmount(e.target.value)} placeholder="수량 입력" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-bold" />
                                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 rounded-xl text-sm transition-all">시뮬레이션 가동</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {/* Unified Drag and Drop Excel Upload Center (Visible on both views) */}
                    <div className="max-w-full mx-auto px-6 md:px-10 pb-10">
                        <div className="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 space-y-4">
                            <div>
                                <h4 className="font-extrabold text-slate-800 text-base flex items-center gap-2">
                                    <span>📊 통합 엑셀 파일 직접 연동 관리자</span>
                                    <span className="text-xs bg-indigo-100 text-indigo-700 font-extrabold px-2.5 py-0.5 rounded-full">3-in-1 파서</span>
                                </h4>
                                <p className="text-xs text-slate-400 mt-1">로켓배송과 아르고 재고, 발송이 모두 들어있는 엑셀 파일 하나만 마우스로 끌어다 놓으시면 전체 화면이 한 번에 업데이트됩니다.</p>
                            </div>

                            <div className="border-2 border-dashed border-indigo-200 hover:border-indigo-500 rounded-2xl p-10 text-center cursor-pointer transition-colors bg-indigo-50/20 relative group">
                                <input type="file" accept=".xlsx, .xls, .csv" onChange={handleUnifiedExcelUpload} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10" />
                                <span className="text-4xl block mb-4">📂</span>
                                <h5 className="text-sm font-extrabold text-indigo-950">여기에 엑셀 파일을 드래그 앤 드롭 하세요</h5>
                                <p className="text-xs text-indigo-500 mt-1">로켓배송 / N배송 / 아르고발송 시트를 자동 인식하여 한 번에 합산합니다.</p>
                            </div>
                        </div>
                    </div>

                    <footer className="bg-slate-900 text-slate-500 text-xs py-6 border-t border-slate-800">
                        <div className="max-w-full mx-auto px-10 text-center space-y-2">
                            <p>© 2026 요미몬(주) 통합 재고 관리 시스템. All Rights Reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
