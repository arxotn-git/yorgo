// ── 날짜 파싱 (핵심 수정: Date 객체 및 시리얼 번호 지원) ──────────
const parseExcelDateCell = (cell) => {
    if (!cell && cell !== 0) return null;
    // Date 객체 (cellDates:true 옵션 사용 시)
    if (cell instanceof Date) {
        if (isNaN(cell.getTime())) return null;
        return `${cell.getFullYear()}-${String(cell.getMonth()+1).padStart(2,'0')}-${String(cell.getDate()).padStart(2,'0')}`;
    }
    const s = String(cell).trim();
    if (!s) return null;
    // Excel 직렬 번호 (예: 46100 같은 숫자)
    const n = Number(s);
    if (!isNaN(n) && n > 40000 && n < 60000 && !/[\/\-년월일]/.test(s)) {
        const d = new Date(Math.round((n - 25569) * 86400 * 1000));
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    // 한글: "2026년 5월 14일"
    const km = s.match(/(\d{2,4})년\s*(\d{1,2})월\s*(\d{1,2})일?/);
    if (km) { const y=km[1].length===2?`20${km[1]}`:km[1]; return `${y}-${km[2].padStart(2,'0')}-${km[3].padStart(2,'0')}`; }
    // YYYY-MM-DD / YYYY/MM/DD / YYYY.MM.DD
    const m3 = s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
    if (m3) return `${m3[1]}-${m3[2].padStart(2,'0')}-${m3[3].padStart(2,'0')}`;
    // YY-MM-DD
    const m3y = s.match(/^(\d{2})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
    if (m3y) return `20${m3y[1]}-${m3y[2].padStart(2,'0')}-${m3y[3].padStart(2,'0')}`;
    // MM/DD 또는 MM-DD
    const m2 = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})$/);
    if (m2) { const mo=parseInt(m2[1]); const y=mo>8?"2025":"2026"; return `${y}-${m2[1].padStart(2,'0')}-${m2[2].padStart(2,'0')}`; }
    return null;
};

// ── Custom Dropdown ──────────────────────────────────────────────────
function Dropdown({ label, value, options, onChange }) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);
    const sel = useMemo(() => options.find(o => o.value === value) || options[0], [options, value]);
    useEffect(() => {
        const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener("mousedown", h);
        return () => document.removeEventListener("mousedown", h);
    }, []);
    if (!options.length) return null;
    return (
        <div ref={ref} className="relative flex items-center bg-slate-800 rounded-xl px-3 py-1.5 border border-slate-700 z-50">
            {label && <span className="text-sm text-slate-400 mr-2 font-medium select-none">{label}:</span>}
            <div className="relative">
                <button type="button" onClick={() => setOpen(!open)} className="bg-slate-900 text-indigo-300 font-extrabold rounded-lg px-3 py-2 border border-slate-700 flex items-center gap-2 hover:border-indigo-500 transition-all min-w-[90px]">
                    <span>{sel ? sel.label : ""}</span>
                    <svg className={`w-4 h-4 transition-transform flex-shrink-0 ${open ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                {open && (
                    <div className="absolute right-0 mt-2 w-52 rounded-xl bg-slate-900 border border-slate-700 shadow-2xl py-1 z-[999] max-h-64 overflow-y-auto">
                        {options.map(opt => (
                            <button key={String(opt.value)} type="button" onClick={() => { onChange(opt.value); setOpen(false); }}
                                className={`w-full text-left px-4 py-2.5 text-sm font-semibold flex items-center justify-between border-b border-slate-800/40 last:border-0 ${opt.value === value ? "bg-indigo-600/30 text-indigo-300 border-l-4 border-indigo-500" : "text-slate-300 hover:bg-slate-800 hover:text-white"}`}>
                                <span>{opt.label}</span>
                                {opt.value === value && <span>✓</span>}
                            </button>
                        ))}
                    </div>
                )}
            </div>
        </div>
    );
}

    useEffect(()=>{ if(!argoYears.includes(aYear)) setAYear(argoYears[0]); },[argoYears]);
    useEffect(()=>{ if(!argoMonths.includes(aMon)) setAMon(argoMonths[0]); },[aYear,argoMonths]);
    useEffect(()=>{ if(argoDatesForMon.length && !argoDatesForMon.includes(aDate)) setADate(argoDatesForMon[0]); },[argoDatesForMon]);

    // ── 로켓 필터 상태 ──
    const [rMode, setRMode] = useState("15");
    // [FIX] 기본값 true: 처음에는 모든 상품 표시
    const [rShowZero, setRShowZero] = useState(true);
    const rYears = useMemo(()=> rDates.length ? [...new Set(rDates.map(d=>d.slice(0,4)))].sort().reverse() : ["2026"],[rDates]);
    const [rYear, setRYear] = useState(()=>rYears[0]||"2026");
    const rMons = useMemo(()=> rDates.length ? [...new Set(rDates.filter(d=>d.startsWith(rYear)).map(d=>d.slice(5,7)))].sort().reverse() : ["06"],[rDates,rYear]);
    const [rMon, setRMon] = useState(()=>rMons[0]||"06");
    useEffect(()=>{ if(!rYears.includes(rYear)) setRYear(rYears[0]); },[rYears]);
    useEffect(()=>{ if(!rMons.includes(rMon)) setRMon(rMons[0]); },[rYear,rMons]);

    const thisYM = useMemo(()=>{ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; },[]);
    const lastYM = useMemo(()=>{ const n=new Date(); const l=new Date(n.getFullYear(),n.getMonth()-1,1); return `${l.getFullYear()}-${String(l.getMonth()+1).padStart(2,'0')}`; },[]);

    const visRDates = useMemo(()=>{
        if (!rDates.length) return [];
        if (rMode==="15") return rDates.slice(-15);
        if (rMode==="30") return rDates.slice(-30);
        if (rMode==="THIS") return rDates.filter(d=>d.startsWith(thisYM));
        if (rMode==="LAST") return rDates.filter(d=>d.startsWith(lastYM));
        return rDates.filter(d=>d.startsWith(`${rYear}-${rMon}`));
    },[rDates,rMode,rYear,rMon,thisYM,lastYM]);

    // [FIX] isYomimon 필터 완전 제거 → 모든 상품 표시
    const filtRItems = useMemo(()=>{
        return rItems.filter(item => {
            if (!rShowZero) {
                const last30 = rDates.slice(-30);
                const hasStock = last30.some(d => {
                    const v = item.history[d];
                    if (v === undefined || v === null || v === "" || v === "-") return false;
                    return Number(v) > 0;
                });
                if (!hasStock) return false;
            }
            return true;
        });
    },[rItems,rDates,rShowZero]);

    // ── N배송 ADS 계산 ──
    const [adsWin, setAdsWin] = useState(4);
    const [only30, setOnly30] = useState(true);
    const [exZero, setExZero] = useState(true);
    const [search, setSearch] = useState("");
    const [catF, setCatF] = useState("ALL");
    const [selSku, setSelSku] = useState("");

    const aDateIdx = useMemo(()=>{ const i=dbDates.indexOf(aDate); return i!==-1?i:Math.max(0,dbDates.length-1); },[aDate,dbDates]);

    const calcSku = (sku, ti) => {
        const cur = dbStock[sku]?.[ti] || 0;
        const si = Math.max(0, ti-adsWin);
        const startStock = dbStock[sku]?.[si] || 0;
        const sDt = cleanDateForParse(dbDates[si]);
        const tDt = cleanDateForParse(dbDates[ti]);
        const days = Math.max(1, Math.ceil(Math.abs(tDt-sDt)/86400000));
        const delta = startStock - cur;
        let winInc=0, pending=0;
        dbInc.forEach(inc=>{
            if (inc.sku!==sku) return;
            const dt = cleanDateForParse(inc.date);
            if (isNaN(dt.getTime())) return;
            let present = false;
            if (inc.isRegistered) {
                present = true;
                if (dt>sDt && dt<=tDt && cur < inc.amount*0.8 && delta>=0) present=false;
            }
            if (present) { if(dt>sDt && dt<=tDt) winInc+=inc.amount; }
            else pending+=inc.amount;
        });
        const sales=delta+winInc;
        const ads=Math.max(0,parseFloat((sales/days).toFixed(2)));
        let dr=Infinity, esd="안전 (우려없음)", drt="99일 이상";
        if (ads>0) {
            const tot=cur+pending;
            dr=tot/ads;
            if (dr<365) {
                const sd=new Date(tDt); sd.setDate(sd.getDate()+Math.floor(dr));
                esd=sd.toISOString().split('T')[0];
                drt=`${Math.ceil(dr)}일 남음`;
            }
        }
        return {sku,category:CATEGORIES[sku]||"기타",currentStock:cur,ads,daysRemaining:dr,displayRemainingText:drt,expectedStockoutDate:esd,replenishment30:ads>0?Math.ceil(ads*30):0,simulatedArrivals:pending};
    };

    const allSkus = useMemo(()=>Object.keys(dbStock).map(s=>calcSku(s,aDateIdx)),[aDateIdx,adsWin,dbStock,dbDates,dbInc]);
    const filtSkus = useMemo(()=>allSkus.filter(i=>{
        if(exZero && i.currentStock===0) return false;
        if(only30 && i.daysRemaining>30) return false;
        if(catF!=="ALL" && i.category!==catF) return false;
        if(search && !i.sku.includes(search)) return false;
        return true;
    }).sort((a,b)=>a.daysRemaining-b.daysRemaining),[allSkus,only30,exZero,search,catF]);

    const pending = useMemo(()=>{
        if(!dbDates.length) return [];
        const latestT = cleanDateForParse(dbDates[dbDates.length-1]).getTime();
        return dbInc.filter(i=>!i.isRegistered).map(i=>{
            const dt=cleanDateForParse(i.date).getTime();
            if((latestT-dt)/86400000>7) return null;
            const arr=cleanDateForParse(i.date);
            if(i.type==="택배") arr.setDate(arr.getDate()+3);
            return {...i,arrivalDateStr:arr.toISOString().split('T')[0]};
        }).filter(Boolean);
    },[dbInc,dbDates]);

    const summary = useMemo(()=>({
        crit:allSkus.filter(i=>i.daysRemaining<=10).length,
        warn:allSkus.filter(i=>i.daysRemaining>10&&i.daysRemaining<=30).length,
        tot:allSkus.reduce((s,i)=>s+i.currentStock,0),
        ads:allSkus.reduce((s,i)=>s+i.ads,0).toFixed(1)
    }),[allSkus]);

    const skuHist = useMemo(()=>{
        if(!selSku||!dbStock[selSku]) return [];
        return dbDates.slice(0,aDateIdx+1).map((d,i)=>({date:d,stock:dbStock[selSku][i]||0}));
    },[selSku,aDateIdx,dbStock,dbDates]);

    // ── 엑셀 업로드 (핵심 수정) ──────────────────────────────────────
    const handleUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                // [FIX 1] cellDates:true → Excel 날짜 셀을 Date 객체로 파싱
                const wb = XLSX.read(ev.target.result, { type:'binary', cellDates:true });
                const sn = wb.SheetNames;

                // [FIX 2] 시트 순서 고정: 0=로켓, 1=N배송, 2=출고
                const sRocket = sn[0] ? wb.Sheets[sn[0]] : null;
                const sArgo   = sn[1] ? wb.Sheets[sn[1]] : null;
                const sDisp   = sn[2] ? wb.Sheets[sn[2]] : null;

                let nRD=[...rDates], nRI=[...rItems];
                let nAD=[...dbDates], nAS={...dbStock};
                let nInc=[...dbInc]; // INITIAL_INCOMINGS 포함 복사본

                // ── 로켓 시트 파싱 ──
                if (sRocket) {
                    // raw:true → Date 객체 그대로 전달, 숫자도 그대로
                    const rows = XLSX.utils.sheet_to_json(sRocket, {header:1, raw:true, defval:""});
                    if (rows.length>1) {
                        const hRow = rows[0];
                        const dCols = [];
                        hRow.forEach((c,i)=>{
                            if (i<3) return; // 상품명, 구성, SKU ID 제외
                            const fd = parseExcelDateCell(c);
                            if (fd) dCols.push({index:i, label:fd});
                        });
                        const pDates = dCols.map(c=>c.label);
                        nRD = [...new Set([...rDates,...pDates])].sort();
                        const iMap = {};
                        nRI.forEach(it=>{ iMap[`${it.name}_${it.option}`]={...it,history:{...it.history}}; });
                        for (let i=1;i<rows.length;i++) {
                            const row=rows[i];
                            if(!row?.length) continue;
                            const name=String(row[0]||"").trim();
                            const option=String(row[1]||"").trim();
                            const skuId=String(row[2]||"").trim();
                            if(!name||name==="undefined") continue;
                            const key=`${name}_${option}`;
                            if(!iMap[key]) iMap[key]={name,option,skuId,history:{}};
                            dCols.forEach((col,ci)=>{
                                const raw=row[col.index];
                                let val="-";
                                if(raw!==""&&raw!==undefined&&raw!==null) {
                                    if(typeof raw==="number") val=Math.round(raw);
                                    else { const n=parseInt(String(raw).replace(/,/g,"")); val=isNaN(n)?String(raw):n; }
                                }
                                iMap[key].history[pDates[ci]]=val;
                            });
                        }
                        nRI=Object.values(iMap);
                    }
                }

                // ── N배송 재고 시트 파싱 ──
                if (sArgo) {
                    const rows = XLSX.utils.sheet_to_json(sArgo, {header:1, raw:true, defval:""});
                    if (rows.length>1) {
                        const hRow=rows[0];
                        const dCols=[];
                        hRow.forEach((c,i)=>{
                            const fd=parseExcelDateCell(c);
                            if(fd) dCols.push({index:i,label:fd});
                        });
                        const pDates=dCols.map(c=>c.label);
                        nAD=[...new Set([...dbDates,...pDates])].sort();
                        // 기존 데이터 유지하며 배열 재구성
                        const origStock={...dbStock};
                        Object.keys(origStock).forEach(k=>{
                            nAS[k]=nAD.map(d=>{ const oi=dbDates.indexOf(d); return oi!==-1?(origStock[k]?.[oi]||0):0; });
                        });
                        for (let i=1;i<rows.length;i++) {
                            const row=rows[i];
                            if(!row?.length) continue;
                            const sku=cleanSkuName(String(row[0]||"").trim());
                            if(!sku||!CATEGORIES[sku]) continue;
                            if(!nAS[sku]) nAS[sku]=new Array(nAD.length).fill(0);
                            dCols.forEach((col,ci)=>{
                                const raw=row[col.index];
                                const val=typeof raw==="number"?Math.round(raw):(parseInt(String(raw).replace(/,/g,""))||0);
                                const ui=nAD.indexOf(pDates[ci]);
                                if(ui!==-1) nAS[sku][ui]=val;
                            });
                        }
                    }
                }

                // ── 출고 시트 파싱 ──
                // [FIX 3] 최신 아르고 날짜 이후 출고분만 추가 → 기존 INITIAL_INCOMINGS와 절대 충돌 없음
                if (sDisp) {
                    try {
                        const rows=XLSX.utils.sheet_to_json(sDisp,{header:1,raw:true,defval:""});
                        if(rows.length>1) {
                            const hRow=rows[0];
                            const dCols=[];
                            const latestArgoStr=(nAD[nAD.length-1]||"2026-06-02").split(" ")[0];
                            const latestArgoTime=new Date(latestArgoStr).getTime();
                            hRow.forEach((c,i)=>{
                                if(i===0) return;
                                const fd=parseExcelDateCell(c);
                                if(!fd) return;
                                const dispTime=new Date(fd.split(" ")[0]).getTime();
                                // 최신 아르고 날짜보다 이후인 출고만 처리 (이전 것은 이미 재고에 반영됨)
                                if(dispTime>latestArgoTime) dCols.push({index:i,label:fd});
                            });
                            for(let i=1;i<rows.length;i++) {
                                const row=rows[i];
                                if(!row?.length) continue;
                                const sku=cleanSkuName(String(row[0]||"").trim());
                                if(!sku) continue;
                                dCols.forEach(col=>{
                                    const raw=row[col.index];
                                    const amount=typeof raw==="number"?Math.round(raw):(parseInt(String(raw).replace(/,/g,""))||0);
                                    if(amount<=0) return;
                                    const type=col.label.includes("용차")?"용차":"택배";
                                    const cleanDate=col.label.split(" ")[0];
                                    // [FIX] SKU+날짜만으로 중복 체크 (금액 불일치로 중복 추가되는 버그 방지)
                                    const exists=nInc.some(inc=>inc.sku===sku&&inc.date===cleanDate);
                                    if(!exists) nInc.push({sku,date:cleanDate,amount,type,isRegistered:false});
                                });
                            }
                        }
                    } catch(e) { console.warn("출고 시트 파싱 스킵:", e); }
                }

                setDbDates(nAD); setDbStock(nAS); setDbInc(nInc);
                setRDates(nRD); setRItems(nRI);
                save(nAD,nAS,nInc,nRD,nRI);

                if(nAD.length) {
                    const last=nAD[nAD.length-1];
                    setAYear(last.slice(0,4)); setAMon(last.slice(5,7)); setADate(last);
                }
                if(nRD.length) { setRYear(nRD[nRD.length-1].slice(0,4)); setRMon(nRD[nRD.length-1].slice(5,7)); }
                notify("🎉 엑셀 분석 완료! 모든 데이터가 저장되었습니다.");
            } catch(err) {
                console.error(err);
                notify("엑셀 파일 파싱 오류. 시트 구성을 확인하세요.", "err");
            }
        };
        reader.readAsBinaryString(file);
    };

    const toggleRegistered = (idx) => {
        const target=pending[idx];
        const upd=[...dbInc];
        const gi=upd.findIndex(x=>x.sku===target.sku&&x.date===target.date&&x.amount===target.amount);
        if(gi!==-1) {
            upd[gi]={...upd[gi],isRegistered:true};
            const us={...dbStock};
            if(us[target.sku]&&dbDates.length) us[target.sku][dbDates.length-1]+=target.amount;
            setDbInc(upd); setDbStock(us);
            save(dbDates,us,upd,rDates,rItems);
            notify(`✅ ${target.sku} 입고 완료! +${target.amount.toLocaleString()}개 반영`);
        }
    };

    const handleLogin = (ev) => {
        ev.preventDefault();
        if(pwd===SECRET_PASSWORD){setIsLoggedIn(true);sessionStorage.setItem("ili","1");}
        else{setPwdErr(true);setPwd("");}
    };

    // ── 로그인 화면 ──
    if (!isLoggedIn) return (
        <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 relative overflow-hidden">
            <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl text-center relative z-10">
                <h1 className="text-2xl font-extrabold text-slate-800 mb-1">N배송 & 로켓배송 재고 현황</h1>
                <p className="text-sm text-slate-500 mb-8">내부 인원 전용 대시보드입니다.</p>
                <form onSubmit={handleLogin} className="space-y-4">
                    <input type="password" value={pwd} onChange={e=>{setPwd(e.target.value);setPwdErr(false);}} placeholder="비밀번호 입력" autoFocus
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-center font-bold outline-none focus:ring-2 focus:ring-indigo-500"/>
                    {pwdErr && <p className="text-xs text-red-500 font-bold animate-bounce">⚠️ 비밀번호가 일치하지 않습니다.</p>}
                    <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 rounded-xl shadow-lg transition-colors">접속하기</button>
                </form>
                <p className="text-xs text-slate-400 mt-6">© 2026 요미몬(주)</p>
            </div>
        </div>
    );

    // ── 메인 ──
    return (
        <div className="min-h-screen flex flex-col">
            {/* 헤더 */}
            <header className="bg-gradient-to-r from-slate-900 to-indigo-950 text-white shadow-lg pt-5 pb-0 px-6 md:px-10 relative z-50">
                <div className="flex flex-wrap items-center gap-3 pb-5 border-b border-white/10">
                    <h1 className="text-2xl font-bold">N배송 &amp; 로켓배송 재고 현황 <span className="text-indigo-400">(v7)</span></h1>
                    <span className="text-xs bg-emerald-600/50 text-emerald-100 px-2.5 py-0.5 rounded-full font-bold">✅ 브라우저 로컬 저장소 가동중</span>
                </div>
                <div className="flex gap-2 px-2 mt-0">
                    {[["argo","📦 N배송(아르고) 재고","indigo"],["rocket","🚀 로켓배송 재고","blue"]].map(([k,label,c])=>(
                        <button key={k} onClick={()=>setView(k)}
                            className={`px-6 py-3 font-extrabold text-sm rounded-t-xl tab-btn ${view===k?`bg-slate-50 text-${c}-900 border-t-4 border-${c}-600`:'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white mt-1'}`}>
                            {label}
                        </button>
                    ))}
                </div>
            </header>

            {/* 알림 */}
            {notif && (
                <div className="fixed top-24 right-6 z-[200]">
                    <div className={`px-4 py-3 rounded-xl shadow-2xl border text-sm font-medium ${notif.type==="err"?"bg-red-50 border-red-200 text-red-800":"bg-emerald-50 border-emerald-200 text-emerald-800"}`}>
                        {notif.msg}
                    </div>
                </div>
            )}

            {/* ── 로켓배송 탭 ── */}
            {view==="rocket" && (
                <main className="flex-grow w-full px-6 md:px-10 py-6 bg-slate-50 flex flex-col gap-6">
                    {rDates.length===0 ? (
                        <div className="flex flex-col items-center justify-center py-28 text-center">
                            <span className="text-6xl mb-5">🚀</span>
                            <h3 className="text-xl font-extrabold text-slate-600">로켓배송 데이터가 없습니다</h3>
                            <p className="text-sm text-slate-400 mt-2">아래 엑셀 업로드 영역에서 파일을 올려주세요.</p>
                            <p className="text-xs text-slate-400 mt-1">시트 순서: 1번=로켓배송 / 2번=N배송 / 3번=출고내역</p>
                        </div>
                    ) : (
                        <>
                            {/* 컨트롤 */}
                            <div className="flex flex-wrap items-center justify-between gap-4 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                                <h2 className="font-extrabold text-slate-800 text-xl px-2">🚀 로켓배송 실시간 상황판
                                    <span className="ml-2 text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold">{filtRItems.length}개 상품</span>
                                </h2>
                                <div className="flex flex-wrap items-center gap-2">
                                    <label className="flex items-center gap-2 text-sm font-bold text-slate-600 cursor-pointer select-none bg-slate-100 px-3 py-2 rounded-xl">
                                        <input type="checkbox" checked={!rShowZero} onChange={e=>setRShowZero(!e.target.checked)} className="rounded border-slate-300 text-blue-600 w-4 h-4 cursor-pointer"/>
                                        <span>30일 재고0 제외</span>
                                    </label>
                                    {[["15","최근 15일"],["30","최근 30일"],["THIS","이번달"],["LAST","지난달"]].map(([k,l])=>(
                                        <button key={k} onClick={()=>setRMode(k)}
                                            className={`px-4 py-2 text-sm font-bold rounded-xl transition-all ${rMode===k?"bg-blue-600 text-white shadow-md":"bg-slate-100 text-slate-600 hover:bg-slate-200"}`}>
                                            {l}
                                        </button>
                                    ))}
                                    <div className="flex items-center gap-1 bg-slate-800 rounded-xl p-1 border border-slate-700">
                                        <Dropdown value={rYear} options={rYears.map(y=>({value:y,label:`${y}년`}))} onChange={v=>{setRYear(v);setRMode("MONTH");}}/>
                                        <div className="w-px h-6 bg-slate-700"></div>
                                        <Dropdown value={rMon} options={rMons.map(m=>({value:m,label:`${m}월`}))} onChange={v=>{setRMon(v);setRMode("MONTH");}}/>
                                    </div>
                                </div>
                            </div>

                            {/* 테이블 */}
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden flex-grow">
                                <div className="overflow-x-auto p-4 md:p-6">
                                    {filtRItems.length===0 ? (
                                        <div className="py-16 text-center">
                                            <p className="text-slate-400 text-sm">조건에 맞는 상품이 없습니다.</p>
                                            {!rShowZero && <button onClick={()=>setRShowZero(true)} className="mt-3 text-xs text-blue-600 underline font-bold">재고 0개 상품도 표시하기</button>}
                                        </div>
                                    ) : (
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-100 text-slate-600 text-xs font-bold uppercase whitespace-nowrap border-b border-slate-200">
                                                    <th className="py-3 px-5 sticky left-0 bg-slate-100 z-10 shadow-[1px_0_0_#e2e8f0]">상품명</th>
                                                    <th className="py-3 px-5">구성</th>
                                                    <th className="py-3 px-5">SKU ID</th>
                                                    {visRDates.map(d=><th key={d} className="py-3 px-4 text-center">{d.slice(5)}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 text-sm">
                                                {filtRItems.map((item,idx)=>(
                                                    <tr key={idx} className="hover:bg-blue-50/40 transition-colors">
                                                        <td className="py-4 px-5 font-extrabold text-slate-800 bg-white sticky left-0 z-10 whitespace-nowrap">{item.name}</td>
                                                        <td className="py-4 px-5 text-slate-500 whitespace-nowrap">{item.option}</td>
                                                        <td className="py-4 px-5 font-mono text-slate-400 whitespace-nowrap">{item.skuId}</td>
                                                        {visRDates.map((d,i)=>{
                                                            const v=item.history[d];
                                                            const num=v!=null&&v!=="-"&&v!==""?Number(v):null;
                                                            return (
                                                                <td key={i} className={`py-4 px-4 text-center font-bold ${num===null?"text-slate-300":num===0?"text-red-500":"text-slate-700"}`}>
                                                                    {num!==null?(isNaN(num)?String(v):num.toLocaleString()):"-"}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                            </div>
                        </>
                    )}
                </main>
            )}

            {/* ── N배송 탭 ── */}
            {view==="argo" && (
                <main className="flex-grow w-full px-6 md:px-10 py-6 space-y-6">
                    {/* 컨트롤 */}
                    <div className="flex flex-wrap items-center justify-between gap-4 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                        <h2 className="font-extrabold text-slate-800 text-xl px-2">📦 N배송(아르고) 분석 상황판</h2>
                        <div className="flex flex-wrap items-center gap-3">
                            <div className="flex items-center gap-1 bg-slate-800 rounded-xl p-1 border border-slate-700">
                                <Dropdown value={aYear} options={argoYears.map(y=>({value:y,label:`${y}년`}))} onChange={setAYear}/>
                                <div className="w-px h-6 bg-slate-700"></div>
                                <Dropdown value={aMon} options={argoMonths.map(m=>({value:m,label:`${m}월`}))} onChange={setAMon}/>
                                <div className="w-px h-6 bg-slate-700"></div>
                                <Dropdown value={aDate} options={argoDatesForMon.map(d=>({value:d,label:`${d.slice(8)}일${d===dbDates[dbDates.length-1]?" (최신)":""}` }))} onChange={setADate}/>
                            </div>
                            <Dropdown label="ADS 산정" value={adsWin} options={[{value:3,label:"최근 3일"},{value:4,label:"최근 4일"},{value:5,label:"최근 5일"}]} onChange={setAdsWin}/>
                        </div>
                    </div>

                    {/* 대기 현황 */}
                    <div className={`${pending.length>0?'bg-gradient-to-r from-amber-50 to-orange-50 border-2 border-orange-200':'bg-white border-2 border-slate-200'} rounded-3xl shadow-sm overflow-hidden`}>
                        <div className="p-4 md:p-6">
                            <h3 className={`text-lg font-extrabold flex items-center gap-2 ${pending.length>0?'text-orange-900':'text-slate-600'}`}>
                                {pending.length>0?"⚠️ 7일 내 공장 출고완료 대기현황":"🎉 모든 출고건이 아르고에 입고 완료되었습니다."}
                            </h3>
                        </div>
                        {pending.length>0 && (
                            <div className="px-4 md:px-6 pb-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
                                {pending.map((inc,idx)=>(
                                    <div key={idx} className="bg-white p-4 rounded-2xl border border-orange-200/60 shadow-sm flex flex-col gap-3">
                                        <div className="flex items-center justify-between">
                                            <span className="text-xs font-black bg-orange-100 text-orange-800 px-2 py-0.5 rounded-md">{inc.type} 수송</span>
                                            <span className="text-xs font-bold text-slate-400">출고: {inc.date.slice(5)}</span>
                                        </div>
                                        <h4 className="font-extrabold text-slate-800 text-sm">{inc.sku}</h4>
                                        <span className="text-2xl font-black text-orange-600">+{inc.amount.toLocaleString()} <span className="text-xs text-slate-500">개 대기</span></span>
                                        <button onClick={()=>toggleRegistered(idx)} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-extrabold px-3 py-2 rounded-lg transition-colors">입고 완료처리 ✓ (현재고 + 합산)</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* 요약 카드 */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {[
                            {label:"🚨 7일내 긴급 대응",val:summary.crit,unit:"개 SKU",c:"text-red-600"},
                            {label:"⚠️ 30일내 보충 경고",val:summary.warn,unit:"개 SKU",c:"text-amber-500"},
                            {label:"📦 보관 총 재고수량",val:summary.tot.toLocaleString(),unit:"개",c:"text-indigo-600"},
                            {label:"🚚 총 일평균 판매량",val:summary.ads,unit:"개/일",c:"text-teal-600"},
                        ].map(({label,val,unit,c})=>(
                            <div key={label} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">{label}</span>
                                <div className="flex items-baseline gap-2 mt-2">
                                    <span className={`text-4xl font-extrabold ${c}`}>{val}</span>
                                    <span className="text-sm text-slate-500">{unit}</span>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 테이블 + 차트 */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                        <div className="lg:col-span-9 bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="p-6 border-b border-slate-100 bg-slate-50/50 space-y-4">
                                <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                                    <h2 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                                        📋 실시간 입출고/품절 예측 상황판
                                        <span className="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold">{filtSkus.length}개 표시</span>
                                    </h2>
                                    <div className="flex gap-2 overflow-x-auto pb-1 md:pb-0">
                                        {["ALL","클레이","플레이돌","와우펜","키즈탭","기타"].map(cat=>(
                                            <button key={cat} onClick={()=>setCatF(cat)}
                                                className={`px-4 py-1.5 text-xs font-bold rounded-xl transition-all ${catF===cat?"bg-indigo-600 text-white":"bg-slate-200/60 text-slate-600 hover:bg-slate-200"}`}>
                                                {cat==="ALL"?"전체":cat}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-12 gap-3">
                                    <div className="md:col-span-6 relative">
                                        <input type="text" placeholder="품목명 검색..." value={search} onChange={e=>setSearch(e.target.value)}
                                            className="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20"/>
                                        <span className="absolute left-3.5 top-3 text-slate-400">🔍</span>
                                    </div>
                                    <div className="md:col-span-6 flex flex-wrap items-center justify-end gap-x-6 gap-y-1">
                                        <label className="flex items-center gap-2 text-sm font-bold text-slate-600 cursor-pointer select-none">
                                            <input type="checkbox" checked={only30} onChange={e=>setOnly30(e.target.checked)} className="rounded text-indigo-600 w-4 h-4 cursor-pointer"/>
                                            <span>⏳ 30일 이내 품절</span>
                                        </label>
                                        <label className="flex items-center gap-2 text-sm font-bold text-slate-600 cursor-pointer select-none">
                                            <input type="checkbox" checked={exZero} onChange={e=>setExZero(e.target.checked)} className="rounded text-indigo-600 w-4 h-4 cursor-pointer"/>
                                            <span>🚫 재고 0개 제외</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50/80 border-b border-slate-100 text-slate-500 text-xs font-extrabold uppercase tracking-wider">
                                            <th className="py-4 px-6">분류</th>
                                            <th className="py-4 px-6">SKU</th>
                                            <th className="py-4 px-6 text-center">현재고 ({aDate.slice(5)})</th>
                                            <th className="py-4 px-6 text-center">ADS</th>
                                            <th className="py-4 px-6">예상 품절일</th>
                                            <th className="py-4 px-6">잔여기간</th>
                                            <th className="py-4 px-6 text-right">보충 필요(30일)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 text-sm">
                                        {filtSkus.length===0 ? (
                                            <tr><td colSpan="7" className="py-12 text-center text-slate-400">조건에 맞는 품목이 없습니다.</td></tr>
                                        ) : filtSkus.map(item=>{
                                            const isSel=selSku===item.sku;
                                            const isCrit=item.daysRemaining<=10;
                                            const isWarn=item.daysRemaining>10&&item.daysRemaining<=30;
                                            return (
                                                <tr key={item.sku} onClick={()=>setSelSku(item.sku)}
                                                    className={`hover:bg-indigo-50/40 cursor-pointer transition-all border-l-4 ${isSel?"bg-indigo-50/80 border-l-indigo-600":"border-l-transparent"}`}>
                                                    <td className="py-5 px-6 font-bold text-slate-400">{item.category}</td>
                                                    <td className="py-5 px-6 font-bold text-slate-900">{item.sku}</td>
                                                    <td className="py-5 px-6 text-center font-extrabold text-slate-900 text-base">
                                                        {item.currentStock.toLocaleString()}
                                                        {item.simulatedArrivals>0&&<span className="block text-xs text-emerald-600 font-extrabold mt-0.5">(+{item.simulatedArrivals} 예약)</span>}
                                                    </td>
                                                    <td className="py-5 px-6 text-center font-mono font-semibold text-slate-700">{item.ads.toFixed(2)}</td>
                                                    <td className="py-5 px-6">
                                                        <span className={`font-mono text-sm px-3 py-1.5 rounded-lg font-bold ${isCrit?"bg-red-100 text-red-800":isWarn?"bg-amber-100 text-amber-800":"text-slate-600"}`}>
                                                            📅 {item.expectedStockoutDate}
                                                        </span>
                                                    </td>
                                                    <td className="py-5 px-6">
                                                        <span className={`inline-flex px-3 py-1 rounded-full text-xs font-extrabold ${isCrit?"bg-red-200 text-red-900":isWarn?"bg-amber-200 text-amber-900":"bg-emerald-200 text-emerald-900"}`}>
                                                            {item.displayRemainingText}
                                                        </span>
                                                    </td>
                                                    <td className="py-5 px-6 text-right font-extrabold text-indigo-700 text-base">{item.replenishment30.toLocaleString()}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* 차트 */}
                        <div className="lg:col-span-3 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                            <h3 className="text-lg font-bold text-slate-900">{selSku || "항목을 선택하세요"}</h3>
                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                <span className="text-xs font-semibold text-slate-500 block mb-3">재고 추이 ({aDate.slice(5)} 기준)</span>
                                <div className="h-36 w-full flex items-end justify-between gap-1">
                                    {skuHist.length>0 ? skuHist.map((pt,idx)=>{
                                        const maxS=Math.max(...skuHist.map(p=>p.stock),50);
                                        return (
                                            <div key={idx} className="flex-1 flex flex-col items-center h-full justify-end">
                                                <div style={{height:`${(pt.stock/maxS)*100}%`}} className={`w-full rounded-t-sm ${idx===skuHist.length-1?"bg-indigo-600":"bg-slate-300"}`}></div>
                                                <span className="text-[8px] text-slate-400 mt-1 font-mono">{pt.date.slice(5)}</span>
                                            </div>
                                        );
                                    }) : <div className="text-xs text-slate-400 m-auto">데이터 없음</div>}
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            )}

            {/* 엑셀 업로드 */}
            <div className="px-6 md:px-10 pb-10 w-full mt-auto">
                <div className="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 space-y-4">
                    <div>
                        <h4 className="font-extrabold text-slate-800 text-base flex items-center gap-2">
                            📊 통합 엑셀 파일 연동
                            <span className="text-xs bg-indigo-100 text-indigo-700 font-extrabold px-2.5 py-0.5 rounded-full">Super Parser V7</span>
                        </h4>
                        <p className="text-xs text-slate-400 mt-1">
                            <strong>시트 순서:</strong> 1번 = 로켓배송 &nbsp;/&nbsp; 2번 = N배송 재고 &nbsp;/&nbsp; 3번 = 아르고 출고내역 &nbsp;—&nbsp; 이 순서로 자동 인식합니다.
                        </p>
                    </div>
                    <div className="border-2 border-dashed border-indigo-200 hover:border-indigo-500 rounded-2xl p-10 text-center cursor-pointer transition-colors bg-indigo-50/20 relative">
                        <input type="file" accept=".xlsx,.xls" onChange={handleUpload} onClick={e=>e.target.value=null} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10"/>
                        <span className="text-4xl block mb-4">📂</span>
                        <h5 className="text-sm font-extrabold text-indigo-950">여기에 엑셀 파일을 드래그 앤 드롭 하세요</h5>
                        <p className="text-xs text-indigo-500 mt-1">로켓배송 / N배송 / 아르고발송 시트를 자동 인식하여 한 번에 합산합니다.</p>
                    </div>
                </div>
            </div>

            <footer className="bg-slate-900 text-slate-500 text-xs py-6 border-t border-slate-800 text-center">
                <p>© 2026 요미몬(주) 통합 재고 관리 시스템. All Rights Reserved.</p>
            </footer>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
